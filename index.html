`,
    html:`<div class="scene-cors"><div data-region="root"></div></div>`,
    steps:[
      { n:`<b>同源策略</b>是浏览器安全基石：<span class="hl-sync">协议 + 域名 + 端口</span>三者完全相同才算「同源」。同源请求 → 浏览器<span class="hl-micro">直接放行</span>，随便读响应。` },
      { n:`三者任一不同就是<b>跨域</b>。注意：默认被禁止的是<b>读取响应</b>，而不是发送请求——这条限制完全由<span class="hl-sync">浏览器</span>执行。` },
      { n:`<b>简单请求</b>(GET/POST、无自定义头)：浏览器直接发出，自动带上 <span class="hl-sync">Origin</span> 头，告诉服务器「我是谁」。请求<b>真的到达了服务器</b>。` },
      { n:`服务器在响应里回 <span class="hl-host">Access-Control-Allow-Origin</span>。若它<b>允许当前源</b> → 浏览器放行响应，页面拿到数据 ✅。这就是服务器「点头」授权。` },
      { n:`若该头<b>不匹配</b>当前源：请求其实已成功执行，但浏览器把响应<span class="hl-bad">拦在门口</span>，报 CORS 错误。<b>是浏览器拦的，不是服务器拒的</b>。` },
      { n:`<b>复杂请求</b>(PUT/DELETE、自定义头等)：浏览器不直接发，而是先自动发一个 <span class="hl-macro">OPTIONS 预检</span>，带上 Request-Method / Request-Headers「敲门问路」。` },
      { n:`服务器用 <span class="hl-host">Allow-Methods / Allow-Headers</span> 回答「允许」。<b>预检通过后</b>，浏览器<b>才</b>发出真正的复杂请求 → 成功 ✅。一次复杂请求 = 两个来回。` },
      { n:`绕过办法：<b>开发代理</b>。页面只跟<span class="hl-sync">同源的 /api</span> 说话(如 Vite proxy)，由服务器转发到后端。<b>服务器之间不受同源策略限制</b>。` },
      { n:`<b>结论</b>：跨域是<span class="hl-sync">浏览器</span>在拦，服务器用<span class="hl-host">响应头点头</span>才放行；简单请求先发后验，复杂请求<span class="hl-macro">先敲门(预检)再进门</span>。` }
    ],
    apply(root, i){
      const browserOrigin = 'https://siteA.com';
      const hostOrigin = 'https://api.B.com';

      const node = (cls, name, origin, bodyHtml) => `
        <div class="cors-node ${cls}">
          <div class="cors-node-head"><span class="cors-dot"></span>${name}</div>
          <div class="cors-origin">${origin}</div>
          <div class="cors-body">${bodyHtml}</div>
        </div>`;

      const browser = (body) => node('is-browser', '🌐 浏览器·页面', browserOrigin, body);
      const host = (body) => node('is-host', '🖥️ 服务器', hostOrigin, body);

      let tag = '';
      let wire = '';
      let bBody = '';
      let hBody = '';
      let conc = '';

      if (i === 0) {
        tag = '场景一 · 同源';
        bBody = `<div class="cors-emoji">🙂</div><div class="cors-verdict ok">同源 · 直接放行</div>`;
        hBody = `<div class="cors-emoji">📦</div>`;
        wire = `
          <div class="cors-msg req"><span class="arr">→</span> 请求<span class="hh">同协议 / 同域名 / 同端口</span></div>
          <div class="cors-msg left res-ok"><span class="arr">←</span> 响应 ✅<span class="hh">浏览器无条件放行</span></div>`;
      } else if (i === 1) {
        tag = '跨域 · 谁在拦？';
        bBody = `<div class="cors-emoji">🤔</div><div class="cors-verdict bad">跨域 · 默认禁止读响应</div>`;
        hBody = `<div class="cors-emoji">📦</div><div class="cors-verdict ok">服务器不设限</div>`;
        wire = `
          <div class="cors-msg req"><span class="arr">→</span> 请求可发出<span class="hh">协议/域名/端口任一不同</span></div>
          <div class="cors-shield">🛡️ 浏览器把关</div>`;
      } else if (i === 2) {
        tag = '简单请求 · ① 发出';
        bBody = `<div class="cors-emoji">📨</div><div class="cors-verdict">GET / POST 直接发</div>`;
        hBody = `<div class="cors-emoji">📥</div><div class="cors-verdict ok">已收到请求</div>`;
        wire = `
          <div class="cors-msg req"><span class="arr">→</span> GET /data<span class="hh">Origin: ${browserOrigin}</span></div>`;
      } else if (i === 3) {
        tag = '简单请求 · ② 放行';
        bBody = `<div class="cors-emoji">😀</div><div class="cors-verdict ok">头匹配 → 读到数据</div>`;
        hBody = `<div class="cors-emoji">📦</div>`;
        wire = `
          <div class="cors-msg req"><span class="arr">→</span> GET /data<span class="hh">Origin: ${browserOrigin}</span></div>
          <div class="cors-msg left res-ok"><span class="arr">←</span> 200 OK<span class="hh">Allow-Origin: ${browserOrigin} ✅</span></div>`;
      } else if (i === 4) {
        tag = '简单请求 · 头不匹配';

          ${browser(bBody)}

          ${host(hBody)}

    steps:[
      { n:`<b>Core Web Vitals</b> 是 Google 衡量真实用户体验的三大核心指标，对应三件事：<span class="hl-sync">快(LCP)</span>、<span class="hl-host">稳(CLS)</span>、<span class="hl-macro">跟手(INP)</span>。先认识这块「记分牌」。` },
      { n:`先看 <span class="hl-sync"><b>LCP（最大内容绘制）</b></span>：衡量<b>加载速度</b>。页面元素陆续绘制出来——这里还在骨架屏阶段，主图尚未到位。` },
      { n:`视口里<b>最大的内容元素</b>（通常是主图或大标题）绘制完成的那一刻，就是 LCP。这里 <span class="hl-sync">LCP = 1.9s</span>，<span class="hl-micro">&lt; 2.5s 达标 ✅</span>。优化：图片/字体优化、预加载关键资源、CDN、SSR、减小首屏体积。` },

      { n:`修复：给图片<b>预留宽高</b>（width/height 或 <code>aspect-ratio</code>），异步内容给<b>占位骨架</b>。图片加载时占位先撑住，内容<span class="hl-micro">纹丝不动</span> → <span class="hl-micro">CLS = 0.01 ✅ 稳定</span>。` },
      { n:`最后看 <span class="hl-macro"><b>INP（交互到下次绘制）</b></span>：衡量<b>响应速度 / 跟手程度</b>，已取代旧的 FID。用户点下按钮——但此刻主线程正被一个<span class="hl-macro">长任务</span>死死占住。` },

        const on = m.state!=='off';

          <div class="wv-m-name"><span class="wv-dot"></span>${m.name}</div>
          <div class="wv-m-sub">${m.sub}</div>
          ${m.state==='off'||m.state==='pending'?'<div class="wv-m-val">'+valHtml+'</div>':valHtml}
        </div>`;
      };
      const focusLcp = i>=1 && i<=2;
      const focusCls = i>=3 && i<=5 || i===5;
      const focusInp = i>=6 && i<=8;

        0:'三大指标对应三件事：<b>快 · 稳 · 跟手</b>',
        1:'<b>LCP</b> · 加载阶段：内容陆续绘制中…',
        2:'<b>LCP</b> · 最大内容绘制完成 ✅',
        3:'<b>CLS</b> · 用户正在阅读这段文字…',
        4:'<b>CLS</b> · 优化前：图片没预留高度，内容被挤飞',
        5:'<b>CLS</b> · 优化后：预留占位，内容纹丝不动',
        6:'<b>INP</b> · 用户点击按钮，但主线程被占住…',
        7:'<b>INP</b> · 优化前：长任务阻塞，响应迟钝',
        8:'<b>INP</b> · 优化后：拆分长任务，点击即响应',
        9:'真实用户体感：快 + 稳 + 跟手',
        10:'记牢这三件事 👇'
      };
      banner.innerHTML = `<div class="wv-banner">${banners[i]||''}</div>`;

      // ---- 手机内容 ----
      const phoneWrap = root.querySelector('.wv-stage');

      if(i===10){
        // 结论页：隐藏手机，展示金句
        if(phoneWrap) phoneWrap.style.display='none';
        extra.innerHTML = `<div class="wv-final">
          <div class="wv-trio">
            <div class="wv-pill lcp"><div class="e">⚡</div><div class="t">LCP</div><div class="d">加载要<b>快</b></div></div>
            <div class="wv-pill cls"><div class="e">🧱</div><div class="t">CLS</div><div class="d">布局要<b>稳</b></div></div>

          html='<div class="es6-intro">'+
            '<div class="big">ES6+ ✨</div>'+
            '<div class="es6-arrow"><span class="o">var function "+name"</span><span class="a">→</span><span class="nw">let const ()=&gt; \`\${}\`</span></div>'+
            '<div class="sub"><b>同一件事，新写法更短、意图更清晰</b>，还顺手解决了 this、异步、空值这些老坑。逐个来看 ⤵</div>'+
          '</div>';
          break;
        case 1:
          html=head('① 作用域','let / const · 块级作用域')+
            cmp(
              '<span class="c">// var：函数作用域 + 提升</span>\n'+
              'for (<span class="hot k">var</span> i=0;i&lt;3;i++){}\n'+
              'console.log(i); <span class="c">// 3 漏出去了</span>\n'+
              '<span class="k">var</span> PI = 3.14;\n'+
              'PI = 9; <span class="c">// 没人拦得住</span>',
              '<span class="c">// let/const：块级 + 不提升</span>\n'+
              'for (<span class="hot k">let</span> i=0;i&lt;3;i++){}\n'+
              'console.log(i); <span class="c">// ReferenceError</span>\n'+
              '<span class="k">const</span> PI = 3.14;\n'+
              'PI = 9; <span class="err">// TypeError 锁死</span>'
            )+
            note('🔒','<b>let/const</b> 把变量关进 <span class="hl-micro">{ }</span> 块里，<b>const</b> 还禁止重新赋值——循环计数不再泄漏，常量真的恒定。');
          break;
        case 2:
          html=head('② this','箭头函数 ()=&gt;{}')+
            cmp(
              '<span class="c">// 回调里 this 丢了</span>\n'+
              '<span class="k">var</span> self = this;\n'+
              'btn.onclick = <span class="f">function</span>(){\n'+
              '  <span class="hot n">self</span>.count++; <span class="c">// 靠备份</span>\n'+
              '};\n'+
              '<span class="c">// 或 .bind(this) 兜底</span>',
              '<span class="c">// 箭头函数继承外层 this</span>\n'+
              'btn.onclick = <span class="hot f">()=&gt;</span> {\n'+
              '  <span class="s">this</span>.count++; <span class="c">// 就是它</span>\n'+
              '};\n'+
              '<span class="c">// 不用 self / bind</span>'
            )+
            note('🎯','箭头函数<b>没有自己的 this</b>，它绑定<span class="hl-host">定义时</span>外层的 this。回调里 this 丢失的经典坑，写法上就消失了。');
          break;
        case 3:
          html=head('③ 字符串','模板字符串 \`\${}\`')+
            cmp(
              '<span class="c">// 加号拼接，易错</span>\n'+
              '<span class="k">var</span> s = <span class="s">"Hi "</span> + name +\n'+
              '  <span class="s">"! 你有 "</span> + n + <span class="s">" 条消息"</span>;\n'+
              '<span class="c">// 多行要 \\n 或数组 join</span>',
              '<span class="c">// 反引号内嵌 + 多行</span>\n'+
              '<span class="k">const</span> s = <span class="s">\`Hi <span class="hot">\${name}</span>!\n'+
              '你有 <span class="hot">\${n}</span> 条消息\`</span>;\n'+
              '<span class="c">// 所见即所得</span>'
            )+
            note('📝','<span class="hl-micro">\`...\${表达式}...\`</span> 把变量直接嵌进字符串，支持<b>多行</b>，再也不用数加号、补 \\n。');
          break;
        case 4:
          html=head('④ 取值','解构赋值')+
            cmp(
              '<span class="c">// 逐个下标 / 属性</span>\n'+
              '<span class="k">var</span> a = arr[<span class="n">0</span>],\n'+
              '    b = arr[<span class="n">1</span>];\n'+
              '<span class="k">var</span> x = obj.x,\n'+
              '    y = obj.y;',
              '<span class="c">// 一行按形状取出</span>\n'+
              '<span class="k">const</span> [<span class="hot s">a</span>, <span class="hot s">b</span>] = arr;\n\n'+
              '<span class="k">const</span> { <span class="hot s">x</span>, <span class="hot s">y</span> } = obj;\n'+
              '<span class="c">// 还能改名/给默认值</span>'
            )+
            note('📦','解构按<b>位置</b>（数组）或<b>名字</b>（对象）一次取多个值，函数参数、import 也常用，少写一堆中间变量。');
          break;
        case 5:
          html=head('⑤ 展开 / 剩余','... 三个点')+
            cmp(
              '<span class="c">// 合并 / 传参很啰嗦</span>\n'+
              '<span class="k">var</span> c = a.concat(b);\n'+
              '<span class="k">var</span> o = Object.assign({}, p, q);\n'+
              'Math.max.<span class="hot f">apply</span>(null, nums);\n'+
              '<span class="c">// arguments 不是数组</span>',
              '<span class="c">// 展开 + 剩余，一个 ...</span>\n'+
              '<span class="k">const</span> c = [<span class="hot s">...a</span>, <span class="hot s">...b</span>];\n'+
              '<span class="k">const</span> o = { <span class="hot s">...p</span>, <span class="hot s">...q</span> };\n'+
              'Math.max(<span class="hot s">...nums</span>);\n'+
              '<span class="f">fn</span> = (<span class="hot s">...args</span>) =&gt; args; <span class="c">// 真数组</span>'
            )+
            note('✨','同一个 <span class="hl-micro">...</span>：在右侧<b>展开</b>合并数组/对象，在参数位<b>收集</b>成数组（剩余参数），顺手替掉 <span class="hl-macro">apply</span>。');
          break;
        case 6:
          html=head('⑥ 参数','默认参数 a=1')+
            cmp(
              '<span class="c">// || 把 0 / "" 也当缺省</span>\n'+
              '<span class="f">function</span> f(a){\n'+
              '  a = <span class="hot n">a || 1</span>;\n'+
              '  <span class="c">// f(0) → a 变成 1 ！</span>\n'+
              '}',
              '<span class="c">// 仅 undefined 才用默认</span>\n'+
              '<span class="f">function</span> f(<span class="hot s">a = 1</span>){\n'+
              '  <span class="c">// f(0) → a 还是 0 ✔</span>\n'+
              '  <span class="c">// f()  → a 是 1</span>\n'+
              '}'
            )+
            note('🎚️','默认参数只在实参是 <b>undefined</b> 时生效，比 <span class="hl-macro">a||1</span> 精确——不会误伤合法的 <b>0</b> 和 <b>空字符串</b>。');
          break;
        case 7:
          html=head('⑦ 异步','Promise / async-await')+
            cmp(
              '<span class="c">// 回调地狱，层层嵌套</span>\n'+
              'getUser(id, <span class="f">function</span>(u){\n'+
              '  getOrders(u, <span class="f">function</span>(o){\n'+
              '    pay(o, <span class="f">function</span>(r){\n'+
              '      <span class="err">// 错误难统一处理</span>\n'+
              '    });\n'+
              '  });\n'+
              '});',
              '<span class="c">// 同步的样子写异步</span>\n'+
              '<span class="k">async</span> <span class="f">function</span> run(){\n'+
              '  <span class="k">try</span>{\n'+
              '    <span class="k">const</span> u = <span class="hot k">await</span> getUser(id);\n'+
              '    <span class="k">const</span> o = <span class="hot k">await</span> getOrders(u);\n'+
              '    <span class="k">return</span> <span class="hot k">await</span> pay(o);\n'+
              '  }<span class="k">catch</span>(e){ <span class="c">/* 一处兜底 */</span> }\n'+
              '}'
            )+
            note('⏳','Promise 把回调拉直成链；<span class="hl-micro">async/await</span> 更进一步，让异步代码读起来像同步，错误用 <b>try/catch</b> 统一捕获——干掉<span class="hl-bad">回调地狱</span>。');
          break;
        case 8:
          html=head('⑧ 模块','ES Module · import/export')+
            cmp(
              '<span class="c">// CommonJS：运行时、动态</span>\n'+
              '<span class="k">var</span> _ = <span class="f">require</span>(<span class="s">"lib"</span>);\n'+
              'module.exports = fn;\n'+
              '<span class="c">// 整包引入，难摇树</span>',
              '<span class="c">// ESM：静态、编译期可分析</span>\n'+
              '<span class="hot k">import</span> { fn } <span class="k">from</span> <span class="s">"./lib"</span>;\n'+
              '<span class="hot k">export</span> <span class="k">const</span> add = (a,b)=&gt;a+b;\n'+
              '<span class="hot k">export default</span> App;'
            )+
            note('🌳','<span class="hl-micro">import/export</span> 是<b>静态</b>结构，依赖关系编译期就确定，打包器据此做 <b>tree shaking</b>——没用到的导出被摇掉，体积更小。');
          break;
        case 9:
          html=head('⑨ 面向对象','Class · extends')+
            cmp(
              '<span class="c">// 原型上手动挂方法</span>\n'+
              '<span class="f">function</span> Animal(n){ this.n=n; }\n'+
              'Animal.<span class="hot n">prototype</span>.say =\n'+
              '  <span class="f">function</span>(){ <span class="k">return</span> this.n; };\n'+
              '<span class="c">// 继承还要改 prototype 链</span>',
              '<span class="c">// class 语法糖，结构清晰</span>\n'+
              '<span class="hot k">class</span> Dog <span class="hot k">extends</span> Animal{\n'+
              '  <span class="f">say</span>(){ <span class="k">return</span> <span class="k">super</span>.say()+<span class="s">"汪"</span>; }\n'+
              '}\n'+
              '<span class="c">// 本质仍是原型继承</span>'
            )+
            note('🏛️','<span class="hl-micro">class</span> 是原型继承的<b>语法糖</b>：<b>extends</b> 自动接好原型链，<b>super</b> 调父类，继承结构一眼看懂。');
          break;
        case 10:
          html=head('⑩ 安全取值','?. 可选链 + ?? 空值合并')+
            cmp(
              '<span class="c">// 层层判空，否则报错</span>\n'+
              '<span class="k">var</span> c = a <span class="hot">&amp;&amp;</span> a.b <span class="hot">&amp;&amp;</span> a.b.c;\n'+
              '<span class="c">// 取默认用 ||，0/"" 受害</span>\n'+
              '<span class="k">var</span> v = x.count <span class="hot n">|| 10</span>;\n'+
              '<span class="err">// x.count=0 → 变 10 ！</span>',
              '<span class="c">// 一路安全取值</span>\n'+
              '<span class="k">const</span> c = a<span class="hot s">?.</span>b<span class="hot s">?.</span>c; <span class="c">// undefined 而非崩</span>\n'+
              '<span class="c">// 仅 null/undefined 取默认</span>\n'+
              '<span class="k">const</span> v = x.count <span class="hot s">?? 10</span>;\n'+
              '<span class="good">// 0 / "" 原样保留 ✔</span>'
            )+
            note('🛡️','<span class="hl-micro">?.</span> 遇到 null/undefined 直接短路返回 undefined，告别 <span class="hl-bad">Cannot read property of undefined</span>；<span class="hl-micro">??</span> 只在<b>真正空值</b>时取默认，比 <span class="hl-macro">||</span> 更稳。');
          break;
        case 11:
        default:
          var cards=[
            ['🔒','let / const','块级作用域 · 常量'],
            ['🎯','箭头函数','无自己的 this，继承外层'],
            ['📝','模板字符串','\`\${}\` 内嵌 · 多行'],
            ['📦','解构','[a,b] / {x,y} 一次取多个'],
            ['✨','展开/剩余','...合并 · 收集 · 替 apply'],
            ['🎚️','默认参数','a=1，不误伤 0 / ""'],
            ['⏳','async/await','同步写异步，干掉回调地狱'],
            ['🌳','ES Module','import/export · tree shaking'],
            ['🏛️','Class','extends/super 原型语法糖'],
            ['🛡️','可选链 ?. / ??','安全取值 · 仅空值取默认'],
            ['🧩','Map/Set/Symbol','新增数据结构与原始类型']
          ];
          var c='';
          for(var k=0;k<cards.length;k++){
            c+='<div class="es6-card"><span class="em">'+cards[k][0]+'</span>'+
               '<span class="tx"><b>'+cards[k][1]+'</b><br><span>'+cards[k][2]+'</span></span></div>';
          }
          html=head('⑪ 速览','ES6+ 复习卡')+
            '<div class="es6-cards">'+c+'</div>'+
            '<div class="es6-quote">同一件事，<span class="g">ES6+ 写得更短、意图更清晰</span>，<br>还顺手填平了 this、异步、空值这些老坑。</div>';
          break;
      }
      root.innerHTML='<div class="scene-es6"><div data-region="root">'+html+'</div></div>';
      var inner=root.querySelector('[data-region="root"]');
      if(inner){ root.innerHTML=inner.innerHTML; }
    }
  });
})();
</script>

@keyframes vite-webpack-rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

@keyframes vite-webpack-flash{0%{transform:scale(1);}40%{transform:scale(1.25);}100%{transform:scale(1);}}
`,
    html:`<div class="scene-vite-webpack"><div class="vw-wrap" data-region="stage"></div></div>`,
    steps:[
      { n:`同一个项目，一堆模块要起 <b>dev server</b>。我们让 <span class="hl-macro">Webpack</span> 和 <span class="hl-micro">Vite</span> 同台比一比：谁先开张？` },
      { n:`<span class="hl-macro">Webpack</span> 启动：先把<b>整个应用所有模块</b>吞进打包机，打成一个大 bundle，<b>打完才能 serve</b>。` },
      { n:`<span class="hl-macro">Webpack</span> 进度条慢慢走……<b>模块越多越慢</b>。大项目启动可能要等好几十秒。` },
      { n:`<span class="hl-micro">Vite</span> 启动：<b>不打包</b>，服务器<b>秒起绿灯</b>！靠浏览器原生 <span class="hl-sync">ESM</span>，一行业务代码都没编译就开张了。` },
      { n:`浏览器打开页面，只对<b>当前用到的</b>少数模块发 <span class="hl-sync">ESM 请求</span>，Vite <b>按需即时编译</b>返回；其它模块一动不动。` },
      { n:`并排看启动耗时：<span class="hl-macro">Webpack 全量打包→慢</span>，<span class="hl-micro">Vite 按需 ESM→快</span>。这就是 dev 阶段速度差距的<b>根本</b>。` },
      { n:`改一个文件触发 <b>HMR</b>：<span class="hl-macro">Webpack</span> 要重建相关 chunk(慢一点)；<span class="hl-micro">Vite</span> 只让浏览器重拿<b>那一个</b>变更模块，几乎瞬时。` },
      { n:`补充：Vite 第三方依赖用 <span class="vw-esb">esbuild</span>(Go 写的，快几十倍)预构建一次；<b>生产环境两者都打包</b>(Vite 用 Rollup)，产物差别不大。` },
      { n:`<b>结论</b>：<span class="hl-macro">Webpack</span> 先打包整个应用再开张，生态最全、配置最灵活；<span class="hl-micro">Vite</span> 先开张、要哪个模块现给哪个，快且开箱即用。` }
    ],
    apply(root, i){
      const stage = root.querySelector('[data-region="stage"]');
      const MN = 8;
      const mods = (cls, eatenCount, reqIdx, changedIdx) => {
        let h = '<div class="vw-mods">';
        for(let k=0;k<MN;k++){
          let c='vw-mod';
          if(typeof eatenCount==='number' && k<eatenCount) c+=' eaten';
          if(Array.isArray(reqIdx) && reqIdx.includes(k)) c+=' req';
          if(k===changedIdx) c+=' changed';
          h+=`<div class="${c}" style="animation-delay:${k*0.03}s">📦</div>`;
        }
        return h+'</div>';
      };

      // Webpack track builder
      const wpTrack = (opt) => {
        opt = opt||{};
        const machine = opt.machineActive ? 'vw-machine active' : 'vw-machine';
        const bundleDim = opt.bundleDim ? 'vw-bundle dim' : 'vw-bundle';
        const srv = opt.serverOn
          ? '<span class="vw-server on"><span class="vw-dot"></span>serving</span>'
          : '<span class="vw-server off"><span class="vw-dot"></span>未起</span>';
        return `<div class="vw-track macro">
          <div class="vw-head">
            <span class="vw-badge macro">Webpack</span>
            <span class="vw-sub">${opt.sub||''}</span>
          </div>
          <div class="vw-stage">
            ${mods(null, opt.eaten, null, opt.changed)}
            <span class="vw-arrow">➜</span>
            <div class="${machine}">🏭</div>
            <span class="vw-arrow">➜</span>
            <span class="${bundleDim}">bundle.js</span>
            <span class="vw-arrow">➜</span>
            ${srv}
          </div>
          ${opt.bar!=null?`<div class="vw-bar"><div class="vw-fill macro" style="width:${opt.bar}%"></div></div>`:''}
        </div>`;
      };

      // Vite track builder
      const viteTrack = (opt) => {
        opt = opt||{};
        const srv = opt.serverOn
          ? '<span class="vw-server on"><span class="vw-dot"></span>秒起✓</span>'
          : '<span class="vw-server off"><span class="vw-dot"></span>未起</span>';
        return `<div class="vw-track micro">
          <div class="vw-head">
            <span class="vw-badge micro">Vite</span>
            <span class="vw-sub">${opt.sub||''}</span>
          </div>
          <div class="vw-stage">
            ${mods(null, null, opt.req, opt.changed)}
            <span class="vw-arrow">⇄</span>
            <span class="vw-bundle micro" style="background:color-mix(in srgb,var(--sync) 18%,transparent);color:var(--sync);border:1px dashed var(--sync)">${opt.label||'原生 ESM'}</span>
            <span class="vw-arrow">➜</span>
            ${srv}
          </div>
          ${opt.bar!=null?`<div class="vw-bar"><div class="vw-fill micro" style="width:${opt.bar}%"></div></div>`:''}
        </div>`;
      };

      let html = '<div class="vw-wrap">';

      if(i===0){
        html += wpTrack({sub:'待命', eaten:0, bar:0, bundleDim:true});
        html += '<div class="vw-vs">— DEV SERVER 启动赛 —</div>';
        html += viteTrack({sub:'待命', req:[], bar:0});
      } else if(i===1){
        html += wpTrack({sub:'吞模块中…', machineActive:true, eaten:4, bar:35, bundleDim:true});
        html += '<div class="vw-vs">— 全量打包 vs 不打包 —</div>';
        html += viteTrack({sub:'待命', req:[], bar:0});
      } else if(i===2){
        html += wpTrack({sub:'打包进度 70%…模块越多越慢', machineActive:true, eaten:8, bar:70, bundleDim:false});
        html += '<div class="vw-vs">— Webpack 还在打包 —</div>';
        html += viteTrack({sub:'待命', req:[], bar:0});
      } else if(i===3){
        html += wpTrack({sub:'还在打包…', machineActive:true, eaten:8, bar:80, bundleDim:false});
        html += '<div class="vw-vs">— Vite 直接开张 —</div>';
        html += viteTrack({sub:'服务器秒起！不打包', serverOn:true, req:[], bar:100, label:'原生 ESM'});
      } else if(i===4){
        html += wpTrack({sub:'打包完成才 serve', eaten:8, bar:100, bundleDim:false, serverOn:true});
        html += '<div class="vw-vs">— Vite 按需编译 —</div>';
        html += viteTrack({sub:'仅请求当前页用到的模块', serverOn:true, req:[0,3], bar:100, label:'按需编译'});
      } else if(i===5){
        html += wpTrack({sub:'启动慢', eaten:8, bar:100, serverOn:true});
        html += `<div class="vw-time">
          <span class="t-macro">Webpack 全量打包 <b>≈ 25s</b></span>
          <span class="vw-vs">VS</span>
          <span class="t-micro">Vite 按需 ESM <b>≈ 0.3s</b></span>
        </div>`;
        html += viteTrack({sub:'启动快', serverOn:true, req:[0,3], bar:100, label:'按需编译'});
      } else if(i===6){
        html += wpTrack({sub:'HMR：重建相关 chunk(慢一点)', eaten:8, bar:60, serverOn:true, changed:3, bundleDim:false});
        html += '<div class="vw-vs">— 改一个文件 · HMR —</div>';
        html += viteTrack({sub:'HMR：只换那一个模块(瞬时)', serverOn:true, req:[], changed:3, bar:100, label:'热替换 1 模块'});
      } else if(i===7){
        html += `<div class="vw-note">
          <b>⚙️ 底层加速</b>：Vite 把第三方依赖用 <span class="vw-esb">esbuild</span>(Go 编写，比 JS 工具快几十倍)<b>预构建一次</b>，之后浏览器对依赖的请求都命中缓存。<br>
          <b>📦 生产环境</b>：两者<b>都要打包</b> — Vite 用 <b>Rollup</b>，Webpack 用自家打包器，最终产物差别不大。dev 阶段才是它们真正分道扬镳的地方。
        </div>`;
      } else {
        html += `<div class="vw-final">
          <div class="q"><span class="a">Webpack 先打包整个应用再开张；</span><br><span class="b">Vite 先开张，要哪个模块现给哪个。</span></div>
          <div class="vw-cards">
            <div class="vw-card macro"><h4>🏭 Webpack</h4>生态最全、loader/plugin 可定制性最强；适合复杂或老项目。代价是 dev 启动要全量打包。</div>
            <div class="vw-card micro"><h4>⚡ Vite</h4>原生 ESM + esbuild，启动快、HMR 瞬时、开箱即用；适合现代 ESM 项目。</div>
          </div>
        </div>`;
      }

      html += '</div>';
      root.innerHTML = html;
    }
  });
})();
</script>

          </div>
          ${arrow}
          <div class="mf-window real"><div class="mf-window-title">🌐 唯一的真 window (共用)</div>

          </div>
        </div>
        <div class="mf-note">共用同一个 window → 同一时刻 <span class="mf-tag single">只能 1 个子应用</span></div></div>`;

      else if(i===6){
        html = `
        <div class="mf-title">Proxy 沙箱：每个子应用一个假 window</div>

          <div class="mf-cols">
            <div class="mf-col mf-flow">

      }
      else if(i===7){
        html = `
        <div class="mf-title">Proxy 沙箱：多实例互不影响</div>

      }
      else if(i===8){
        html = `
        <div class="mf-title">快照(单实例) vs Proxy(多实例)</div>
        <div class="mf-stage">
          <table class="mf-cmp">
            <tr><th>维度</th><th class="hsnap">快照沙箱 snapshot</th><th class="hproxy">Proxy 沙箱</th></tr>
            <tr><td>原理</td><td>挂载前拍快照 · 卸载还原</td><td>Proxy 拦截读写 → 独立 fakeWindow</td></tr>
            <tr><td>window</td><td>共用同一个真 window</td><td>每个子应用独立假 window</td></tr>
            <tr><td>多实例</td><td><span class="mf-tag single">不支持 (单例)</span></td><td><span class="mf-tag multi">支持</span></td></tr>
            <tr><td>兼容性</td><td>好 (老浏览器可用)</td><td>依赖 Proxy (IE 不支持)</td></tr>
            <tr><td>性能</td><td>遍历对比有开销</td><td>代理拦截略有开销</td></tr>
            <tr><td>定位</td><td>简单 · 早期方案</td><td>现代主流 (qiankun 2.x)</td></tr>
          </table>
        </div>`;
      }
      else if(i===9){
        html = `
        <div class="mf-title">补充：样式隔离</div>
        <div class="mf-stage">
          <div class="mf-shadow">
            <div class="sh-box"><div class="sh-t">🌑 Shadow DOM</div><div class="sh-d">把子应用 DOM 与 CSS 封进<b>影子树</b>，样式天然不外泄、不被污染<br/><code>attachShadow()</code></div></div>
            <div class="sh-box"><div class="sh-t">🏷️ Scoped 前缀</div><div class="sh-d">给子应用所有样式加<b>作用域前缀</b><br/><code>div[data-qiankun] .btn{}</code></div></div>
          </div>
          <div class="mf-note">JS 沙箱管全局变量，样式隔离管 CSS —— 两者配合，子应用才真正"互不打扰"</div>
        </div>`;
      }
      else {
        html = `
        <div class="mf-stage mf-final">
          <div class="punch">快照沙箱靠"记录-还原"，简单但单例；<br/>Proxy 沙箱给每个子应用一个独立假 window，<br/>支持多实例、是主流。</div>
          <div class="aha">💡 aha：隔离的本质，是<b>别让子应用共用同一个真 window</b>。</div>
        </div>`;
      }

      region.innerHTML = html;
    }
  });
})();
</script>

@keyframes big-file-upload-fade{from{opacity:0}to{opacity:1}}

`,
    html:`<div class="scene-big-file-upload"><div class="bfu-stage" data-region="stage"></div></div>`,
    steps:[
      { n:`一个 <span class="hl-sync">1GB</span> 大文件直接一个请求传上去，问题一堆：<b>容易超时</b>、网络一抖<b>失败就得从头再来</b>、读整个文件还会<b>卡住主线程卡 UI</b>。` },
      { n:`第一招 <span class="hl-sync">分片上传</span>：用 <b>File.slice()</b> 把文件切成固定大小的小块（每片 5MB），<b>每片单独上传</b>，后端收齐再合并。失败也只重传那一片。` },
      { n:`上传前先<span class="hl-host">算文件 hash</span>（按内容算 MD5/SHA）。hash 计算量大，放进 <b>Web Worker</b> 里算，<b>不阻塞主线程</b>，UI 照样流畅。` },
      { n:`第二招 <span class="hl-micro">秒传</span>：拿 hash 问服务器"<b>这个文件存在吗</b>"。命中 → <span class="hl-micro">整个直接成功，一个字节都不用传</span>；未命中 → 继续往下。` },
      { n:`第三招 <span class="hl-host">断点续传</span>：再问服务器"<b>已经收到哪些片了</b>"，已收到的<b>标灰跳过</b>，只传缺的。刷新、断网后能接着传。每片带 <b>chunkIndex + 文件 hash</b> 做标识。` },
      { n:`第四招 <span class="hl-macro">并发控制</span>：剩余分片<b>并行上传但限制并发数=3</b>。同时最多 3 片在传，传完一片队列里补上一片，既快又不打满连接。总进度条汇总增长。` },
      { n:`网络抖动，某一片<span class="hl-bad">失败</span>了。不慌——<span class="hl-macro">自动重试几次</span>，重传成功后变绿。失败只影响这一片，不拖累整体。` },
      { n:`所有分片<span class="hl-micro">全部到齐</span>，<span class="hl-host">后端按 chunkIndex 顺序合并</span>成完整文件 ✓ 上传完成。` },
      { n:`<div class="bfu-quote">把一坨大文件一次传，拆成一堆小片：<br><span class="q-fast">切片+并发 → 快</span>、<span class="q-save">hash 秒传 → 省</span>、<span class="q-stable">续传+重试 → 稳</span></div>` }
    ],
    apply(root, i){
      const stage = root.querySelector('[data-region="stage"]');
      const N = 8; // chunk 数量

      // 构造分片 HTML 的辅助：states 是长度 N 的数组，每项 {cls, badge}
      const chunkRow = (states)=>{
        return '<div class="bfu-chunks">' + states.map((s,idx)=>{
          const badge = s.badge ? '<span class="bfu-badge">'+s.badge+'</span>' : '';
          return '<div class="bfu-chunk '+(s.cls||'')+'">'+idx+badge+'</div>';
        }).join('') + '</div>';
      };
      const plainChunks = (cls)=> Array.from({length:N},()=>({cls:cls||''}));

      if(i===0){
        stage.innerHTML =
          '<div class="bfu-row">'+
            '<div class="bfu-col">'+
              '<div class="bfu-file"><div class="bfu-ic">📄</div><div class="bfu-sz">1GB</div></div>'+
              '<div class="bfu-label"><b>整个文件</b> 一次性上传</div>'+
            '</div>'+
            '<div class="bfu-arrow warn">➜</div>'+
            '<div class="bfu-pain">'+
              '<div class="bfu-pt">⏱️ <b>超时</b>：单请求扛不住几百 MB</div>'+
              '<div class="bfu-pt">🔁 <b>失败重来</b>：断一下前功尽弃</div>'+
              '<div class="bfu-pt">🧊 <b>卡 UI</b>：读大文件阻塞主线程</div>'+
            '</div>'+
          '</div>';
        return;
      }

      if(i===1){
        stage.innerHTML =
          '<div class="bfu-row">'+
            '<div class="bfu-col">'+
              '<div class="bfu-file"><div class="bfu-ic">📄</div><div class="bfu-sz">1GB</div></div>'+
              '<div class="bfu-label">File.<b>slice()</b></div>'+
            '</div>'+
            '<div class="bfu-arrow">➜</div>'+
            '<div class="bfu-col">'+
              chunkRow(plainChunks('queue'))+
              '<div class="bfu-label"><b>'+N+' 个分片</b> · 每片 5MB · 各自单独上传</div>'+
            '</div>'+
          '</div>';
        return;
      }

      if(i===2){
        stage.innerHTML =
          '<div class="bfu-row">'+
            '<div class="bfu-col">'+
              '<div class="bfu-file"><div class="bfu-ic">📄</div><div class="bfu-sz">1GB</div></div>'+
              '<div class="bfu-label">文件内容</div>'+
            '</div>'+
            '<div class="bfu-arrow">➜</div>'+
            '<div class="bfu-worker">'+
              '<div class="bfu-wt">WEB WORKER</div>'+
              '<div class="bfu-gear">⚙️</div>'+
              '<div class="bfu-label">后台计算，<b>不卡主线程</b></div>'+
            '</div>'+
            '<div class="bfu-arrow">➜</div>'+
            '<div class="bfu-col">'+
              '<div class="bfu-hash">hash: a3f9<b>…</b>c01e</div>'+
              '<div class="bfu-label">文件<b>唯一指纹</b></div>'+
            '</div>'+
          '</div>';
        return;
      }

      if(i===3){
        stage.innerHTML =
          '<div class="bfu-row">'+
            '<div class="bfu-col">'+
              '<div class="bfu-hash">hash: a3f9…c01e</div>'+
              '<div class="bfu-label">"这个文件<b>存在吗</b>？"</div>'+
            '</div>'+
            '<div class="bfu-arrow">➜</div>'+
            '<div class="bfu-server">'+
              '<div class="bfu-sic">🗄️</div>'+
              '<div class="bfu-st">服务器校验</div>'+
            '</div>'+
          '</div>'+
          '<div class="bfu-branch">'+
            '<div class="bfu-branchcard hit">'+
              '<div class="bfu-bh">✅ 命中 · 秒传</div>'+
              chunkRow(plainChunks('done'))+
              '<div class="bfu-bd">整个文件直接成功<br><b>一个字节都不用传</b></div>'+
            '</div>'+
            '<div class="bfu-branchcard miss">'+
              '<div class="bfu-bh">⌛ 未命中 · 继续</div>'+
              chunkRow(plainChunks('queue'))+
              '<div class="bfu-bd">服务器没有这个文件<br>走后续上传流程</div>'+
            '</div>'+
          '</div>';
        return;
      }

      if(i===4){
        // 已收到 0,1 两片 -> skip
        const states = plainChunks('queue');
        states[0] = {cls:'skip', badge:'⏭'};
        states[1] = {cls:'skip', badge:'⏭'};
        stage.innerHTML =
          '<div class="bfu-row">'+
            '<div class="bfu-server">'+
              '<div class="bfu-sic">🗄️</div>'+
              '<div class="bfu-st">"已收到哪些片？"</div>'+
              '<div class="bfu-ans miss">→ 已有 #0 #1</div>'+
            '</div>'+
            '<div class="bfu-arrow">➜</div>'+
            '<div class="bfu-col">'+
              chunkRow(states)+
              '<div class="bfu-label">已传的 <b>标灰跳过</b>，只补缺的 · 每片带 <b>chunkIndex+hash</b></div>'+
            '</div>'+
          '</div>';
        return;
      }

      if(i===5){
        // 0,1 跳过；2,3,4 上传中(并发3)；5,6,7 排队
        const states = plainChunks('queue');
        states[0]={cls:'skip',badge:'⏭'}; states[1]={cls:'skip',badge:'⏭'};
        states[2]={cls:'up'}; states[3]={cls:'up'}; states[4]={cls:'up'};
        stage.innerHTML =
          '<div class="bfu-col">'+
            '<div class="bfu-conc">并发上限 = 3 · 同时最多 3 片在传</div>'+
            chunkRow(states)+
            '<div class="bfu-label"><span style="color:var(--macro)">●上传中</span> 传完→<span style="color:var(--micro)">●完成</span>，队列自动补位</div>'+
          '</div>'+
          '<div class="bfu-col">'+
            '<div class="bfu-bar"><i style="width:40%"></i></div>'+
            '<div class="bfu-pct">总进度 40%</div>'+
          '</div>';
        return;
      }

      if(i===6){
        // 0,1 skip; 2,3 done; 4 fail->retry; 5 up; 6,7 queue
        const states = plainChunks('queue');
        states[0]={cls:'skip',badge:'⏭'}; states[1]={cls:'skip',badge:'⏭'};
        states[2]={cls:'done',badge:'✓'}; states[3]={cls:'done',badge:'✓'};
        states[4]={cls:'fail',badge:'✕'};
        states[5]={cls:'up'};
        stage.innerHTML =
          '<div class="bfu-col">'+
            '<div class="bfu-conc" style="color:var(--bad);border-color:var(--bad);background:rgba(239,68,68,.1)">⚠ #4 上传失败 → 自动重试</div>'+
            chunkRow(states)+
            '<div class="bfu-label">单片失败<b>不影响整体</b>，<span style="color:var(--macro)">重试几次</span>后成功变绿</div>'+
          '</div>'+
          '<div class="bfu-col">'+
            '<div class="bfu-bar"><i style="width:62%"></i></div>'+
            '<div class="bfu-pct">总进度 62%</div>'+
          '</div>';
        return;
      }

      if(i===7){
        const states = plainChunks('done');
        states[0]={cls:'skip',badge:'⏭'}; states[1]={cls:'skip',badge:'⏭'};
        for(let k=2;k<N;k++) states[k]={cls:'done',badge:'✓'};
        let minis=''; for(let k=0;k<N;k++) minis+='<div class="bfu-mini"></div>';
        stage.innerHTML =
          '<div class="bfu-col">'+
            chunkRow(states)+
            '<div class="bfu-label">全部分片<b>到齐</b></div>'+
          '</div>'+
          '<div class="bfu-arrow">⬇</div>'+
          '<div class="bfu-final">'+
            '<div class="bfu-server" style="border-color:var(--micro)">'+
              '<div class="bfu-sic">🗄️</div>'+
              '<div class="bfu-st" style="color:var(--micro)">按 chunkIndex 顺序合并</div>'+
              '<div class="bfu-merge">'+minis+'</div>'+
            '</div>'+
            '<div class="bfu-arrow">⬇</div>'+
            '<div class="bfu-file done"><div class="bfu-ic">📄</div><div class="bfu-sz">✓ 1GB</div></div>'+
            '<div class="bfu-label" style="color:var(--micro)"><b>上传完成</b></div>'+
            '<div class="bfu-bar full"><i style="width:100%"></i></div>'+
            '<div class="bfu-pct" style="color:var(--micro)">100%</div>'+
          '</div>';
        return;
      }

      // i===8 结论
      const states = plainChunks('done');
      states[0]={cls:'skip',badge:'⏭'}; states[1]={cls:'skip',badge:'⏭'};
      for(let k=2;k<N;k++) states[k]={cls:'done',badge:'✓'};
      stage.innerHTML =
        '<div class="bfu-col">'+
          chunkRow(states)+
        '</div>'+
        this.steps[8].n;
    }
  });
})();
</script>

        const t = document.createElement('div');
        t.className = 'pd-tabs';
        ['Network','Performance','Lighthouse'].forEach(name=>{
          const tab = document.createElement('div');
          tab.className = 'pd-tab' + (name===active?' active':'');
          tab.textContent = name;
          t.appendChild(tab);
        });
        return t;
      };

      if(i === 0){
        const br = document.createElement('div');
        br.className = 'pd-browser';
        br.innerHTML = `
          <div class="pd-bar"><span class="pd-bdot"></span><span class="pd-bdot"></span><span class="pd-bdot"></span><span class="pd-url">https://app.example.com</span></div>
          <div class="pd-view"><div class="pd-spinner"></div><div class="pd-vtxt">加载中… 已经转了好几秒 😵‍💫</div></div>`;
        main.appendChild(stage('① 现象', '页面好半天才出来', '', 'var(--macro)'));
        main.querySelector('.pd-stage').appendChild(br);
        return;
      }

      if(i === 1){
        const s = stage('② 打开 DevTools · Network', '瀑布图', '', 'var(--sync)');
        s.appendChild(devtoolsTabs('Network'));
        s.appendChild(buildWaterfall(null));
        s.appendChild(diag('sync','🔎','逐条看每个请求的耗时分解','横条越长 = 该请求越慢；从这里开始往下定位是哪一层的问题。'));
        main.appendChild(s);
        return;
      }

      if(i === 2){
        const s = stage('③ 网络层 · 锁定 TTFB', 'Network', '', 'var(--macro)');
        s.appendChild(devtoolsTabs('Network'));
        s.appendChild(buildWaterfall('ttfb'));
        s.appendChild(diag('macro','⏳','TTFB 很长（前面一大段都在"等"）','GET /api/list 请求发出后，服务器 1.8s 才返回第一个字节，下载本身只占一点点。'));
        main.appendChild(s);
        return;
      }

      if(i === 3){
        const s = stage('③ 网络层 · 判断', '服务端', '', 'var(--host)');
        s.appendChild(buildWaterfall('ttfb'));
        s.appendChild(diag('host','🗄️','结论：服务端慢，不是前端的锅','TTFB 高几乎都是后端问题——数据库慢查询、接口逻辑太重、没缓存。',['反馈后端优化','接口/CDN 缓存','协商缓存']));
        main.appendChild(s);
        return;
      }

      if(i === 4){
        const s = stage('④ 网络层 · 大资源', 'Network', '', 'var(--macro)');
        s.appendChild(buildWaterfall('big'));
        s.appendChild(diag('macro','📦','bundle.js 体积过大（橙条特别长）','下载段很长说明资源太大；首屏不需要的代码不该一次全下。',['代码分割','按需加载','gzip/brotli','图片懒加载']));
        main.appendChild(s);
        return;
      }

      if(i === 5){
        const s = stage('⑤ 解析渲染层 · 阻塞脚本', 'Network', '', 'var(--macro)');
        s.appendChild(buildWaterfall('block'));
        s.appendChild(diag('macro','🚧','同步 &lt;script&gt; 阻塞 HTML 解析','浏览器解析到同步脚本会停下来等它执行完，首屏被卡住。',['defer / async','关键 CSS 内联','非关键资源延后']));
        main.appendChild(s);
        return;
      }

      if(i === 6){
        const s = stage('⑥ 运行时 · Performance 火焰图', '主线程', '', 'var(--bad)');
        s.appendChild(devtoolsTabs('Performance'));
        const flame = document.createElement('div');
        flame.className = 'pd-flame';
        flame.innerHTML = `
          <div class="pd-thread">Main Thread</div>
          <div class="pd-frow">
            <div class="pd-fbox ok" style="width:12%">render</div>
            <div class="pd-fbox longtask" style="width:62%">handleClick()</div>
            <div class="pd-fbox idle" style="width:26%">idle</div>
          </div>
          <div class="pd-frow">
            <div class="pd-fbox ok" style="width:12%"></div>
            <div class="pd-fbox warn" style="width:62%">parse + sort 10k items</div>
            <div class="pd-fbox idle" style="width:26%"></div>
          </div>
          <div class="pd-frozen" style="margin-top:4px">🧊 这 ~600ms 内：点击、滚动全部无响应（页面"冻住"）</div>`;
        s.appendChild(flame);
        s.appendChild(diag('bad','🔥','一根超长 Long Task（&gt;50ms）压满主线程','JS 是单线程，长任务跑的时候主线程没空处理点击/滚动 → 交互卡死。'));
        main.appendChild(s);
        return;
      }

      if(i === 7){
        const s = stage('⑥ 运行时 · 判断', '解法', '', 'var(--micro)');
        s.appendChild(diag('micro','✅','拆掉长任务，把主线程让出来','让主线程有空隙响应交互，重活搬走或切片处理。',['拆分长任务','Web Worker','防抖 / 节流','虚拟列表']));
        s.appendChild(diag('sync','♻️','顺带排查重渲染 & 内存泄漏','React.memo / useMemo 减少无谓渲染；清理没移除的监听器和定时器。',['React.memo','useMemo','清理监听/定时器']));
        main.appendChild(s);
        return;
      }

      if(i === 8){
        const s = stage('⑦ 分层定位树', '收束', '', 'var(--micro)');
        const tree = document.createElement('div');
        tree.className = 'pd-tree';
        const layers = [
          { ncls:'pd-n-net', n:'网络层', tool:'Network', sym:'建连慢 / 资源大 / 没缓存', fix:'CDN·HTTP2 · 压缩 · 代码分割 · 缓存' },
          { ncls:'pd-n-host', n:'服务端', tool:'TTFB', sym:'TTFB 高（半天不返回首字节）', fix:'后端慢查询 / 接口重 → 优化或加缓存' },
          { ncls:'pd-n-render', n:'解析渲染', tool:'DOM', sym:'同步脚本阻塞 · 首屏太大', fix:'defer/async · 关键CSS内联 · SSR/骨架屏' },
          { ncls:'pd-n-run', n:'运行时', tool:'Perf', sym:'Long Task · 重渲染 · 内存泄漏', fix:'拆任务 · Web Worker · 防抖 · 虚拟列表' }
        ];
        layers.forEach((l, idx)=>{
          const row = document.createElement('div');
          row.className = 'pd-layer';
          row.style.animationDelay = (idx*0.08)+'s';
          row.innerHTML = `
            <div class="pd-layer-n ${l.ncls}">${l.n}<small>${l.tool}</small></div>
            <div class="pd-layer-b">
              <div class="pd-layer-sym">现象：${l.sym}</div>
              <div class="pd-layer-fix">解法：${l.fix}</div>
            </div>`;
          tree.appendChild(row);
        });
        s.appendChild(tree);
        const tools = document.createElement('div');
        tools.className = 'pd-tools';
        ['🌊 Network 瀑布图','🔥 Performance 火焰图','💡 Lighthouse','📊 Core Web Vitals · LCP/CLS/INP'].forEach(t=>{
          const e = document.createElement('div'); e.className='pd-tool'; e.textContent=t; tools.appendChild(e);
        });
        s.appendChild(tools);
        main.appendChild(s);
        return;
      }

      // i === 9 结论
      const s = stage('结论', '一句话答法', '', 'var(--micro)');
      const punch = document.createElement('div');
      punch.className = 'pd-punch';
      punch.innerHTML = `先用 DevTools <b>分层定位"慢在哪一层"</b>，再对症下药——<b>别一上来就乱优化</b>。<br>把"页面慢"拆成可定位的四层：<b>网络 → 服务端(TTFB) → 解析渲染 → 运行时</b>，每层都有对应的现象、工具和解法。`;
      s.appendChild(punch);
      main.appendChild(s);
    }
  });
})();
</script>

<!-- ===== 明日面试强化：只补项目型、链路型概念；纯定义题不重复做动画 ===== -->
<script>
(function installInterviewScenes(DATA,CSS){
  window.SCENES=window.SCENES||[];
  const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const state=(yes,tone="on")=>yes?" "+tone:"";
  const flow=(items,active,done)=>{
    done=done||[];
    return `<div class="ix-flow">${items.map((x,i)=>`<div class="ix-node${state(i===active)}${state(done.includes(i),"good")}">${x}</div>${i<items.length-1?'<span class="ix-arr">→</span>':""}`).join("")}</div>`;
  };
  const completed=(s,count)=>s.done?Array.from({length:count},(_,i)=>i):Array.from({length:Math.max(0,s.p||0)},(_,i)=>i);
  const renderers={
    stream(root,s){
      const items=["发送 + Controller","SSE / Stream","TextDecoder 缓冲","rAF 合并","React 渲染","Abort / 完成"];
      root.innerHTML=flow(items,s.p,completed(s,items.length))+`
      <div class="ix-grid">
        <div class="ix-card${state(s.p===0,"hot")}"><div class="ix-head">👤 浏览器 <small>${s.status}</small></div><div class="ix-code">const controller = new AbortController()
fetch('/api/chat', { signal: controller.signal })</div><div class="ix-banner${s.abort?" warn":""}">${s.abort?"⛔ controller.abort() 已触发":"本次请求拥有独立中断句柄"}</div></div>
        <div class="ix-card${state(s.p>=2&&s.p<=3,"hot")}"><div class="ix-head">📦 分片缓冲区 <small>${s.q.length} 个待合并</small></div><div>${s.q.length?s.q.map((x,k)=>`<span class="ix-chip on" style="animation-delay:${k*.08}s">${esc(x)}</span>`).join(""):'<span class="muted">队列为空</span>'}</div><div class="ix-banner">TextDecoder(stream: true) · 处理半包 / 粘包</div></div>
        <div class="ix-card${state(s.p===4||s.done,"good")}"><div class="ix-head">✨ 对话区 <small>逐帧提交</small></div><div class="ix-log"><b>Assistant</b><br>${esc(s.t)}${s.p>1&&!s.abort&&!s.done?'<span class="ix-pulse">▍</span>':""}</div></div>
      </div>`;
    },
    context(root,s){
      const warn=s.used>80;
      const old=s.phase<4?["需求背景 · 1.2k","方案讨论 · 1.8k","接口结果 · 2.1k","修订过程 · 1.5k"]:["结构化摘要 · 0.8k"];
      const now=["System Prompt · 1.0k","最近 4 轮原文 · 2.4k","当前问题 · 0.4k","预留回答 · 1.4k"];
      root.innerHTML=`<div class="ix-card ${warn?"warn":"good"}"><div class="ix-head">🧮 Context Budget <small>${s.used}% · ${warn?"接近阈值":"安全区"}</small></div><div class="ix-meter"><i class="${warn?"warn":""}" style="width:${s.used}%"></i></div><div class="ix-kpi"><span><b>16k</b>模型窗口</span><span><b>${Math.round(16*s.used/100)}k</b>已占用</span><span><b>2k</b>回答预留</span></div></div>
      <div class="ix-grid two" style="margin-top:12px"><div class="ix-card${state(s.phase===3,"hot")}"><div class="ix-head">🗃️ 较老历史 <small>${s.phase>=4?"已压缩":"原始消息"}</small></div>${old.map((x,k)=>`<div class="ix-node${state(s.phase===3&&k<3,"warn")}${state(s.phase>=4,"good")}">${s.phase>=4?"📝":"💬"} ${x}</div>`).join("")}</div><div class="ix-card${state(s.phase===4||s.phase===5,"good")}"><div class="ix-head">📌 必须保留 <small>最近窗口</small></div>${now.map((x,k)=>`<div class="ix-node${state(k===0||s.phase>=4,"good")}">${k===0?"🔒":"●"} ${x}</div>`).join("")}</div></div>
      <div class="ix-banner${s.phase>=4?" good":warn?" warn":""}">${s.phase>=4?"摘要替换旧消息 · 原文仍可回查":warn?"达到 80% 阈值 → 进入压缩流程":"每次请求前重新计算预算"}</div>`;
    },
    skill(root,s){
      const items=["用户目标","Reason 判断","Act · Skill","Observe 结果","Final 回答"];
      root.innerHTML=flow(items,s.p,completed(s,items.length))+`<div class="ix-grid">
      <div class="ix-card${state(s.p===1,"hot")}"><div class="ix-head">🧠 Agent 编排器 <small>循环 ${s.loop||"—"}</small></div><div class="ix-node${state(s.p===1)}">判断下一步动作</div><div class="ix-node">失败重试 / 终止条件</div><div class="ix-node">调用轨迹与成本</div></div>
      <div class="ix-card${state(s.p===2,"hot")}"><div class="ix-head">🧩 Skill Registry <small>统一 schema</small></div>${["权限校验","知识库检索","文档定位"].map(x=>`<div class="ix-node${state(s.skill===x,"good")}">${x}${s.skill===x?" · 正在调用":""}</div>`).join("")}</div>
      <div class="ix-card${state(s.p===3||s.done,"good")}"><div class="ix-head">🔎 Observation <small>结构化 JSON</small></div><div class="ix-log">${s.obs?esc(s.obs):s.done?'<b>答案：</b>合同第 8 页写明……<br>来源可追溯':"等待工具返回"}</div></div></div>`;
    },
    tenant(root,s){
      const items=["通用镜像","识别租户","配置中心","CSS 变量","Feature Flag","按需 chunk","一套交付"];

      root.innerHTML=flow(items,s.p,completed(s,items.length))+`<div class="ix-grid">
      <div class="ix-card${state(s.p<=1,"hot")}"><div class="ix-head">📦 app:v2.8.0 <small>单镜像</small></div><div class="ix-node good">core · 鉴权 / 请求 / 上传</div><div class="ix-node">platform · 对话 / 知识库</div><div class="ix-node">extensions · 动态入口</div></div>
      <div class="ix-card${state(s.p>=2&&s.p<=4,"hot")}" style="border-top:3px solid var(--tenant)"><div class="ix-head">🏢 ${s.tenant} <small>runtime config</small></div><div class="ix-code">--brand-primary: ${s.color};
flags: [${(s.flags||[]).join(", ")}]</div><div>${["知识库","审计日志","场景编排"].map(x=>`<span class="ix-chip ${(s.flags||[]).includes(x)?"good":""} ${s.hidden===x?"ix-dim":""}">${s.hidden===x?"○":"●"} ${x}</span>`).join("")}</div></div>

read cookie → tenant → rewrite</div><div class="ix-banner${s.deny?" warn":""}">${s.deny?"302 → /login":"只做轻量、快速的请求决策"}</div></div>
      <div class="ix-card${state(s.p===3,"hot")}"><div class="ix-head">🖥️ Server Render <small>并行取首屏数据</small></div><div class="ix-node${state(s.p>=3,"good")}">用户信息 + 导航权限</div><div class="ix-node${state(s.p>=3,"good")}">首屏业务数据</div></div>

    },
    axios(root,s){

    rbac(root,s){

      <div class="ix-card${state(s.p===4,s.blocked?"bad":"hot")}${state(s.p>=5,"good")}"><div class="ix-lock">🛡️</div><div class="ix-head">API 层 <small>安全边界</small></div><div class="ix-log">${s.blocked?'<b style="color:var(--bad)">403 Forbidden</b><br>缺少 kb:delete · 已记录':s.attack?"收到手工伪造的 DELETE 请求…":s.p>=5?'<b style="color:var(--micro)">200 OK</b><br>校验租户与资源归属':"等待请求"}</div></div></div>
      <div class="ix-banner${s.blocked?" warn":s.done?" good":""}">${s.done?"审计：user_42 删除 tenant_A / kb_12 · trace_8fd2":s.attack?"前端可被绕过 → 必须依赖后端判权":"权限最小化 · 默认拒绝"}</div>`;
    }
  };

})([{"id":"ai-token-stream","title":"AI Token 流式渲染与中断","cat":"AI","kind":"stream","steps":[{"p":0,"t":"","q":[],"status":"待发送","n":"用户点击发送后，前端创建 <b>AbortController</b>，并把 signal 绑定到本次流式请求。每个会话只保留自己的控制器。"},{"p":1,"t":"","q":[],"status":"连接中","n":"服务端建立 <span class=\"hl-micro\">SSE / fetch stream</span>，先返回响应头，连接保持打开。这里不是等整段答案生成完再返回。"},{"p":2,"t":"你","q":["好"],"status":"接收 chunk","n":"网络层收到的通常是 <b>chunk</b>，它不保证刚好等于一个完整 Token 或一行 JSON，所以先进入 buffer 做增量解码。"},{"p":3,"t":"你好，","q":["我是","你的"],"status":"批量刷新","n":"不要每来一个 Token 就 setState。先把片段放进队列，再用 <b>requestAnimationFrame</b> 或小时间片合并刷新，降低重渲染频率。"},{"p":4,"t":"你好，我是你的 AI 面试助手。","q":[],"status":"渲染完成","n":"一帧只提交一次合并后的文本，React 只做必要更新。Markdown 可采用增量解析，代码块尚未闭合时先按纯文本展示。"},{"p":5,"t":"你好，我是你的 AI 面试助手。","q":[],"status":"已中断","abort":true,"n":"用户切换会话或点“停止生成”时调用 <b>abort()</b>：浏览器停止读取，服务端监听断连后也应取消模型任务，避免继续计费。"},{"p":6,"t":"你好，我是你的 AI 面试助手。","q":[],"status":"闭环完成","done":true,"n":"高分回答闭环：<b>流式连接 → 分片解码 → 帧级合并渲染 → 异常兜底 → 双端中断</b>。指标看首 Token 延迟、渲染次数和中断后的资源释放。"}]},{"id":"context-window","title":"上下文 Token：滑动窗口与摘要压缩","cat":"AI","kind":"context","steps":[{"used":28,"phase":0,"n":"上下文不是只算用户问题，还包括 <b>System Prompt、历史消息、工具结果、当前输入和预留输出</b>。请求前必须统一估算。"},{"used":63,"phase":1,"n":"长会话持续追加历史，Token 使用量不断上升。前端展示估算值，后端应使用模型对应 tokenizer 做最终校验。"},{"used":91,"phase":2,"n":"接近阈值时不能简单截掉最早消息，否则会丢失用户偏好和任务约束。先识别必须保留的信息。"},{"used":91,"phase":3,"n":"触发压缩：把较老的多轮对话交给摘要器，产出结构化摘要——目标、已确认事实、未完成事项、关键实体。"},{"used":54,"phase":4,"n":"用一条短摘要替换旧历史，同时始终保留 <b>System Prompt + 最近 N 轮原文 + 当前问题</b>，上下文重新落回安全区。"},{"used":61,"phase":5,"n":"下一轮继续在“摘要 + 近期原文”上推理。摘要要带版本和来源消息范围，必要时可回查原始记录，避免摘要漂移。"},{"used":61,"phase":6,"n":"高分点：同时说清 <b>预算公式、触发阈值、保留策略、摘要结构、可追溯性</b>，这比“超长就截断”更像真实落地。"}]},{"id":"react-skill-flow","title":"ReAct 循环与业务 Skill 设计","cat":"AI","kind":"skill","steps":[{"p":0,"loop":0,"n":"用户问“这份合同里退款条款是什么”。Agent 先理解目标，并不是立刻编一段最终答案。"},{"p":1,"loop":1,"n":"<b>Reason</b>：判断需要先校验权限，再检索知识库。推理状态应留在编排层，不把敏感思维过程原样暴露给前端。"},{"p":2,"loop":1,"skill":"权限校验","n":"<b>Act</b>：从 Skill Registry 选择“权限校验”。Skill 固化了入参 schema、权限边界、工具调用和结构化返回。"},{"p":3,"loop":1,"obs":"允许访问 tenant_A / kb_12","n":"<b>Observe</b>：工具返回可验证结果。Agent 把观察结果加入运行态，决定是否进入下一轮。"},{"p":1,"loop":2,"n":"第 2 轮 Reason：已有权限结果，现在需要检索并定位原文，而不是重复让模型自由发挥。"},{"p":2,"loop":2,"skill":"知识库检索","n":"调用“知识库检索” Skill：统一 query、tenantId、topK，并规定返回 chunk、文档位置和置信度。"},{"p":3,"loop":2,"obs":"命中第 8 页 · 退款条款 · score 0.91","n":"观察检索结果；低置信度时可改写查询重试，高置信度则进入文档定位或生成。"},{"p":4,"loop":2,"done":true,"n":"最终答案引用原文位置，并保留调用轨迹。高分点：<b>Skill 是可复用能力边界；ReAct 是动态选择能力的循环</b>，两者不是一个概念。"}]},{"id":"tenant-runtime","title":"单镜像多租户：运行时主题与 Feature Flag","cat":"工程化","kind":"tenant","steps":[{"p":0,"tenant":"默认","color":"#4f8cff","n":"构建阶段只产出 <b>一套通用镜像</b>：公共核心、平台业务和租户扩展点都在同一版本体系里。"},{"p":1,"tenant":"tenant-acme","color":"#4f8cff","n":"请求进入后，根据域名或租户标识解析 tenantId。不要把客户名写死在构建环境变量里。"},{"p":2,"tenant":"Acme 医疗","color":"#12b981","flags":["知识库","审计日志"],"n":"应用启动拉取租户配置：Logo、主题 Token、路由能力、Feature Flag 和扩展模块清单，并做缓存与版本校验。"},{"p":3,"tenant":"Acme 医疗","color":"#12b981","flags":["知识库","审计日志"],"n":"把品牌色写入 CSS Variables，Tailwind 组件统一消费语义变量；切主题不需要重新编译 CSS。"},{"p":4,"tenant":"Acme 医疗","color":"#12b981","flags":["知识库","审计日志"],"hidden":"场景编排","n":"路由和组件读取 Feature Flag。隐藏只是体验层，后端仍按租户权限校验接口，不能把 Flag 当安全边界。"},{"p":5,"tenant":"Acme 医疗","color":"#12b981","flags":["知识库","审计日志"],"chunk":"medical-report.js","n":"租户专属能力通过 <b>dynamic import</b> 按需加载；未启用的客户不下载对应 chunk，保持首包稳定。"},{"p":6,"tenant":"Acme 医疗","color":"#12b981","flags":["知识库","审计日志"],"chunk":"medical-report.js","done":true,"n":"最终形成：<b>单镜像交付、运行时换肤、配置化开关、扩展层按需分包</b>。量化时用镜像数量、发布时长、首包体积和运维工时说收益。"}]},{"id":"next-request-chain","title":"Next.js Middleware、SSR 与 Hydration 请求链路","cat":"工程化","kind":"next","steps":[{"p":0,"n":"浏览器请求租户后台页面。SSR 的目标不是“所有页面都上服务端”，而是为首屏和 SEO 需要提前生成 HTML。"},{"p":1,"n":"请求先经过 <b>Middleware</b>：读取 cookie、识别租户、做轻量重定向或改写。它适合请求级决策，不适合塞重数据库逻辑。"},{"p":2,"deny":true,"n":"未登录时 Middleware 直接返回 302 到登录页，请求不会继续进入页面渲染。注意真正的数据权限仍要在服务端接口校验。"},{"p":2,"n":"已登录则把 tenantId / traceId 等上下文传给后续路由，进入 Server Component 或 SSR 页面。"},{"p":3,"n":"服务端并行获取首屏数据并渲染 HTML。能在服务端完成的数据不要再让客户端重复请求一次。"},{"p":4,"n":"浏览器先收到可见 HTML，LCP 通常更早；随后下载必要的 JS，而不是等整个 SPA bundle 执行后才出现内容。"},{"p":5,"n":"Hydration 绑定事件和客户端状态，页面开始可交互。要避免服务端和客户端首屏输出不一致造成 hydration warning。"},{"p":6,"done":true,"n":"高分回答要带边界：<b>Middleware 做请求拦截；SSR 提前出 HTML；Hydration 接管交互</b>。收益用 LCP、TTFB、JS 体积和 SEO 数据衡量。"}]},{"id":"axios-sse-pipeline","title":"统一请求层：Axios 拦截器与 SSE 分流","cat":"工程化","kind":"axios","steps":[{"p":0,"transport":"json","n":"业务组件只传领域参数，不关心鉴权头、命名转换、重试和错误提示。统一请求层把这些横切关注点收口。"},{"p":1,"transport":"json","n":"请求拦截器注入 Token、tenantId、traceId，并把 camelCase 请求体转换为 snake_case。转换要跳过 FormData、Blob 等特殊类型。"},{"p":2,"transport":"json","n":"普通 JSON 请求进入 Axios transport；幂等 GET 可按策略重试，写操作默认不能盲目重试，除非带幂等键。"},{"p":3,"transport":"json","n":"响应拦截器把 snake_case 转回 camelCase，统一业务错误；401 只允许一个刷新 Token 请求，其余失败请求排队等待，避免刷新风暴。"},{"p":2,"transport":"sse","n":"流式对话走独立 SSE / fetch 分支，因为 Axios 在浏览器里不适合直接消费 ReadableStream。共用鉴权、trace 和错误模型，但不强行共用 transport。"},{"p":4,"transport":"sse","n":"SSE 分支负责增量解码、消息协议、AbortController 和结束标记，再向上层发标准事件。"},{"p":5,"transport":"sse","done":true,"n":"高分点是“<b>统一契约，不统一一切</b>”：JSON 与 Stream 共用策略层，各自保留合适的传输实现；重试、401、取消都有明确边界。"}]},{"id":"rbac-defense","title":"RBAC：路由、组件、接口三层权限闭环","cat":"工程化","kind":"rbac","steps":[{"p":0,"perms":[],"n":"登录后后端返回当前用户的角色和权限标识，例如 kb:view、kb:delete。前端不自行推导“管理员大概能做什么”。"},{"p":1,"perms":["kb:view"],"n":"路由守卫检查页面权限。没有 kb:view 就跳 403；有权限才加载页面 chunk，减少无意义资源下载。"},{"p":2,"perms":["kb:view"],"n":"组件级权限控制按钮和入口：无 kb:delete 时不渲染删除按钮。这是体验优化，避免误操作。"},{"p":3,"perms":["kb:view"],"attack":true,"n":"用户仍可绕过前端，手工构造 DELETE 请求。所以“按钮隐藏”绝不等于安全。"},{"p":4,"perms":["kb:view"],"attack":true,"blocked":true,"n":"后端接口再次校验 tenantId、资源归属和 kb:delete，返回 403。真正的安全边界永远在服务端。"},{"p":5,"perms":["kb:view","kb:delete"],"n":"授权用户操作时，前端展示入口，后端验证通过，并记录谁在何时删除了哪个租户的资源。"},{"p":6,"perms":["kb:view","kb:delete"],"done":true,"n":"完整闭环：<b>权限数据来自后端 → 路由拦截 → 组件收口 → 接口强校验 → 审计日志</b>。多租户场景还必须校验资源归属，防止横向越权。"}]}],"\n.interview-flow{font-size:13px}.interview-flow .ix-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.interview-flow .ix-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.interview-flow .ix-card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px;box-shadow:var(--shadow);min-width:0}.interview-flow .ix-card.hot{border-color:var(--sync);box-shadow:0 0 0 2px rgba(79,140,255,.18),var(--shadow)}.interview-flow .ix-card.good{border-color:var(--micro);box-shadow:0 0 0 2px rgba(34,197,94,.13),var(--shadow)}.interview-flow .ix-card.warn{border-color:var(--macro)}.interview-flow .ix-card.bad{border-color:var(--bad)}.interview-flow .ix-head{display:flex;align-items:center;gap:8px;font-weight:750;margin-bottom:9px}.interview-flow .ix-head small{margin-left:auto;color:var(--sub);font-weight:500}.interview-flow .ix-node{border:1px solid var(--line);background:var(--panel2);border-radius:10px;padding:9px 10px;color:var(--sub);transition:.25s;position:relative}.interview-flow .ix-node+.ix-node{margin-top:7px}.interview-flow .ix-node.on{color:#fff;border-color:var(--sync);background:rgba(79,140,255,.15);transform:translateY(-1px)}.interview-flow .ix-node.good{color:#d8ffe5;border-color:var(--micro);background:rgba(34,197,94,.12)}.interview-flow .ix-node.warn{color:#ffe8b5;border-color:var(--macro);background:rgba(245,158,11,.12)}.interview-flow .ix-node.bad{color:#ffd5d5;border-color:var(--bad);background:rgba(239,68,68,.12)}.interview-flow .ix-flow{display:flex;align-items:stretch;gap:8px;overflow-x:auto;padding:3px 1px 10px}.interview-flow .ix-flow .ix-node{flex:1 0 112px;display:flex;align-items:center;justify-content:center;text-align:center;min-height:58px;margin:0}.interview-flow .ix-flow .ix-arr{align-self:center;color:#596273;font-size:18px}.interview-flow .ix-chip{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--panel2);border-radius:999px;padding:5px 9px;margin:3px;color:var(--sub);animation:ix-pop .3s ease both}.interview-flow .ix-chip.on{border-color:var(--sync);color:#fff;background:rgba(79,140,255,.14)}.interview-flow .ix-chip.good{border-color:var(--micro);color:#d8ffe5;background:rgba(34,197,94,.12)}.interview-flow .ix-code{font-family:\"SFMono-Regular\",Consolas,monospace;font-size:12px;line-height:1.7;background:#101319;border:1px solid var(--line);border-radius:9px;padding:9px;white-space:pre-wrap;word-break:break-word}.interview-flow .ix-log{min-height:80px;background:#101319;border:1px solid var(--line);border-radius:9px;padding:9px;color:var(--sub);line-height:1.65}.interview-flow .ix-log b{color:var(--txt)}.interview-flow .ix-meter{height:12px;border-radius:99px;background:#0d1015;border:1px solid var(--line);overflow:hidden;margin:8px 0}.interview-flow .ix-meter>i{display:block;height:100%;background:linear-gradient(90deg,var(--sync),var(--micro));transition:width .4s ease}.interview-flow .ix-meter>i.warn{background:linear-gradient(90deg,var(--macro),var(--bad))}.interview-flow .ix-kpi{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.interview-flow .ix-kpi span{flex:1 1 110px;border:1px solid var(--line);background:var(--panel2);border-radius:9px;padding:8px;text-align:center;color:var(--sub)}.interview-flow .ix-kpi b{display:block;color:#fff;font-size:16px;margin-bottom:2px}.interview-flow .ix-banner{border:1px dashed var(--line);border-radius:11px;padding:10px 12px;color:var(--sub);margin-top:10px}.interview-flow .ix-banner.good{border-color:var(--micro);background:rgba(34,197,94,.08);color:#d8ffe5}.interview-flow .ix-banner.warn{border-color:var(--macro);background:rgba(245,158,11,.08);color:#ffe8b5}.interview-flow .ix-lock{font-size:22px;text-align:center;margin-bottom:4px}.interview-flow .ix-dim{opacity:.35;filter:saturate(.35)}@keyframes ix-pop{from{opacity:0;transform:translateY(5px) scale(.97)}to{opacity:1;transform:none}}@keyframes ix-pulse{50%{box-shadow:0 0 0 5px rgba(79,140,255,.08)}}.interview-flow .ix-pulse{animation:ix-pulse 1.2s ease infinite}@media(max-width:900px){.interview-flow .ix-grid,.interview-flow .ix-grid.two{grid-template-columns:1fr}.interview-flow .ix-flow .ix-node{flex-basis:100px;min-height:50px}.interview-flow{font-size:12px}}\n");
</script>
<script>
(function(){
  if('scrollRestoration' in history){ try{ history.scrollRestoration='manual'; }catch(e){} }
  const SCENES=(window.SCENES||[]).slice();
  const CAT_ORDER=["JS 基础","React","工程化","性能·网络","AI","示例"];
  const $=s=>document.querySelector(s);
  $("#scene-styles").textContent = SCENES.map(s=>s.css||'').join('\n');

  // 把整段旁白按句末标点（。！？；）切成多行，不切到 HTML 标签里
  function fmtNarr(s){
    s=String(s||'');
    const parts=[]; let buf=''; let depth=0;
    for(let i=0;i<s.length;i++){
      const ch=s[i]; buf+=ch;
      if(ch==='<') depth++;
      else if(ch==='>') depth=Math.max(0,depth-1);
      else if(depth===0 && (ch==='。'||ch==='！'||ch==='？'||ch==='；')){
        while(i+1<s.length && '」』）)】”'.indexOf(s[i+1])>=0){ buf+=s[++i]; }
        parts.push(buf); buf='';
      }
    }
    if(buf.trim()) parts.push(buf);
    const lines=parts.map(p=>p.trim()).filter(Boolean);
    if(lines.length<=1) return s;
    return lines.map(l=>'<span class="ln">'+l+'</span>').join('');
  }

  // 常驻分组侧栏
  const groups={}; SCENES.forEach((s,i)=>{(groups[s.cat]=groups[s.cat]||[]).push({s,i});});
  const cats=Object.keys(groups).sort((a,b)=>{const ia=CAT_ORDER.indexOf(a),ib=CAT_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  $("#side").innerHTML = cats.map(c=>'<div class="grp">'+c+'</div>'+groups[c].map(o=>'<button data-i="'+o.i+'">'+o.s.title+'</button>').join('')).join('');
  const navBtns=[].slice.call(document.querySelectorAll('#side button'));
  navBtns.forEach(b=>b.onclick=function(){
    const nextIndex=+b.dataset.i;
    const url=new URL(location.href);
    url.searchParams.set('scene',SCENES[nextIndex].id);
    url.hash='';
    history.pushState({scene:SCENES[nextIndex].id},'',url);
    load(nextIndex);
    if(window.innerWidth<=860) setNav(false);
  });

  // 侧栏收起/展开（记忆）
  function setNav(open){ document.body.classList.toggle('nav-open',open); try{localStorage.setItem('scrolly_nav',open?'1':'0');}catch(e){} }
  let navInit=true; try{ const v=localStorage.getItem('scrolly_nav'); if(v!==null) navInit=v==='1'; }catch(e){}
  if(window.innerWidth<=860) navInit=false;
  setNav(navInit);
  $("#navToggle").onclick=function(){ setNav(!document.body.classList.contains('nav-open')); };

  const stage=$("#stage"), stepsEl=$("#steps");
  let idx=-1, root=null, blocks=[], active=-1, io=null;

  function setActive(k){
    if(k===active) return;
    active=k;
    try{ SCENES[idx].apply(root,k); }catch(e){ console.error('apply',e); }
    for(const b of blocks) b.classList.toggle('on', +b.dataset.i===k);
    $("#sinfo").textContent = '步骤 '+(k+1)+' / '+SCENES[idx].steps.length;
  }
  function pickActive(){
    if(!blocks.length) return;
    const mid=window.innerHeight*0.5; let best=0,bestDist=1e9;
    for(let j=0;j<blocks.length;j++){
      const r=blocks[j].getBoundingClientRect(); const c=(r.top+r.bottom)/2; const d=Math.abs(c-mid);
      if(d<bestDist){bestDist=d;best=j;}
    }
    setActive(best);
  }
  function load(i){
    idx=i; const sc=SCENES[i];
    navBtns.forEach(b=>b.classList.toggle('active',+b.dataset.i===i));
    $("#animTitle").textContent=sc.title;
    $("#animCat").textContent=sc.cat;
    stage.innerHTML=sc.html||'';
    root=stage.querySelector('.scene-'+sc.id)||stage.firstElementChild||stage;
    stepsEl.innerHTML = sc.steps.map((st,k)=>
      '<div class="step-block" data-i="'+k+'"><div class="step-inner"><span class="step-num">'+(k+1)+'</span><div class="step-text">'+fmtNarr(st.n)+'</div></div></div>').join('');
    blocks=[].slice.call(stepsEl.querySelectorAll('.step-block'));
    active=-1; window.scrollTo(0,0); setActive(0);
    if(io) io.disconnect();
    io=new IntersectionObserver(function(){ pickActive(); }, {root:null, rootMargin:'0px', threshold:[0,.5,1]});
    blocks.forEach(b=>io.observe(b));
  }
  let ticking=false;
  window.addEventListener('scroll',function(){
    if(ticking) return; ticking=true;
    requestAnimationFrame(function(){ ticking=false; pickActive(); });
  },{passive:true});
  const queryId=new URLSearchParams(location.search).get('scene');
  const hashId=decodeURIComponent(location.hash.replace(/^#/,''));
  const initialIndex=SCENES.findIndex(s=>s.id===(queryId||hashId));
  load(initialIndex>=0?initialIndex:0);
  window.addEventListener('popstate',function(){
    const sceneId=new URLSearchParams(location.search).get('scene');
    const nextIndex=SCENES.findIndex(s=>s.id===sceneId);
    if(nextIndex>=0) load(nextIndex);
  });
})();
</script>
