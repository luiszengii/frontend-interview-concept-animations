<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曾令军 · 前端面试概念动画 · 明日强化版</title>
<style>
  :root{
    --bg:#0f1115;--panel:#171a21;--panel2:#1e222b;--line:#2a2f3a;
    --txt:#e6e9ef;--sub:#9aa3b2;
    --sync:#4f8cff;--micro:#22c55e;--macro:#f59e0b;--host:#a855f7;--bad:#ef4444;--warn:#f59e0b;
    --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
  #app{display:grid;grid-template-columns:236px 1fr;grid-template-rows:1fr auto;height:100vh}
  /* sidebar */
  #side{grid-row:1 / span 2;border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:14px 10px}
  #side h1{font-size:15px;margin:4px 8px 14px;letter-spacing:.3px}
  #side .grp{font-size:11px;color:var(--sub);letter-spacing:.6px;margin:14px 8px 6px;font-weight:700}
  #side button{display:block;width:100%;text-align:left;border:1px solid transparent;background:transparent;
    color:var(--sub);padding:8px 10px;border-radius:9px;font-size:13.2px;cursor:pointer;transition:.13s;margin:2px 0}
  #side button:hover{background:var(--panel2);color:var(--txt)}
  #side button.active{background:rgba(79,140,255,.16);color:#fff;border-color:rgba(79,140,255,.5);font-weight:600}
  #side button .ck{color:var(--micro);font-size:11px;float:right}
  /* main */
  #main{overflow-y:auto;padding:22px 26px 14px}
  #scene-title{font-size:19px;font-weight:700;margin:0 0 4px}
  #scene-cat{font-size:12.5px;color:var(--sub);margin-bottom:16px}
  #stage{min-height:300px}
  /* narration bar */
  #bar{grid-column:2;border-top:1px solid var(--line);background:rgba(15,17,21,.97);
    backdrop-filter:blur(10px);padding:13px 26px}
  #bar .inner{display:flex;flex-direction:column;gap:10px;align-items:stretch}
  #narr{font-size:14.5px;line-height:1.7;min-height:24px;color:var(--txt)}
  #narr b{color:#fff}
  .hl-sync{color:var(--sync);font-weight:700}.hl-micro{color:var(--micro);font-weight:700}
  .hl-macro{color:var(--macro);font-weight:700}.hl-host{color:var(--host);font-weight:700}
  .ctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--txt);
    padding:9px 14px;border-radius:9px;font-size:13.5px;cursor:pointer;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--sync)}.btn:disabled{opacity:.32;cursor:not-allowed}
  .btn.primary{background:var(--sync);border-color:var(--sync);color:#fff;font-weight:700}
  .step{font-size:12.5px;color:var(--sub);white-space:nowrap;min-width:60px;text-align:center}
  .dots{display:flex;gap:5px;align-items:center}
  .dots i{width:7px;height:7px;border-radius:99px;background:var(--line);transition:.2s;cursor:pointer}
  .dots i.on{background:var(--sync);transform:scale(1.3)}
  .dots i.past{background:rgba(79,140,255,.5)}
  /* shared helpers scenes can use */
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .col{flex:1;min-width:0}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px;box-shadow:var(--shadow)}
  .ptitle{font-size:13px;color:var(--sub);font-weight:700;margin:0 0 10px;letter-spacing:.3px}
  .muted{color:var(--sub)}
  @keyframes globalPop{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes globalSlide{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  @keyframes globalFade{from{opacity:0}to{opacity:1}}
  /* mobile */
  #menuBtn{display:none}
  @media(max-width:760px){
    #app{grid-template-columns:1fr}
    #side{position:fixed;z-index:40;left:0;top:0;bottom:0;width:240px;transform:translateX(-100%);transition:.25s;grid-row:auto}
    #side.open{transform:none}
    #bar{grid-column:1}
    #menuBtn{display:inline-flex;position:fixed;z-index:50;top:10px;right:12px;
      background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:8px 12px;cursor:pointer}
    #main{padding:54px 16px 14px}
    #bar{padding:12px 14px}
    .dots{display:none}
  }
</style>
<style>
  /* ---- scrollytelling layout (常驻侧栏) ---- */
  body{height:auto;min-height:100%}
  #topbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:1000;display:flex;align-items:center;gap:12px;
    padding:0 16px;background:rgba(15,17,21,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  #topbar .brand{font-weight:700;font-size:15px;white-space:nowrap}
  #navToggle{border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:9px;
    padding:7px 12px;font-size:14px;cursor:pointer;transition:.15s;line-height:1}
  #navToggle:hover{border-color:var(--sync)}
  #topbar .sinfo{margin-left:auto;font-size:12.5px;color:var(--sub);white-space:nowrap}

  /* sidebar */
  #side{position:fixed;top:52px;left:0;bottom:0;width:230px;z-index:50;overflow-y:auto;
    background:var(--panel);border-right:1px solid var(--line);padding:12px 10px;
    transform:translateX(-100%);transition:transform .22s ease}
  body.nav-open #side{transform:none}
  #side{scrollbar-width:none;-ms-overflow-style:none}
  #side::-webkit-scrollbar{width:0;height:0;display:none}
  #side .grp{font-size:11px;color:var(--sub);letter-spacing:.6px;margin:14px 8px 6px;font-weight:700}
  #side .grp:first-child{margin-top:2px}
  #side button{display:block;width:100%;text-align:left;border:1px solid transparent;background:transparent;
    color:var(--sub);padding:8px 10px;border-radius:9px;font-size:13px;cursor:pointer;transition:.13s;margin:2px 0;line-height:1.35}
  #side button:hover{background:var(--panel2);color:var(--txt)}
  #side button.active{background:rgba(79,140,255,.16);color:#fff;border-color:rgba(79,140,255,.5);font-weight:600}

  #content{margin-left:0;transition:margin-left .22s ease;
    display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,.85fr);gap:24px;
    max-width:1340px;padding:52px 24px 0}
  @media(min-width:861px){ body.nav-open #content{margin-left:230px} }

  #anim-col{position:sticky;top:52px;align-self:start;height:calc(100vh - 52px);
    display:flex;flex-direction:column;padding:18px 8px;overflow:auto}
  #anim-col .scene-title{font-size:18px;font-weight:700;margin:0 0 2px}
  #anim-col .scene-cat{font-size:12px;color:var(--sub);margin-bottom:14px}
  #stage{flex:1 1 auto}

  /* 顶部/底部留白：让第一步和最后一步都能落到视口中央 */
  #steps-col{padding:35vh 6px 42vh}
  .step-block{min-height:30vh;display:flex;align-items:center}
  .step-inner{display:flex;gap:14px;align-items:flex-start;
    background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--line);
    border-radius:14px;padding:16px 18px;width:100%;opacity:.4;filter:saturate(.5);
    transform:translateY(6px);transition:opacity .3s ease,border-color .3s ease,transform .3s ease,box-shadow .3s ease}
  .step-block.on .step-inner{opacity:1;filter:none;transform:none;border-left-color:var(--sync);
    box-shadow:0 8px 28px rgba(0,0,0,.32)}
  .step-num{flex:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;background:var(--panel2);border:1px solid var(--line);color:var(--sub);transition:.3s}
  .step-block.on .step-num{background:var(--sync);border-color:var(--sync);color:#fff}
  .step-text{font-size:15px;line-height:1.7;color:var(--txt);padding-top:2px}
  .step-text .ln{display:block}
  .step-text .ln + .ln{margin-top:5px}

  @media(max-width:860px){
    #content{grid-template-columns:1fr;gap:0;padding:52px 14px 0}
    #anim-col{position:sticky;top:52px;height:52vh;height:52svh;border-bottom:1px solid var(--line);
      background:var(--bg);z-index:10;padding:10px 4px 8px;overflow:hidden}
    #anim-col .scene-title{font-size:16px;line-height:1.25;margin-right:2px}
    #anim-col .scene-cat{font-size:11.5px;margin-bottom:8px}
    #stage{min-height:0;overflow:auto;overscroll-behavior:contain;scrollbar-width:none}
    #stage::-webkit-scrollbar{display:none}
    #steps-col{padding:24vh 2px 44vh}
    .step-block{min-height:34vh}
    .step-inner{padding:14px 14px;gap:11px;border-radius:12px}
    .step-text{font-size:14px;line-height:1.65}
    #topbar .sinfo{display:none}
    #side{width:min(86vw,320px);box-shadow:0 12px 40px rgba(0,0,0,.5);padding-bottom:max(18px,env(safe-area-inset-bottom))}
    #side button{min-height:44px;padding:10px 12px}
    #topbar{padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right))}
    #topbar .brand{font-size:14px;overflow:hidden;text-overflow:ellipsis}
  }
  @media(max-width:430px){
    #content{padding-left:10px;padding-right:10px}
    #navToggle{min-width:42px;min-height:38px;padding:7px 10px}
    .step-num{width:26px;height:26px;font-size:12px}
  }
</style>
</head>
<body>
<style>
.xlink{color:#9aa3b2;text-decoration:none;font-size:12.5px;padding:5px 11px;border-radius:8px;border:1px solid #2a2f3a;transition:.15s;margin-left:2px}
.xlink:hover{color:#e6e9ef;background:#1e222b;border-color:#4f8cff}
</style>
<div id="topbar">
  <button id="navToggle" title="收起/展开概念栏">☰</button>
  <span class="brand">🎯 明日面试 · 概念动画强化版</span>
  <a class="xlink" href="question-bank.html">📚 题库 / 复盘</a>
  <span class="sinfo" id="sinfo"></span>
</div>
<aside id="side"></aside>
<div id="content">
  <div id="anim-col">
    <h2 class="scene-title" id="animTitle">—</h2>
    <div class="scene-cat" id="animCat"></div>
    <div id="stage"></div>
  </div>
  <div id="steps-col">
    <div id="steps"></div>
  </div>
</div>

<style id="scene-styles"></style>
<!-- ===== SCENE: event-loop (内置，作为质量基准) ===== -->
<script>
(function(){
  window.SCENES = window.SCENES || [];
  const CODE = [
    `<span class="el-fn">console</span>.<span class="el-fn">log</span>(<span class="el-str">'1 同步'</span>);`,
    `<span class="el-fn">setTimeout</span>(() <span class="el-kw">=&gt;</span> <span class="el-fn">console</span>.<span class="el-fn">log</span>(<span class="el-str">'2 宏任务'</span>), <span class="el-num">0</span>);`,
    `<span class="el-fn">Promise</span>.<span class="el-fn">resolve</span>().<span class="el-fn">then</span>(() <span class="el-kw">=&gt;</span> <span class="el-fn">console</span>.<span class="el-fn">log</span>(<span class="el-str">'3 微任务'</span>));`,
    `<span class="el-fn">console</span>.<span class="el-fn">log</span>(<span class="el-str">'4 同步'</span>);`,
  ];
  window.SCENES.push({
    id:'event-loop', title:'事件循环（宏任务 / 微任务）', cat:'JS 基础',
    css:`
      .scene-event-loop .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      .scene-event-loop .loop{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:stretch;margin-top:12px}
      @media(max-width:760px){.scene-event-loop .grid2,.scene-event-loop .loop{grid-template-columns:1fr}}
      .scene-event-loop pre{margin:0;font-family:"SFMono-Regular",Consolas,monospace;font-size:13px;line-height:1.95}
      .scene-event-loop .ln{display:block;padding:2px 8px;border-radius:6px;border-left:3px solid transparent;transition:.2s;white-space:pre}
      .scene-event-loop .ln.active{background:rgba(79,140,255,.16);border-left-color:var(--sync)}
      .scene-event-loop .el-fn{color:#82aaff}.scene-event-loop .el-kw{color:#c792ea}.scene-event-loop .el-str{color:#c3e88d}.scene-event-loop .el-num{color:#f78c6c}
      .scene-event-loop .console{font-family:monospace;font-size:13px;min-height:120px}
      .scene-event-loop .cline{padding:5px 9px;border-radius:7px;margin:5px 0;animation:el-pop .35s ease;background:var(--panel2);border:1px solid var(--line);display:flex;gap:9px;align-items:center}
      .scene-event-loop .order{font-size:11px;background:#06210f;color:var(--micro);font-weight:700;border-radius:5px;padding:1px 7px;border:1px solid rgba(34,197,94,.4)}
      .scene-event-loop .engine{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--panel);border:1px dashed var(--line);border-radius:13px;padding:14px;min-width:120px}
      .scene-event-loop .gear{font-size:34px}
      .scene-event-loop .gear.spin{animation:el-spin 1.1s linear infinite}
      .scene-event-loop .frame{background:rgba(79,140,255,.13);border:1px solid rgba(79,140,255,.4);border-radius:8px;padding:8px 11px;margin:6px 0;font-size:12.6px;font-family:monospace;animation:el-pop .3s ease}
      .scene-event-loop .empty{color:#566;font-style:italic;font-size:12.5px;padding:6px 2px}
      .scene-event-loop .chip{border-radius:8px;padding:8px 11px;margin:6px 0;font-size:12.4px;font-family:monospace;animation:el-slide .35s cubic-bezier(.2,.8,.2,1);display:flex;align-items:center;gap:8px}
      .scene-event-loop .chip.mi{background:rgba(34,197,94,.13);border:1px solid rgba(34,197,94,.45)}
      .scene-event-loop .chip.ma{background:rgba(245,158,11,.13);border:1px solid rgba(245,158,11,.45)}
      .scene-event-loop .tag{font-size:10px;opacity:.65;margin-left:auto}
      .scene-event-loop .qbox.flash{box-shadow:0 0 0 2px var(--micro)}
      .scene-event-loop .qbox.hot{box-shadow:0 0 0 2px var(--macro)}
      @keyframes el-pop{from{opacity:0;transform:translateY(-6px) scale(.96)}to{opacity:1;transform:none}}
      @keyframes el-slide{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
      @keyframes el-spin{to{transform:rotate(360deg)}}
    `,
    html:`<div class="scene-event-loop">
      <div class="grid2">
        <div class="panel"><div class="ptitle">📄 代码</div><pre data-region="code"></pre></div>
        <div class="panel"><div class="ptitle">🖥️ Console 输出</div><div class="console" data-region="console"></div></div>
      </div>
      <div class="loop">
        <div class="panel"><div class="ptitle">📚 调用栈（正在执行）</div><div data-region="stack"></div></div>
        <div class="engine"><div class="gear" data-region="gear">⚙️</div><div class="muted" style="font-size:12px;text-align:center">事件循环<br>Event Loop</div></div>
        <div>
          <div class="panel qbox" data-region="microbox" style="margin-bottom:12px"><div class="ptitle" style="color:var(--micro)">🟢 微任务队列 · 一次清空全部</div><div data-region="micro"></div></div>
          <div class="panel qbox" data-region="macrobox"><div class="ptitle" style="color:var(--macro)">🟠 宏任务队列 · 一次只取一个</div><div data-region="macro"></div></div>
        </div>
      </div>
    </div>`,
    steps:[
      { line:null, stack:[], micro:[], macro:[], out:[], spin:false,
        n:`准备开始。整个 <b>&lt;script&gt;</b> 脚本本身会被当作<span class="hl-macro">第一个宏任务</span>取出执行。` },
      { line:null, stack:["script 整体（宏任务）"], micro:[], macro:[], out:[], spin:true,
        n:`事件循环取出第一个<span class="hl-macro">宏任务</span>——整个脚本——压入<b>调用栈</b>开始执行。` },
      { line:0, stack:["script 整体（宏任务）","console.log('1')"], micro:[], macro:[], out:["1 同步"], spin:false,
        n:`第 1 行是<span class="hl-sync">同步代码</span>，立即执行 → 打印 <b>「1 同步」</b>。` },
      { line:1, stack:["script 整体（宏任务）"], micro:[], macro:["() =&gt; log('2 宏任务')"], out:["1 同步"], spin:false,
        n:`第 2 行 <b>setTimeout</b>：回调交给<span class="hl-host">宿主计时器</span>，即使 0ms 也只是到点后排进<span class="hl-macro">宏任务队列</span>，<b>不立刻执行</b>。` },
      { line:2, stack:["script 整体（宏任务）"], micro:["() =&gt; log('3 微任务')"], macro:["() =&gt; log('2 宏任务')"], out:["1 同步"], spin:false,
        n:`第 3 行 <b>Promise.then</b>：回调排进<span class="hl-micro">微任务队列</span>，同样<b>不立刻执行</b>。` },
      { line:3, stack:["script 整体（宏任务）"], micro:["() =&gt; log('3 微任务')"], macro:["() =&gt; log('2 宏任务')"], out:["1 同步","4 同步"], spin:false,
        n:`第 4 行<span class="hl-sync">同步代码</span> → 打印 <b>「4 同步」</b>。同步代码到此全部跑完。` },
      { line:null, stack:[], micro:["() =&gt; log('3 微任务')"], macro:["() =&gt; log('2 宏任务')"], out:["1 同步","4 同步"], spin:true,
        n:`当前宏任务(script)执行完，调用栈清空。🔑 <b>关键</b>：事件循环<u>不会</u>马上取下个宏任务，而是<span class="hl-micro">先清空整个微任务队列！</span>` },
      { line:null, stack:["() =&gt; log('3 微任务')"], micro:[], macro:["() =&gt; log('2 宏任务')"], out:["1 同步","4 同步","3 微任务"], spin:true, flashMicro:true,
        n:`取出<span class="hl-micro">微任务</span>执行 → 打印 <b>「3 微任务」</b>。规则：微任务必须<b>全部清空</b>才罢休。` },
      { line:null, stack:[], micro:[], macro:["() =&gt; log('2 宏任务')"], out:["1 同步","4 同步","3 微任务"], spin:true,
        n:`微任务清空 ✅，浏览器此时可<b>渲染一帧 🎨</b>，然后才去<span class="hl-macro">取下一个宏任务</span>。` },
      { line:null, stack:["() =&gt; log('2 宏任务')"], micro:[], macro:[], out:["1 同步","4 同步","3 微任务","2 宏任务"], spin:true, hotMacro:true,
        n:`取出<span class="hl-macro">一个宏任务</span>执行 → 打印 <b>「2 宏任务」</b>（宏任务一次只取一个）。` },
      { line:null, stack:[], micro:[], macro:[], out:["1 同步","4 同步","3 微任务","2 宏任务"], spin:false,
        n:`🎉 完成！顺序：<span class="hl-sync">1</span> → <span class="hl-sync">4</span> → <span class="hl-micro">3</span> → <span class="hl-macro">2</span>。<b>同步 &gt; 微任务 &gt; 下一轮宏任务。</b>` },
      { line:null, stack:[], micro:[], macro:["宏任务 A","宏任务 B"], out:[], spin:true,
        n:`<b>🔬 进阶：每个宏任务后都有一次微任务检查点。</b>假设队列里有两个宏任务 A、B，而<b>A 的回调里又注册了一个 Promise.then(微 X)</b>。` },
      { line:null, stack:["宏任务 A"], micro:["微 X（A 内部注册）"], macro:["宏任务 B"], out:["宏任务 A"], spin:true, hotMacro:true,
        n:`取出<span class="hl-macro">宏任务 A</span>执行 → 打印「A」。执行过程中它往<span class="hl-micro">微任务队列</span>塞进了一个<b>微 X</b>。` },
      { line:null, stack:[], micro:[], macro:["宏任务 B"], out:["宏任务 A","微 X"], spin:true, flashMicro:true,
        n:`🔑 A 执行完 → <b>不会马上去拿 B</b>！先把<span class="hl-micro">微任务清空</span> → 打印「微 X」。<b>微任务检查点在每个宏任务后都会触发。</b>` },
      { line:null, stack:["宏任务 B"], micro:[], macro:[], out:["宏任务 A","微 X","宏任务 B"], spin:true, hotMacro:true,
        n:`微任务空了，这才取下一个<span class="hl-macro">宏任务 B</span>执行 → 打印「B」。<b>结论：宏 → 清空所有微 → 宏 → 清空所有微……循环往复。</b>` },
    ],
    apply(root, i){
      const s=this.steps[i];
      root.querySelector('[data-region="code"]').innerHTML =
        CODE.map((c,idx)=>`<span class="ln ${idx===s.line?'active':''}">${idx+1}  ${c}</span>`).join('');
      root.querySelector('[data-region="console"]').innerHTML =

      root.querySelector('[data-region="stack"]').innerHTML =
        s.stack.length ? s.stack.map(f=>`<div class="frame">${f}</div>`).join('') : `<div class="empty">空</div>`;
      root.querySelector('[data-region="micro"]').innerHTML =
        s.micro.length ? s.micro.map(f=>`<div class="chip mi">🟢 ${f}<span class="tag">microtask</span></div>`).join('') : `<div class="empty">空</div>`;
      root.querySelector('[data-region="macro"]').innerHTML =
        s.macro.length ? s.macro.map(f=>`<div class="chip ma">🟠 ${f}<span class="tag">经宿主计时器</span></div>`).join('') : `<div class="empty">空</div>`;

      @keyframes closure-pop{from{opacity:0;transform:translateY(-8px) scale(.96)}to{opacity:1;transform:none}}
      @keyframes closure-slide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
      @keyframes closure-bump{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}
      @keyframes closure-dash{to{stroke-dashoffset:-22}}

    `,
    html:`<div class="scene-closure">
      <div class="stage">
        <div class="col">
          <div class="lbl">调用栈 / 词法作用域</div>
          <div data-region="left"></div>
        </div>
        <div class="col">
          <div class="lbl">返回值 / 调用记录</div>
          <div data-region="right"></div>
        </div>
        <div data-region="link"></div>
      </div>
      <div data-region="note"></div>
    </div>`,
    steps:[
      { n:`执行 <b>const counter = makeCounter()</b>。<span class="hl-host">makeCounter</span> 的栈帧被压入调用栈。`,
        outer:'live', bubble:true, count:0, returnedFn:false, leash:false, calls:[], bump:false,
        note:`<b>makeCounter</b> 运行时创建了一个词法作用域，里面有变量 <b>count = 0</b>。` },
      { n:`<span class="hl-host">makeCounter</span> 内部定义了一个函数 <b>increment</b>，它在函数体里<b>引用了外层的 count</b>。`,
        outer:'live', bubble:true, count:0, returnedFn:false, leash:false, calls:[], bump:false,
        note:`<b>increment</b> 还没被调用，但它的「记忆」已经绑定了外层作用域里的 <b>count</b>。` },
      { n:`<span class="hl-host">makeCounter</span> 执行 <b>return increment</b>，把这个内部函数交了出去。`,
        outer:'live', bubble:true, count:0, returnedFn:true, leash:false, calls:[], bump:false,
        note:`内部函数被「带出」了它出生的作用域，赋值给了外面的 <b>counter</b>。` },
      { n:`<b>makeCounter 执行完毕</b>，按常理它的栈帧该弹出、作用域该被 GC 回收……<span class="hl-sync">但是</span>！`,
        outer:'dying', bubble:true, count:0, returnedFn:true, leash:true, calls:[], bump:false,
        note:`<b>aha</b>：返回的 <span class="hl-micro">increment</span> 还引用着 <b>count</b>，一条「引用线」把作用域气泡<b>拽住</b>，使它<span class="hl-micro">不被回收</span>。这就是<b>闭包</b>。` },
      { n:`调用 <b>counter()</b> 第一次。它沿引用线找到那个被抓住的 count，<span class="hl-micro">+1</span> 后返回。`,
        outer:'gone', bubble:true, count:1, returnedFn:true, leash:true, calls:[{c:'counter()',r:'1'}], bump:true,
        note:`栈帧虽已消失，<b>count</b> 却活得好好的。函数访问的是<b>定义时</b>的作用域，不是调用时的。` },
      { n:`再调用 <b>counter()</b>。还是同一个 count，<span class="hl-micro">1 → 2</span>。`,
        outer:'gone', bubble:true, count:2, returnedFn:true, leash:true, calls:[{c:'counter()',r:'1'},{c:'counter()',r:'2'}], bump:true,
        note:`每次调用<b>共享同一份</b>被闭包抓住的作用域，所以状态能累积。这就是闭包做<b>数据私有化</b>的原理。` },
      { n:`第三次 <b>counter()</b>，<span class="hl-micro">2 → 3</span>。count 始终是同一个、外部无法直接访问的私有变量。`,
        outer:'gone', bubble:true, count:3, returnedFn:true, leash:true, calls:[{c:'counter()',r:'1'},{c:'counter()',r:'2'},{c:'counter()',r:'3'}], bump:true,
        note:`应用：<b>柯里化</b>、防抖节流里保存定时器、模块私有状态。代价：被引用的变量<span class="hl-bad">不会被 GC</span>，用错会<b>内存泄漏</b>。` },
      { n:`<b>结论</b>：闭包 = 函数 + 它出生时的词法作用域。作用域没死，<span class="hl-micro">被闭包抓住了</span>。`,
        outer:'gone', bubble:true, count:3, returnedFn:true, leash:true, calls:[{c:'counter()',r:'1'},{c:'counter()',r:'2'},{c:'counter()',r:'3'}], bump:false,
        note:`一句话记牢：<b>函数记得它从哪来</b>——即使在别处被调用，它仍能访问诞生地的变量。` }
    ],
    apply(root, i){
      const s = this.steps[i];
      const left = root.querySelector('[data-region="left"]');
      const right = root.querySelector('[data-region="right"]');
      const link = root.querySelector('[data-region="link"]');
      const note = root.querySelector('[data-region="note"]');

      // 左列：makeCounter 栈帧（会消失） + 作用域气泡（移出栈帧，存活后仍可见）
      let frameCls = 'frame';
      let stamp = '';
      if(s.outer === 'dying'){ frameCls += ' dying'; stamp = `<span class="stamp">即将销毁?</span>`; }
      else if(s.outer === 'gone'){ frameCls += ' gone'; }
      else { stamp = `<span class="stamp alive">运行中</span>`; }

      // 栈帧消失后，气泡标成「存活/被抓住」的样子
      const alive = s.outer === 'gone';
      const bubbleHtml = s.bubble ? `
        <div class="bubble${alive ? ' floating' : ''}">
          <div class="btitle">${alive ? '<span class="alive-dot"></span>' : ''}词法作用域气泡${alive ? '（栈帧已弹出 · 仍存活）' : ''}</div>
          <div class="var-row">
            <span class="var-name">count =</span>
            <span class="var-val${s.bump ? ' bumped' : ''}">${s.count}</span>
          </div>
        </div>` : '';

      const innerFn = s.returnedFn ? '' : `<div class="fn-chip"><b>function</b> increment(){ count++; return count; }</div>`;

      // 气泡作为 frame 的兄弟节点：frame 可以 opacity:0 淡出，气泡不受影响
      left.innerHTML = `
        <div class="left-wrap">
          <div class="${frameCls}">
            <div class="frame-title">makeCounter() 栈帧 ${stamp}<br><small>定义并持有 count</small></div>
            ${innerFn}
          </div>
          ${bubbleHtml}
        </div>`;

      // 右列：返回值 + 调用记录
      const returnedHtml = s.returnedFn
        ? `<div class="fn-chip returned"><b>counter</b> ← increment <span style="color:var(--sub)">（带着作用域引用）</span></div>`
        : `<div class="empty">尚无返回值</div>`;

      const callsHtml = (s.calls && s.calls.length)
        ? `<div class="call-log">${s.calls.map(c=>`<div class="call-line"><b>${c.c}</b><span class="res">→ ${c.r}</span></div>`).join('')}</div>`
        : `<div class="empty">还没有调用 counter()</div>`;

      right.innerHTML = returnedHtml + callsHtml;

      // 引用线：跨两列，从右列的 counter（返回的函数）连到左列的 count 气泡
      // 用覆盖整个 stage 的 SVG 绘制，坐标基于 viewBox 百分比（无需读取真实布局，幂等）
      // viewBox 0..100 横向：右列 counter 大约在 x=68（右半区左缘上方），左列气泡大约在 x=30
      if(s.leash){
        link.innerHTML = `
          <svg class="link-layer" viewBox="0 0 100 30" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="closure-wire-grad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="var(--micro)"/>
                <stop offset="1" stop-color="var(--host)"/>
              </linearGradient>
            </defs>
            <path class="wire" d="M 68 5 C 55 16, 42 16, 30 9"/>
            <circle class="anchor" cx="68" cy="5" r="1.6"/>
            <circle class="knot" cx="30" cy="9" r="2"/>
          </svg>
          <div class="leash-tag">闭包引用 · 抓住不放</div>`;
      } else {
        link.innerHTML = '';
      }

      note.innerHTML = `<div class="note">${s.note}</div>`;
    }
  });
})();
</script>

      { n:`<b>防抖 debounce</b> 的思路：每次触发都<span class="hl-micro">设一个倒计时</span>（比如 16ms）。绿色小条就是这个倒计时，它从触发点向右延伸。`,

        evShown:5, mode:'debounce', debTimerFrom:5 },
      { n:`第 7 次输入后，用户<b>停下了</b>。这次没人再打断计时，倒计时安静地走完了 delay。`,
        evShown:7, mode:'debounce', debTimerFrom:7, debSettling:true },
      { n:`计时走完 → <span class="hl-micro">真正执行一次</span>！7 次输入，防抖最终只跑了 <b>1 次</b>。它在等你「打完字、停下来」。`,
        evShown:7, mode:'debounce', debTimerFrom:7, debFire:true },
      { n:`换成<b>节流 throttle</b>：把时间切成<span class="hl-macro">固定窗口</span>（橙色虚线框）。规则是——每个窗口里<b>只执行一次</b>，多了的输入直接忽略。`,
        evShown:7, mode:'throttle', thrWins:1 },
      { n:`第一个窗口一开始就有输入 → 立刻执行（窗口开头执行一次）。窗口内后面那些输入，全被<b>丢弃</b>。`,
        evShown:7, mode:'throttle', thrWins:1, thrFire:1 },
      { n:`窗口到点，开<b>下一个窗口</b>，节拍重新计数。只要新窗口里有输入，就在该窗口里再执行一次。如此按固定节奏推进。`,
        evShown:7, mode:'throttle', thrWins:3, thrFire:3 },
      { n:`结论：同样 <b>7 次输入</b> → <span class="hl-micro">防抖执行 1 次</span>（等你停下来才动）；<span class="hl-macro">节流执行 3 次</span>（按固定节拍匀速放行）。`,
        mode:'verdict' },
      { n:`<b>aha</b>：<span class="hl-micro">防抖等你「停」</span>——适合搜索框联想、表单校验；<span class="hl-macro">节流按节拍「匀速」</span>——适合滚动、resize、拖拽这类需要持续响应的高频事件。`,
        mode:'verdict', aha:true },
    ],

    apply(root, i){
      var s = this.steps[i];
      var EVENTS=[6,14,22,30,40,50,62], DELAY=16, WINDOW=24;

      function evMarks(n){
        var h='';
        for(var k=0;k<EVENTS.length;k++){
          var on = k < n;
          h += '<div class="dt-ev'+(on?' on':'')+'" style="left:'+EVENTS[k]+'%"><span class="dt-dot"></span></div>';
        }
        return h;
      }

      // 顶部统一输入条（始终展示已出现的输入）
      var inputEl = root.querySelector('[data-region="input"]');
      var evN = (s.evShown!==undefined) ? s.evShown : EVENTS.length;
      inputEl.innerHTML =
        '<div class="dt-head"><span class="dt-title">同一串输入</span>'+
        '<span class="dt-sub">用户连敲 7 次</span></div>'+
        '<div class="dt-line"><div class="dt-axis"></div>'+ evMarks(evN) +'</div>';

      var body = root.querySelector('[data-region="body"]');

      if(s.mode==='intro'){
        body.innerHTML =
          '<div class="dt-track"><div class="dt-head">'+
          '<span class="dt-title">下面我们用<span class="hl-micro">防抖</span> / <span class="hl-macro">节流</span>两条轨道来处理这同一串输入</span></div>'+
          '<div class="dt-sub">先看防抖，再看节流，最后并排对比。</div></div>';
        return;
      }

      if(s.mode==='debounce'){
        var from = s.debTimerFrom; // 计时从第 from 个事件（1-based）的位置开始
        var startX = EVENTS[from-1];
        var endX = startX + DELAY;
        if(endX>100) endX=100;
        var width = endX - startX;
        var cap = s.debSettling ? '安静走完 delay' : (s.debFire ? '完成' : '又被打断 → 重置');
        var timerHtml =
          '<div class="dt-timer" style="left:'+startX+'%;width:'+width+'%">'+
          '<span class="dt-cap">'+cap+'</span></div>'+
          '<div class="dt-now" style="left:'+startX+'%"></div>';
        var fireHtml = s.debFire ?
          '<div class="dt-fire" style="left:'+endX+'%"><div class="dt-burst"></div><div class="dt-lbl">执行 ✓</div></div>' : '';
        body.innerHTML =
          '<div class="dt-track">'+
            '<div class="dt-head"><span class="dt-title" style="color:var(--micro)">① 防抖 debounce</span>'+
            '<span class="dt-count">执行 '+(s.debFire?1:0)+' 次</span></div>'+
            '<div class="dt-line"><div class="dt-axis"></div>'+ evMarks(evN) + timerHtml + fireHtml +'</div>'+
            '<div class="dt-sub">每次输入都重置倒计时；只有停下来、计时走完才执行。</div>'+
          '</div>';
        return;
      }

      if(s.mode==='throttle'){
        var winsToShow = s.thrWins||0;
        var fireCount = s.thrFire||0;
        var firePos = [0, 30, 50]; // win0→第1次输入(6) 但执行在窗口开头? 用首个落入事件位置
        // 实际执行位置：窗口内首个事件。win0首事件=6, win1(24~48)首事件=30, win2(48~72)首事件=50
        var fireXs = [6,30,50];
        var html='';
        for(var w=0; w<winsToShow; w++){
          var wx = w*WINDOW;
          var ww = WINDOW;
          if(wx+ww>100) ww=100-wx;
          var active = (w < fireCount);
          html += '<div class="dt-win'+(active?' active':'')+'" style="left:'+wx+'%;width:'+ww+'%"></div>';
        }
        var fires='';
        for(var f=0; f<fireCount; f++){
          fires += '<div class="dt-fire macro" style="left:'+fireXs[f]+'%"><div class="dt-burst"></div><div class="dt-lbl">执行 ✓</div></div>';
        }
        body.innerHTML =
          '<div class="dt-track">'+
            '<div class="dt-head"><span class="dt-title" style="color:var(--macro)">② 节流 throttle</span>'+
            '<span class="dt-count">执行 '+fireCount+' 次</span></div>'+
            '<div class="dt-line"><div class="dt-axis"></div>'+ html + evMarks(evN) + fires +'</div>'+
            '<div class="dt-sub">固定窗口，每个窗口最多执行一次，其余输入被丢弃。</div>'+
          '</div>';
        return;
      }

      if(s.mode==='verdict'){
        var ahaHtml = s.aha ?
          '<div class="dt-aha">防抖等你「停」下来，节流按「节拍」匀速放行 — 高频事件优化的两把刷子。</div>' : '';
        body.innerHTML =
          '<div class="dt-verdict">'+
            '<div class="dt-vcard deb"><div class="dt-vname" style="color:var(--micro)">防抖 debounce</div>'+
              '<div class="dt-vbig">1 次</div>'+
              '<div class="dt-vdesc">触发后等 delay，期间再触发就重新计时。<br>搜索框联想、表单校验。</div></div>'+
            '<div class="dt-vcard thr"><div class="dt-vname" style="color:var(--macro)">节流 throttle</div>'+
              '<div class="dt-vbig">3 次</div>'+
              '<div class="dt-vdesc">固定窗口内最多执行一次，匀速放行。<br>滚动、resize、拖拽。</div></div>'+
          '</div>'+ ahaHtml;
        return;
      }
    }
  });
})();
</script>
<!-- scene: scope-tdz -->
<script>
(function(){
  window.SCENES = window.SCENES || [];
  window.SCENES.push({
    id:'scope-tdz', title:'var / let / const 与提升', cat:'JS 基础',
    css:`
      .scene-scope-tdz{display:flex;flex-direction:column;gap:14px}
      .scene-scope-tdz .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
      @media(max-width:640px){.scene-scope-tdz .cols{grid-template-columns:1fr}}
      .scene-scope-tdz .col{border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden;display:flex;flex-direction:column}
      .scene-scope-tdz .col-head{padding:8px 12px;font-weight:700;font-size:13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
      .scene-scope-tdz .col-var .col-head{color:var(--macro)}
      .scene-scope-tdz .col-let .col-head{color:var(--sync)}
      .scene-scope-tdz .badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:999px}
      .scene-scope-tdz .col-var .badge{background:rgba(245,158,11,.13);border:1px solid var(--macro);color:var(--macro)}
      .scene-scope-tdz .col-let .badge{background:rgba(79,140,255,.13);border:1px solid var(--sync);color:var(--sync)}

      .scene-scope-tdz .code{position:relative;padding:6px 0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;line-height:1.2}
      .scene-scope-tdz .ln{position:relative;display:flex;align-items:center;gap:8px;padding:5px 12px;white-space:pre;border-left:3px solid transparent;transition:background .3s,border-color .3s}
      .scene-scope-tdz .ln .gut{color:var(--sub);width:14px;text-align:right;flex:none;font-size:11px}
      .scene-scope-tdz .ln.active{background:rgba(255,255,255,.05);border-left-color:var(--txt)}
      .scene-scope-tdz .ln .ptr{position:absolute;left:-2px;top:50%;transform:translateY(-50%);color:var(--txt);font-size:13px;animation:scope-tdz-ptr .9s ease-in-out infinite}
      @keyframes scope-tdz-ptr{0%,100%{opacity:.4;transform:translateY(-50%) translateX(0)}50%{opacity:1;transform:translateY(-50%) translateX(3px)}}
      .scene-scope-tdz .kw{color:#c792ea}
      .scene-scope-tdz .fn{color:var(--sync)}
      .scene-scope-tdz .num{color:var(--micro)}
      .scene-scope-tdz .blk{color:var(--sub)}
      .scene-scope-tdz .ln.indent{padding-left:30px}

      .scene-scope-tdz .hoist{margin:8px 12px;border:1px dashed var(--line);border-radius:10px;padding:8px 10px;background:var(--panel2);animation:scope-tdz-pop .4s ease}
      .scene-scope-tdz .hoist-t{font-size:11px;color:var(--sub);margin-bottom:6px;letter-spacing:.3px}
      .scene-scope-tdz .slot{display:flex;align-items:center;gap:8px;font-family:ui-monospace,monospace;font-size:12px;padding:5px 8px;border-radius:7px;margin:4px 0;transition:background .3s,border-color .3s,box-shadow .3s}
      .scene-scope-tdz .slot.ok{background:rgba(34,197,94,.12);border:1px solid var(--micro)}
      .scene-scope-tdz .slot.ok .val{color:var(--micro);font-weight:700}
      .scene-scope-tdz .slot.tdz{background:rgba(239,68,68,.12);border:1px solid var(--bad)}
      .scene-scope-tdz .slot.tdz .val{color:var(--bad);font-weight:700}
      .scene-scope-tdz .slot .nm{color:var(--txt)}
      .scene-scope-tdz .slot .tag{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:999px}
      .scene-scope-tdz .slot.ok .tag{background:rgba(34,197,94,.2);color:var(--micro)}
      .scene-scope-tdz .slot.tdz .tag{background:rgba(239,68,68,.2);color:var(--bad)}
      .scene-scope-tdz .slot.tdz.firing{animation:scope-tdz-shake .5s ease,scope-tdz-flash 1s ease infinite}
      @keyframes scope-tdz-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
      @keyframes scope-tdz-flash{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 0 4px rgba(239,68,68,.35)}}

      .scene-scope-tdz .box-let{margin:2px 12px;border:1px dashed var(--sync);border-radius:10px;padding:6px 8px;background:rgba(79,140,255,.06);animation:scope-tdz-grow .4s ease}
      .scene-scope-tdz .box-let.gone{border-style:solid;border-color:var(--bad);opacity:.35;animation:scope-tdz-shrink .5s ease}
      .scene-scope-tdz .box-label{font-size:10px;color:var(--sync);letter-spacing:.3px;margin-bottom:3px}
      .scene-scope-tdz .box-let.gone .box-label{color:var(--bad)}
      @keyframes scope-tdz-grow{from{opacity:0;transform:scaleY(.6);transform-origin:top}to{opacity:1;transform:none}}
      @keyframes scope-tdz-shrink{from{opacity:.7}to{opacity:.35}}

      .scene-scope-tdz .out{border:1px solid var(--line);border-radius:10px;background:#0b0d12;padding:8px 12px;font-family:ui-monospace,monospace;font-size:12.5px;min-height:20px}
      .scene-scope-tdz .out-t{font-size:11px;color:var(--sub);margin-bottom:6px}
      .scene-scope-tdz .log{padding:3px 0;animation:scope-tdz-pop .35s ease}
      .scene-scope-tdz .log.undef{color:var(--macro)}
      .scene-scope-tdz .log.err{color:var(--bad);font-weight:700}
      .scene-scope-tdz .log.leak{color:var(--macro)}
      .scene-scope-tdz .log .ico{margin-right:6px}
      @keyframes scope-tdz-pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

      .scene-scope-tdz .note{font-size:12px;color:var(--sub);border-left:3px solid var(--line);padding:4px 10px;line-height:1.5}
      .scene-scope-tdz .note.win{border-left-color:var(--micro);color:var(--txt)}
    `,
    html:`<div class="scene-scope-tdz">
      <div class="cols">
        <div class="col col-var">
          <div class="col-head"><span>var</span><span class="badge">函数作用域 · 无围栏</span></div>
          <div data-region="var-hoist"></div>
          <div class="code" data-region="var-code"></div>
        </div>
        <div class="col col-let">
          <div class="col-head"><span>let / const</span><span class="badge">块级作用域 · TDZ 围栏</span></div>
          <div data-region="let-hoist"></div>
          <div class="code" data-region="let-code"></div>
        </div>
      </div>
      <div class="cols">
        <div class="out"><div class="out-t">var 栏 · 控制台</div><div data-region="var-out"></div></div>
        <div class="out"><div class="out-t">let 栏 · 控制台</div><div data-region="let-out"></div></div>
      </div>
      <div data-region="note"></div>
    </div>`,
    steps:[
      { n:`同一段代码、两栏对比：左边用 <span class="hl-macro">var</span>，右边用 <span class="hl-sync">let</span>。代码在<b>声明之前</b>就 <code>console.log</code> 了变量，并且声明被包在一个 <code>{ }</code> 块里。看看两者命运有何不同。`,
        ptr:-1, hoist:false, blockOpen:false, blockGone:false, varOut:[], letOut:[] },
      { n:`进入作用域的<b>编译阶段</b>：引擎先扫描声明，把它们<span class="hl-sync">提升</span>到作用域顶部。<b>var</b> 此刻就被初始化为 <span class="hl-macro">undefined</span>——已经"到位"，可以访问。`,
        ptr:-1, hoist:true, varSlot:'ok', letSlot:null, blockOpen:false, blockGone:false, varOut:[], letOut:[] },
      { n:`<b>let / const</b> 同样被提升了，但<b>不会</b>被初始化。它进入<span class="hl-host">暂时性死区 TDZ</span>（红色禁区）：变量存在，但在执行到声明语句前，谁碰它谁报错。`,
        ptr:-1, hoist:true, varSlot:'ok', letSlot:'tdz', blockOpen:false, blockGone:false, varOut:[], letOut:[] },
      { n:`执行指针从上往下走，走到第 1 行 <code>console.log</code>。左栏读 var——它是 undefined，于是<span class="hl-macro">安静地打印 undefined</span>，不报错。`,
        ptr:1, hoist:true, varSlot:'ok', letSlot:'tdz', blockOpen:false, blockGone:false,
        varOut:[{c:'undefined',t:'undef',ico:'▸'}], letOut:[] },
      { n:`同一行，右栏读 let——它还在 TDZ 里！于是<span class="hl-host">抛出 ReferenceError: Cannot access 'x' before initialization</span>（红色闪烁）。注意：这不是"x 未定义"，变量其实<b>已声明</b>，只是还没初始化。这就是 var 和 let 最关键的行为差异。`,
        ptr:1, hoist:true, varSlot:'ok', letSlot:'tdz', tdzFire:true, blockOpen:false, blockGone:false,
        varOut:[{c:'undefined',t:'undef',ico:'▸'}],
        letOut:[{c:"Uncaught ReferenceError: Cannot access 'x' before initialization",t:'err',ico:'✕'}] },
      { n:`指针走进 <code>{ }</code> 块。右栏的 <span class="hl-sync">let</span> 在这里创建了一个真正的<b>块级作用域盒子</b>，<code>x = 2</code> 只活在盒子内。左栏 var <b>没有</b>盒子。`,
        ptr:3, hoist:true, varSlot:'ok', letSlot:'tdz', blockOpen:true, blockGone:false,
        varOut:[{c:'undefined',t:'undef',ico:'▸'}],
        letOut:[{c:"Uncaught ReferenceError: Cannot access 'x' before initialization",t:'err',ico:'✕'}] },
      { n:`离开 <code>{ }</code>，盒子被<span class="hl-bad">销毁</span>，let 的 <code>x</code> 随之消失。而 var 因为是函数作用域，它在块里赋的 <code>x = 2</code> <span class="hl-macro">泄漏</span>到了外面，块外仍能读到 2。`,
        ptr:6, hoist:true, varSlot:'ok', letSlot:'tdz', blockOpen:false, blockGone:true,
        varOut:[{c:'undefined',t:'undef',ico:'▸'}],
        letOut:[{c:"Uncaught ReferenceError: Cannot access 'x' before initialization",t:'err',ico:'✕'}] },
      { n:`块外再 <code>console.log(x)</code>：var 栏打印 <span class="hl-macro">2</span>（变量泄漏到了块外）。let 栏依然报错——但要点是：<b>第 1 行的报错发生在声明行之前，就已经是 TDZ</b>，所以整段都是 <code>Cannot access 'x' before initialization</code>，而不是"x 未定义"。`,
        ptr:6, hoist:true, varSlot:'ok', letSlot:'tdz', blockOpen:false, blockGone:true,
        varOut:[{c:'undefined',t:'undef',ico:'▸'},{c:'2',t:'leak',ico:'▸'}],
        letOut:[{c:"Uncaught ReferenceError: Cannot access 'x' before initialization",t:'err',ico:'✕'}] },
      { n:`<b>结论金句</b>：<span class="hl-macro">var 像没有围栏的草地</span>——提升即 undefined、可提前访问、可重复声明、泄漏出块；<span class="hl-sync">let / const 有围栏还有"未到位禁区"(TDZ)</span>——块级作用域、在声明行之前访问直接报 <code>Cannot access before initialization</code>（注意不是 "not defined"）、不可重复声明，<code>const</code> 还锁死引用。优先用 const，其次 let，远离 var。`,
        ptr:-1, hoist:true, varSlot:'ok', letSlot:'tdz', blockOpen:false, blockGone:true, win:true,
        varOut:[{c:'undefined',t:'undef',ico:'▸'},{c:'2',t:'leak',ico:'▸'}],
        letOut:[{c:"Uncaught ReferenceError: Cannot access 'x' before initialization",t:'err',ico:'✕'}] }
    ],
    apply(root, i){
      const s = this.steps[i];

      // 代码行：左右两栏用各自关键字渲染
      const lines = [
        {gut:1, ind:false, html:'<span class="fn">console</span>.<span class="fn">log</span>(x)'},
        {gut:2, ind:false, kw:true},
        {gut:3, ind:false, html:'<span class="blk">{</span>'},
        {gut:4, ind:true,  assign:true},
        {gut:5, ind:false, html:'<span class="blk">}</span>'},
        {gut:6, ind:false, html:'<span class="fn">console</span>.<span class="fn">log</span>(x) <span class="blk">// 块外</span>'}
      ];
      const renderCode = (kw) => lines.map(l=>{
        let body;
        if(l.kw) body = `<span class="kw">${kw}</span> x = <span class="num">1</span>`;
        else if(l.assign) body = `${kw==='var'?'':'<span class="kw">'+kw+'</span> '}x = <span class="num">2</span>`;
        else body = l.html;
        const active = (s.ptr===l.gut) ? ' active':'';
        const ptr = (s.ptr===l.gut) ? '<span class="ptr">▶</span>':'';
        return `<div class="ln${l.ind?' indent':''}${active}">${ptr}<span class="gut">${l.gut}</span>${body}</div>`;
      }).join('');
      root.querySelector('[data-region="var-code"]').innerHTML = renderCode('var');
      root.querySelector('[data-region="let-code"]').innerHTML = renderCode('let');

      // 提升/TDZ 槽位
      const hoistVar = root.querySelector('[data-region="var-hoist"]');
      const hoistLet = root.querySelector('[data-region="let-hoist"]');
      if(s.hoist && s.varSlot){
        hoistVar.innerHTML = `<div class="hoist"><div class="hoist-t">编译阶段 · 提升到作用域顶部</div>`+
          `<div class="slot ok"><span class="nm">x</span> = <span class="val">undefined</span><span class="tag">已初始化 · 可访问</span></div></div>`;
      } else hoistVar.innerHTML = '';

      if(s.hoist && s.letSlot){
        const fire = s.tdzFire ? ' firing' : '';
        hoistLet.innerHTML = `<div class="hoist"><div class="hoist-t">编译阶段 · 提升但不初始化</div>`+
          `<div class="slot tdz${fire}"><span class="nm">x</span> = <span class="val">&lt;TDZ 死区&gt;</span><span class="tag">未初始化 · 访问即报错</span></div></div>`;
      } else hoistLet.innerHTML = '';

      // 块级盒子（只在 let 栏的代码下方表达——这里用 hoist 区追加，避免破坏代码结构）
      const letHoistBox = root.querySelector('[data-region="let-hoist"]');
      if(s.blockOpen){
        letHoistBox.insertAdjacentHTML('beforeend',
          `<div class="box-let"><div class="box-label">块级作用域盒子 { } · let x = 2 活在这里</div></div>`);
      } else if(s.blockGone){
        letHoistBox.insertAdjacentHTML('beforeend',
          `<div class="box-let gone"><div class="box-label">块退出 · 盒子已销毁，x 不复存在</div></div>`);
      }

      // 控制台输出
      const renderOut = (arr) => arr.length
        ? arr.map(l=>`<div class="log ${l.t}"><span class="ico">${l.ico}</span>${l.c}</div>`).join('')
        : `<div style="color:var(--sub)">（暂无输出）</div>`;
      root.querySelector('[data-region="var-out"]').innerHTML = renderOut(s.varOut||[]);
      root.querySelector('[data-region="let-out"]').innerHTML = renderOut(s.letOut||[]);

      // 结论
      const note = root.querySelector('[data-region="note"]');
      if(s.win){
        note.innerHTML = `<div class="note win"><b>口诀：</b>var 无围栏（提升=undefined、可提前访问、泄漏出块、可重复声明）；let/const 有围栏+未到位禁区 TDZ（块级、提前访问报错、不可重复声明，const 锁引用）。</div>`;
      } else {
        note.innerHTML = '';
      }
    }
  });
})();
</script>
<!-- scene: deep-copy -->
<script>
(function(){
  window.SCENES = window.SCENES || [];

  const POS={obj1:[28,58],obj2:[28,140],obj3:[28,286],A:[560,66],B:[560,278]};
  const CW=212, CH=58, BW=236, BH=66;
  const C={blue:'#4f8cff',green:'#22c55e',red:'#ef4444',orange:'#f59e0b',line:'#2a2f3a',panel:'#1e222b',txt:'#e6e9ef',sub:'#9aa3b2'};
  const tone=(t)=> t==='bad'?C.red : t==='micro'?C.green : C.blue;

  function card(c){
    const p=POS[c.id], x=p[0], y=p[1], col=tone(c.tone);
    return '<g class="dc-pop">'
      +'<rect x="'+x+'" y="'+y+'" width="'+CW+'" height="'+CH+'" rx="10" fill="'+C.panel+'" stroke="'+col+'" stroke-width="'+(c.tone?2.2:1.4)+'"/>'
      +'<text x="'+(x+16)+'" y="'+(y+25)+'" fill="'+C.txt+'" font-weight="700" font-size="15">'+c.label+'</text>'
      +'<text x="'+(x+16)+'" y="'+(y+45)+'" fill="'+C.sub+'" font-size="13" font-family="monospace">{ a: ● }</text>'
      +(c.badge?'<text x="'+(x+CW-14)+'" y="'+(y+25)+'" fill="'+col+'" font-size="11" text-anchor="end" font-weight="700">'+c.badge+'</text>':'')
      +'<circle cx="'+(x+CW)+'" cy="'+(y+CH/2)+'" r="4.5" fill="'+col+'"/>'
      +'</g>';
  }
  function box(b){
    const p=POS[b.id], x=p[0], y=p[1], col=tone(b.tone);
    const bg = b.tone==='bad'?'rgba(239,68,68,.13)' : b.tone==='micro'?'rgba(34,197,94,.13)' : C.panel;
    return '<g class="'+(b.flash?'dc-flash':'dc-pop')+'">'
      +'<rect x="'+x+'" y="'+y+'" width="'+BW+'" height="'+BH+'" rx="10" fill="'+bg+'" stroke="'+col+'" stroke-width="'+(b.tone?2.2:1.4)+'"/>'
      +'<text x="'+(x+16)+'" y="'+(y+24)+'" fill="'+C.sub+'" font-size="12">'+(b.label||'堆里的对象')+'</text>'
      +'<text x="'+(x+16)+'" y="'+(y+51)+'" fill="'+col+'" font-size="22" font-weight="800" font-family="monospace">'+b.text+'</text>'
      +'</g>';
  }
  function arrow(a){
    const id='dc-ah-'+a.color;
    return '<line x1="'+a.x1+'" y1="'+a.y1+'" x2="'+(a.x2-9)+'" y2="'+a.y2+'" stroke="'+a.color+'" stroke-width="2.6" marker-end="url(#'+id+')" class="dc-draw"/>';
  }
  function aFromTo(fromId,toId,color){
    const f=POS[fromId], t=POS[toId];
    return {x1:f[0]+CW, y1:f[1]+CH/2, x2:t[0], y2:t[1]+BH/2, color:color};
  }
  function buildSVG(s){
    const defs='<defs>'
      +'<marker id="dc-ah-'+C.blue+'" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="'+C.blue+'"/></marker>'
      +'<marker id="dc-ah-'+C.red+'" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="'+C.red+'"/></marker>'
      +'<marker id="dc-ah-'+C.green+'" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="'+C.green+'"/></marker>'
      +'</defs>';
    const lblL='<text x="28" y="34" fill="'+C.sub+'" font-size="13" font-weight="700">栈 · 变量</text>';
    const lblR='<text x="560" y="34" fill="'+C.sub+'" font-size="13" font-weight="700">堆 · 对象真正待的地方</text>';
    const arrows=(s.arrows||[]).map(arrow).join('');
    const cards=(s.cards||[]).map(card).join('');
    const boxes=(s.boxes||[]).map(box).join('');
    return '<svg viewBox="0 0 810 372" xmlns="http://www.w3.org/2000/svg">'+defs+lblL+lblR+arrows+cards+boxes+'</svg>';
  }

  window.SCENES.push({
    id:'deep-copy', title:'深拷贝 vs 浅拷贝', cat:'JS 基础',
    css:`
      .scene-deep-copy [data-region="dc"]{min-height:380px}
      .scene-deep-copy svg{width:100%;height:auto;max-width:810px;display:block;margin:0 auto}
      .scene-deep-copy .dc-pop{animation:dc-pop .4s ease both}
      .scene-deep-copy .dc-flash{animation:dc-flash .8s ease both}
      .scene-deep-copy .dc-draw{stroke-dasharray:380;stroke-dashoffset:380;animation:dc-draw .5s ease .12s forwards}
      @keyframes dc-pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
      @keyframes dc-draw{to{stroke-dashoffset:0}}
      @keyframes dc-flash{0%{opacity:.25}45%{opacity:1}70%{opacity:.55}100%{opacity:1}}
      .scene-deep-copy .dc-panel{display:flex;flex-direction:column;gap:12px;animation:dc-pop .4s ease both}
      .scene-deep-copy .dc-m{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--sync);border-radius:12px;padding:13px 16px;font-size:14px;line-height:1.7}
      .scene-deep-copy .dc-m b{color:#fff;font-family:ui-monospace,monospace}
      .scene-deep-copy .bad{color:var(--bad);font-weight:700}
      .scene-deep-copy .ok{color:var(--micro);font-weight:700}
      .scene-deep-copy .dc-circ{display:flex;flex-direction:column;align-items:center;gap:8px;margin:6px 0 14px}
      .scene-deep-copy .dc-objbox{font-family:ui-monospace,monospace;font-size:16px;background:var(--panel);border:1.5px solid var(--macro);border-radius:12px;padding:12px 22px;position:relative}
      .scene-deep-copy .dc-objbox .loop{color:var(--macro);font-weight:800;margin-left:8px}
      .scene-deep-copy .dc-sub{color:var(--sub);font-size:12.5px}
      .scene-deep-copy .dc-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      @media(max-width:600px){.scene-deep-copy .dc-row{grid-template-columns:1fr}}
      .scene-deep-copy .dc-case{border-radius:12px;padding:13px 15px;font-size:13.5px;line-height:1.7;border:1px solid var(--line);background:var(--panel)}
      .scene-deep-copy .dc-case.bad{border-color:rgba(239,68,68,.5)}
      .scene-deep-copy .dc-case.ok{border-color:rgba(34,197,94,.5)}
      .scene-deep-copy .dc-final{gap:14px}
      .scene-deep-copy .dc-f-row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14.5px;line-height:1.7}
      .scene-deep-copy .tag{display:inline-block;border-radius:7px;padding:2px 10px;font-weight:700;font-size:12.5px;margin-right:8px}
      .scene-deep-copy .tag.macro{background:rgba(245,158,11,.16);color:var(--macro);border:1px solid rgba(245,158,11,.4)}
      .scene-deep-copy .tag.micro{background:rgba(34,197,94,.16);color:var(--micro);border:1px solid rgba(34,197,94,.4)}
      .scene-deep-copy .dc-tip{color:var(--sub);font-size:13px;border-left:3px solid var(--sync);padding-left:10px;line-height:1.6}
    `,
    html:`<div class="scene-deep-copy"><div data-region="dc"></div></div>`,
    steps:[
      { n:`先看一个嵌套对象 <b>obj1 = { a: { x: 1 } }</b>。注意 <b>a 不直接存值</b>，而是一根<span class="hl-sync">箭头</span>指向堆里的对象 <b>{ x: 1 }</b>。`,
        svg:{ cards:[{id:'obj1',label:'obj1'}], boxes:[{id:'A',label:'obj1.a 指向 →',text:'{ x: 1 }'}],
              arrows:[aFromTo('obj1','A',C.blue)] } },

      { n:`浅拷贝 <b>obj2 = {...obj1}</b>。obj2 是个新对象，但浅拷贝<b>只复制第一层</b> —— a 这根箭头被<b>原样照抄</b>，还是指向同一块。看：<span class="hl-sync">两根箭头，同一个盒子</span>。`,
        svg:{ cards:[{id:'obj1',label:'obj1'},{id:'obj2',label:'obj2',badge:'浅拷贝'}],
              boxes:[{id:'A',label:'obj1.a 和 obj2.a 都指它',text:'{ x: 1 }'}],
              arrows:[aFromTo('obj1','A',C.blue),aFromTo('obj2','A',C.blue)] } },

      { n:`执行 <b>obj2.a.x = 9</b>。两根箭头指向同一块 → 盒子变成 <b>{ x: 9 }</b>，于是 <b>obj1.a.x 也变成了 9</b>！<span class="hl-bad">改 obj2 却连累了 obj1</span> —— 这就是浅拷贝的共享坑。`,
        svg:{ cards:[{id:'obj1',label:'obj1',tone:'bad'},{id:'obj2',label:'obj2',badge:'浅拷贝',tone:'bad'}],
              boxes:[{id:'A',label:'同一块 → 一起变',text:'{ x: 9 }',tone:'bad',flash:true}],
              arrows:[aFromTo('obj1','A',C.red),aFromTo('obj2','A',C.red)] } },

      { n:`换<b>深拷贝</b> <b>obj3 = deepClone(obj1)</b>。深拷贝<b>递归复制每一层</b> —— 堆里<span class="hl-micro">诞生一块全新的</span> { x:1 }，obj3.a 指向<b>自己这块</b>，和 obj1 再无瓜葛。（obj1 已复位成 1）`,
        svg:{ cards:[{id:'obj1',label:'obj1'},{id:'obj3',label:'obj3',badge:'深拷贝',tone:'micro'}],
              boxes:[{id:'A',label:'obj1 的（原来那块）',text:'{ x: 1 }'},{id:'B',label:'obj3 的（全新一块）',text:'{ x: 1 }',tone:'micro'}],
              arrows:[aFromTo('obj1','A',C.blue),aFromTo('obj3','B',C.green)] } },

      { n:`执行 <b>obj3.a.x = 7</b>。只动了 obj3 自己那块 → 它变 <b>7</b>，<span class="hl-micro">obj1 那块还是 1，纹丝不动</span>。各指各的盒子、互不影响 —— 这就是深拷贝。`,
        svg:{ cards:[{id:'obj1',label:'obj1'},{id:'obj3',label:'obj3',badge:'深拷贝',tone:'micro'}],
              boxes:[{id:'A',label:'obj1 的 · 不受影响',text:'{ x: 1 }'},{id:'B',label:'obj3 的 · 只改这块',text:'{ x: 7 }',tone:'micro',flash:true}],
              arrows:[aFromTo('obj1','A',C.blue),aFromTo('obj3','B',C.green)] } },

      { n:`那<b>怎么深拷贝</b>？三种常见方式，各有取舍。`,
        panel:`<div class="dc-panel">
          <div class="dc-m"><b>① JSON.parse(JSON.stringify(obj))</b><div>最省事，但会<span class="bad">丢掉函数 / undefined / Symbol</span>，遇<span class="bad">循环引用直接报错</span>，Date 会变字符串。</div></div>
          <div class="dc-m"><b>② structuredClone(obj)</b><div>现代浏览器<span class="ok">原生深拷贝</span>，支持循环引用、Date、Map/Set；但不能拷函数。</div></div>
          <div class="dc-m"><b>③ 手写递归 + WeakMap</b><div>自己递归复制每一层；用 <span class="ok">WeakMap 缓存已拷贝对象</span>来解决循环引用。<b>面试最爱考</b>（手撕训练里有完整实现）。</div></div>
        </div>` },

      { n:`为什么循环引用会出事？<b>obj.self = obj</b>（自己指向自己）。`,
        panel:`<div class="dc-panel">
          <div class="dc-circ">
            <div class="dc-objbox">obj <span class="loop">↺ .self</span></div>
            <div class="dc-sub">obj.self = obj —— 形成一个环</div>
          </div>
          <div class="dc-row">
            <div class="dc-case bad"><b>JSON.stringify(obj)</b><br>💥 <span class="bad">RangeError</span>：顺着 self 无限往里转，<b>栈爆了</b>。</div>
            <div class="dc-case ok"><b>WeakMap 方案</b><br>✓ 拷 obj 前先 <b>记进 WeakMap</b>；递归再遇到同一个 obj → <span class="ok">命中缓存直接返回</span>，<b>不再无限递归</b>。</div>
          </div>
        </div>` },

      { n:`一句话总结：<b>看箭头指向哪</b> —— 指同一块就是浅、指各自的新块就是深。`,
        panel:`<div class="dc-panel dc-final">
          <div class="dc-f-row"><span class="tag macro">浅拷贝</span>只复制第一层 → 里层<b>两根箭头共用同一块</b> → 改一个、另一个跟着变。</div>
          <div class="dc-f-row"><span class="tag micro">深拷贝</span>递归复制每一层 → <b>各指各的新块</b> → 互不影响。</div>
          <div class="dc-tip">JSON 法图省事，循环引用 / 函数场景用 structuredClone 或手写 + WeakMap。</div>
        </div>` },
    ],
    apply(root, i){
      const s=this.steps[i];
      const host=root.querySelector('[data-region="dc"]');
      host.innerHTML = s.panel ? s.panel : buildSVG(s.svg);
    }
  });
})();
</script>

<script>
(function(){
  window.SCENES = window.SCENES || [];
  window.SCENES.push({
    id:'equality', title:'== vs === 类型转换', cat:'JS 基础',
    css:`
      .scene-equality{display:flex;flex-direction:column;gap:14px}
      .scene-equality .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
      @media(max-width:680px){.scene-equality .grid{grid-template-columns:1fr}}
      .scene-equality .col{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:14px;display:flex;flex-direction:column;gap:10px;min-height:240px}
      .scene-equality .col h4{margin:0;font-size:14px;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
      .scene-equality .badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
      .scene-equality .badge.loose{background:rgba(245,158,11,.15);border:1px solid var(--macro);color:var(--macro)}
      .scene-equality .badge.strict{background:rgba(79,140,255,.15);border:1px solid var(--sync);color:var(--sync)}
      .scene-equality .expr{font-family:ui-monospace,Menlo,monospace;font-size:15px;color:var(--txt);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;text-align:center}
      .scene-equality .belt{display:flex;flex-direction:column;gap:8px}
      .scene-equality .row{display:flex;align-items:center;justify-content:center;gap:10px}
      .scene-equality .val{font-family:ui-monospace,Menlo,monospace;font-size:15px;min-width:70px;text-align:center;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);animation:equality-pop .35s ease}
      .scene-equality .val .ty{display:block;font-size:10px;color:var(--sub);margin-top:2px;font-family:system-ui}
      .scene-equality .val.num{border-color:var(--sync);color:#bcd4ff}
      .scene-equality .val.str{border-color:var(--macro);color:#ffe0a8}
      .scene-equality .val.bool{border-color:var(--host);color:#e6c9ff}
      .scene-equality .val.nul{border-color:var(--sub)}
      .scene-equality .val.match{border-color:var(--micro);color:#bbf7d0;box-shadow:0 0 0 2px rgba(34,197,94,.25)}
      .scene-equality .op{font-family:ui-monospace,Menlo,monospace;font-size:18px;color:var(--sub);font-weight:700}
      .scene-equality .step{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px;animation:equality-slide .4s ease}
      .scene-equality .step .arrow{color:var(--macro);font-weight:700}
      .scene-equality .step b{color:var(--txt)}
      .scene-equality .result{margin-top:auto;text-align:center;font-family:ui-monospace,Menlo,monospace;font-size:20px;font-weight:700;padding:10px;border-radius:10px;border:1px dashed var(--line);animation:equality-pop .4s ease}
      .scene-equality .result.t{color:var(--micro);border-color:var(--micro);background:rgba(34,197,94,.1)}
      .scene-equality .result.f{color:var(--bad);border-color:var(--bad);background:rgba(239,68,68,.1)}
      .scene-equality .result.idle{color:var(--sub)}
      .scene-equality .note{font-size:12px;color:var(--sub);line-height:1.5}
      .scene-equality .machine{font-size:11px;letter-spacing:1px;color:var(--macro);text-transform:uppercase}
      .scene-equality .cut{color:var(--bad);font-weight:700;font-family:ui-monospace,monospace;animation:equality-pop .3s ease}
      @keyframes equality-pop{from{opacity:0;transform:translateY(-8px) scale(.95)}to{opacity:1;transform:none}}
      @keyframes equality-slide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
    `,
    html:`<div class="scene-equality">
      <div class="grid">
        <div class="col" data-region="loose">
          <h4><span class="badge loose">==</span> 类型转换流水线</h4>
          <div data-region="loose-body"></div>
        </div>
        <div class="col" data-region="strict">
          <h4><span class="badge strict">===</span> 直性子·只看类型</h4>
          <div data-region="strict-body"></div>
        </div>
      </div>
      <div class="note" data-region="note"></div>
    </div>`,
    steps:[
      { n:`先看 <b>1 == '1'</b>。左边是 <span class="hl-sync">number</span>，右边是 <span class="hl-macro">string</span>，<b>类型不同</b>——<span class="hl-macro">==</span> 不会立刻放弃，而是把它们送进类型转换流水线。`,
        expr:`1 == '1'`,
        loose:{ rows:[ {v:'1',ty:'number',c:'num'},{v:"'1'",ty:'string',c:'str'} ], steps:[], result:null },
        strict:null, note:`<b>===</b> 这边先按兵不动。我们先看左边 <b>==</b> 怎么把不同类型「捏」成同类型。` },
      { n:`流水线规则：遇到 <span class="hl-sync">number</span> 对 <span class="hl-macro">string</span>，就把字符串转成数字。<b>'1' → 1</b>。`,
        expr:`1 == '1'`,
        loose:{ rows:[ {v:'1',ty:'number',c:'num'},{v:'1',ty:'number',c:'num'} ], steps:[ {t:`String→Number：<b>'1'</b> 转成 <b>1</b>`} ], result:null },
        strict:null, note:`字符串 <b>'1'</b> 变形为数字 <b>1</b>，现在两边都是 number 了。` },
      { n:`两边都是 number，直接比：<b>1 === 1</b> → <span class="hl-micro">true</span>。这就是为什么 <b>1 == '1'</b> 是 true。`,
        expr:`1 == '1'`,
        loose:{ rows:[ {v:'1',ty:'number',c:'match'},{v:'1',ty:'number',c:'match'} ], steps:[ {t:`String→Number：<b>'1'</b> 转成 <b>1</b>`},{t:`同类型比较：<b>1 === 1</b>`} ], result:true },
        strict:null, note:`一套「转换瀑布」走完，得到 true。下面换一个更烧脑的例子。` },
      { n:`经典烧脑题：<b>[] == ![]</b>。直觉上一个数组怎么会等于「它自己的取反」？跟着流水线一步步推。`,
        expr:`[] == ![]`,
        loose:{ rows:[ {v:'[]',ty:'object',c:'nul'},{v:'![]',ty:'?',c:'nul'} ], steps:[], result:null },
        strict:null, note:`先处理 <b>![]</b>：<b>!</b> 优先级高，先算它。` },
      { n:`<b>![]</b>：数组是对象，对象是 <span class="hl-micro">truthy</span>，取反得 <b>false</b>。所以右边变成 <b>false</b>（boolean）。`,
        expr:`[] == ![]`,
        loose:{ rows:[ {v:'[]',ty:'object',c:'nul'},{v:'false',ty:'boolean',c:'bool'} ], steps:[ {t:`![] → <b>!truthy</b> → <b>false</b>`} ], result:null },
        strict:null, note:`现在比较变成 <b>[] == false</b>：object 对 boolean。` },
      { n:`规则：有 <span class="hl-host">boolean</span> 时先把它转 number。<b>false → 0</b>。比较变成 <b>[] == 0</b>。`,
        expr:`[] == ![]`,
        loose:{ rows:[ {v:'[]',ty:'object',c:'nul'},{v:'0',ty:'number',c:'num'} ], steps:[ {t:`![] → <b>false</b>`},{t:`Boolean→Number：<b>false → 0</b>`} ], result:null },
        strict:null, note:`还剩 object 对 number，需要把对象 <b>[]</b> 转成原始值。` },
      { n:`<span class="hl-host">object→原始值</span>：先 valueOf() 没用，再 toString()。空数组 <b>[].toString() → ''</b>（空字符串）。比较变成 <b>'' == 0</b>。`,
        expr:`[] == ![]`,
        loose:{ rows:[ {v:"''",ty:'string',c:'str'},{v:'0',ty:'number',c:'num'} ], steps:[ {t:`![] → <b>false</b> → <b>0</b>`},{t:`Object→Primitive：<b>[].toString()</b> → <b>''</b>`} ], result:null },
        strict:null, note:`最后一步：string 对 number，把字符串转数字。` },
      { n:`<b>'' → 0</b>（空字符串转数字是 0）。于是 <b>0 == 0</b> → <span class="hl-micro">true</span>！<b>[] == ![]</b> 竟然是 true，全靠这条转换瀑布。`,
        expr:`[] == ![]`,
        loose:{ rows:[ {v:'0',ty:'number',c:'match'},{v:'0',ty:'number',c:'match'} ], steps:[ {t:`![] → <b>false</b> → <b>0</b>`},{t:`[] → <b>''</b>`},{t:`String→Number：<b>'' → 0</b>`},{t:`<b>0 === 0</b>`} ], result:true },
        strict:null, note:`aha：<b>[] == ![]</b> 的 true，是 boolean→number→object→primitive→string→number 一连串隐式转换的结果。` },
      { n:`再看几个常考陷阱：<b>0 == ''</b> 同样都转成 0 → <span class="hl-micro">true</span>；<b>null == undefined</b> 是规则特批的 <span class="hl-micro">true</span>；而 <b>NaN == NaN</b> 永远 <span class="hl-bad" style="color:var(--bad)">false</span>。`,
        expr:`经典清单`,
        loose:{ list:[ {e:`0 == ''`,r:true,why:`'' → 0，0 == 0`},{e:`1 == '1'`,r:true,why:`'1' → 1`},{e:`null == undefined`,r:true,why:`规则特批，两者互等`},{e:`[] == ![]`,r:true,why:`一路转成 0 == 0`},{e:`NaN == NaN`,r:false,why:`NaN 和谁都不等`} ] },
        strict:null, note:`这些「反直觉」结论，本质都是隐式转换规则在背后悄悄运行。` },
      { n:`现在看右边 <span class="hl-sync">===</span> 的活法。同样喂它 <b>1 === '1'</b>：它<b>第一眼只看类型</b>。`,
        expr:null,
        loose:null,
        strict:{ expr:`1 === '1'`, rows:[ {v:'1',ty:'number',c:'num'},{v:"'1'",ty:'string',c:'str'} ], cut:false, result:null },
        note:`<b>===</b> 不进流水线，先比 type：<b>number</b> vs <b>string</b>。` },
      { n:`类型不同？<span class="hl-sync">===</span> 直接返回 <span class="hl-bad" style="color:var(--bad)">false</span>，<b>连转换都不做</b>。结论：<b>==</b> 背后藏着一整套转换瀑布，<b>===</b> 是不绕弯的直性子——日常一律用 <b>===</b>。`,
        expr:null,
        loose:null,
        strict:{ expr:`1 === '1'`, rows:[ {v:'1',ty:'number',c:'num'},{v:"'1'",ty:'string',c:'str'} ], cut:true, result:false },
        note:`金句：<b>== 比的是「值像不像」，=== 比的是「身份+值一不一样」。</b> 想躲开转换瀑布，就用 ===。` }
    ],
    apply(root, i){
      const s = this.steps[i];
      const lb = root.querySelector('[data-region="loose-body"]');
      const sb = root.querySelector('[data-region="strict-body"]');
      const note = root.querySelector('[data-region="note"]');

      const valHtml = (r)=>`<div class="val ${r.c}">${r.v}<span class="ty">${r.ty}</span></div>`;

      // LOOSE column
      if(s.loose){
        let h = '';
        if(s.expr) h += `<div class="expr">${s.expr}</div>`;
        if(s.loose.list){
          h += `<div class="belt">` + s.loose.list.map(it=>{
            const cls = it.r ? 't':'f';
            return `<div class="step" style="justify-content:space-between"><span class="op" style="font-size:13px">${it.e}</span><span class="arrow">${it.why}</span><span class="result ${cls}" style="margin:0;padding:2px 10px;font-size:14px;border-style:solid">${it.r}</span></div>`;
          }).join('') + `</div>`;
        } else {
          h += `<div class="machine">▸ 流水线运行中</div>`;
          h += `<div class="row">${valHtml(s.loose.rows[0])}<span class="op">==</span>${valHtml(s.loose.rows[1])}</div>`;
          if(s.loose.steps && s.loose.steps.length){
            h += `<div class="belt">` + s.loose.steps.map(st=>`<div class="step"><span class="arrow">↳</span><span>${st.t}</span></div>`).join('') + `</div>`;
          }
          if(s.loose.result===true) h += `<div class="result t">→ true</div>`;
          else if(s.loose.result===false) h += `<div class="result f">→ false</div>`;
          else h += `<div class="result idle">转换中…</div>`;
        }
        lb.innerHTML = h;
      } else {
        lb.innerHTML = `<div class="note" style="margin:auto 0">流水线已演示完毕，看右边的 <b>===</b>。</div>`;
      }

      // STRICT column
      if(s.strict){
        let h = `<div class="expr">${s.strict.expr}</div>`;
        h += `<div class="machine" style="color:var(--sync)">▸ 只比类型，不转换</div>`;
        h += `<div class="row">${valHtml(s.strict.rows[0])}<span class="op">===</span>${valHtml(s.strict.rows[1])}</div>`;
        if(s.strict.cut){
          h += `<div class="step"><span class="cut">✕ 类型不同 → 短路</span></div>`;
        } else {
          h += `<div class="step"><span class="arrow">?</span><span>对比 typeof：<b>number</b> vs <b>string</b></span></div>`;
        }
        if(s.strict.result===false) h += `<div class="result f">→ false</div>`;
        else if(s.strict.result===true) h += `<div class="result t">→ true</div>`;
        else h += `<div class="result idle">检查类型…</div>`;
        sb.innerHTML = h;
      } else {
        sb.innerHTML = `<div class="note" style="margin:auto 0;color:var(--sub)">稍等——先让 <b>==</b> 把它的转换瀑布走完，再轮到我登场。</div>`;
      }

      note.innerHTML = s.note || '';
    }
  });
})();
</script>

    `,
    html:`<div class="scene-react-diff">

    </div>`,
    steps:[
      {
        n:`初始列表 <b>[A, B, C]</b>。每一项都是带输入框的组件，里面填了各自的内容。左右两栏将分别用<span class="hl-bad">index 当 key</span> 和 <span class="hl-micro">业务 id 当 key</span> 做对照。`,

      },
      {
        n:`React 的 diff 是<span class="hl-sync">同层逐个比较</span>：它把新旧两棵子树<b>按位置一一对位</b>，再靠 key 判断「这个位置的节点还是不是原来那个」。`,
        mode:'init',
        list:[
          {id:'a',label:'A',val:'苹果'},
          {id:'b',label:'B',val:'香蕉'},
          {id:'c',label:'C',val:'樱桃'}

      {
        n:`现在要在<b>头部插入</b>新项 <b>X</b>，列表变成 <b>[X, A, B, C]</b>。看两种 key 策略各自怎么 diff。`,
        mode:'insert',
        list:[
          {id:'a',label:'A',val:'苹果'},
          {id:'b',label:'B',val:'香蕉'},
          {id:'c',label:'C',val:'樱桃'}
        ],
        leftVerdict:null, rightVerdict:null
      },
      {
        n:`<b>左栏(index key)</b>：key 就是 0/1/2/3。React 对位发现——位置 0 的 key=0 还在，但内容从 <b>A</b> 变成了 <b>X</b>，于是认为「<span class="hl-bad">0 号节点变了</span>」，原地改它而不是新建。`,
        mode:'index',
        list:[
          {id:'x',label:'X',val:'西瓜'},
          {id:'a',label:'A',val:'苹果'},
          {id:'b',label:'B',val:'香蕉'},
          {id:'c',label:'C',val:'樱桃'}
        ],
        idxRemount:[true,false,false,false],
        idxScramble:[false,false,false,false],
        rightShown:false,
        leftVerdict:null, rightVerdict:null
      },
      {
        n:`往下顺推：位置 1(key=1) 内容从 B 变 A、位置 2 从 C 变 B，这<b>三个原有节点都被判定「变了」、原地重渲染</b>；而位置 3 是<b>新挂载</b>一个节点。<span class="hl-bad">结果是 3 个原地重渲染 + 1 个新挂载，整列无一幸免</span>。`,
        mode:'index',
        list:[
          {id:'x',label:'X',val:'西瓜'},
          {id:'a',label:'A',val:'苹果'},
          {id:'b',label:'B',val:'香蕉'},
          {id:'c',label:'C',val:'樱桃'}
        ],
        idxRemount:[true,true,true,true],
        idxScramble:[false,false,false,false],
        rightShown:false,
        leftVerdict:null, rightVerdict:null
      },
      {
        n:`更糟的是<span class="hl-bad">受控输入框的值会串位</span>：React 复用了旧的 DOM 输入框，只换了 props，于是 X 这一行里残留着原本 A 的输入内容，内容整体往下错了一位。`,
        mode:'index',
        list:[
          {id:'x',label:'X',val:'苹果'},
          {id:'a',label:'A',val:'香蕉'},
          {id:'b',label:'B',val:'樱桃'},
          {id:'c',label:'C',val:''}
        ],
        idxRemount:[true,true,true,true],
        idxScramble:[true,true,true,true],
        rightShown:false,
        leftVerdict:{type:'bad',text:'index key：4 个节点全部重渲染，输入框内容整体串位 — 错误又低效'},
        rightVerdict:null
      },
      {
        n:`<b>右栏(业务 id key)</b>：key 是稳定的 <b>a/b/c</b>。React 在新列表里仍然找得到 key=a、b、c，立刻<span class="hl-micro">认出它们还是原来那仨</span>。`,
        mode:'id',
        list:[
          {id:'x',label:'X',val:'西瓜'},
          {id:'a',label:'A',val:'苹果'},
          {id:'b',label:'B',val:'香蕉'},
          {id:'c',label:'C',val:'樱桃'}
        ],
        idReuse:[false,true,true,true],
        idNew:[true,false,false,false],
        leftVerdict:{type:'muted',text:'index key 的结果（对照）'},
        rightVerdict:null
      },
      {
        n:`于是 A/B/C <span class="hl-micro">原地复用</span>、输入框内容<b>纹丝不动</b>，只有 <b>X</b> 被当作真正的新增节点 —— <span class="hl-micro">只有 X 亮绿滑入</span>。`,
        mode:'id',
        list:[
          {id:'x',label:'X',val:'西瓜'},
          {id:'a',label:'A',val:'苹果'},
          {id:'b',label:'B',val:'香蕉'},
          {id:'c',label:'C',val:'樱桃'}
        ],
        idReuse:[false,true,true,true],
        idNew:[true,false,false,false],
        leftVerdict:{type:'muted',text:'index key 的结果（对照）'},
        rightVerdict:{type:'good',text:'稳定 id key：A/B/C 复用、输入框不串位，仅新增 X — 正确又高效'}
      },
      {
        n:`<b>aha：key 是节点的身份证。</b> 它让 React 跨越「位置」认出「还是原来那个组件」，从而复用真实 DOM 与内部状态。<span class="hl-bad">用 index 当 key</span>，身份会随位置漂移，头部插入/删除/排序时必然错乱；<span class="hl-micro">用稳定业务 id</span>，身份恒定，复用精准。`,
        mode:'id',
        list:[

          {id:'a',label:'A',val:'苹果'},
          {id:'b',label:'B',val:'香蕉'},
          {id:'c',label:'C',val:'樱桃'}
        ],
        idReuse:[false,true,true,true],
        idNew:[true,false,false,false],
        leftVerdict:{type:'bad',text:'index key → 全列重渲染 + 串位'},

    apply(root, i){
      const s = this.steps[i];
      const leadEl = root.querySelector('[data-region="lead"]');
      const insEl = root.querySelector('[data-region="ins"]');
      const leftEl = root.querySelector('[data-region="left"]');
      const rightEl = root.querySelector('[data-region="right"]');

      const esc = (t)=> (t==null?'':String(t));

      const lead = (s.mode==='init')
        ? 'React 不直接操作真实 DOM，而是 diff 新旧虚拟 DOM 树，算出最小改动再落地。'
        : (s.mode==='insert')
          ? '同样的「头部插入」，key 策略不同，diff 的结论天差地别。'
          : 'key 决定了 React 把同一位置的新旧节点看成「同一个」还是「换了一个」。';
      leadEl.textContent = lead;

      // 插入提示条只在列表里真的出现了 X 时显示（与 X 的实际出现时机保持一致）
      const inserted = s.list.some((it)=> it.id === 'x');
      insEl.innerHTML = inserted
        ? `<div class="insbar">⬆️ 在头部插入新项 <b style="color:var(--txt)">&nbsp;X&nbsp;</b> ，列表变为 [X, A, B, C]</div>`
        : '';

      const rowHtml = (item, opts)=>{
        const cls = ['row'];
        if(opts.reuse) cls.push('reuse');
        if(opts.isNew) cls.push('new');
        if(opts.remount) cls.push('remount');
        const valHtml = item.val
          ? `<span class="${opts.scramble?'scrambled':''}">${esc(item.val)}</span>`
          : `<span class="ph">（空）</span>`;
        return `<div class="${cls.join(' ')}">
          <div class="badge">${esc(item.label)}</div>
          <div class="kbox">key=<b>${esc(opts.keytext)}</b></div>
          <div class="field">
            <div class="flbl">输入框</div>
            <div class="input">${valHtml}</div>
          </div>
        </div>`;
      };

      const verdictHtml = (v)=> v ? `<div class="verdict ${v.type}">${v.text}</div>` : '';

      // ----- LEFT panel: index key -----
      const isResultPhase = (s.mode==='index') || (s.mode==='id');
      const leftRows = s.list.map((item, idx)=>{
        const remount = isResultPhase && s.idxRemount ? !!s.idxRemount[idx] : false;
        const scramble = isResultPhase && s.idxScramble ? !!s.idxScramble[idx] : false;
        return rowHtml(item, {keytext:String(idx), remount, scramble, isNew:false, reuse:false});
      }).join('');
      leftEl.innerHTML = `
        <div class="phead">列表组件 <span class="tag bad">key = index</span>
          <span class="keylabel">key=0,1,2,3</span>
        </div>
        <div class="list">${leftRows}</div>
        ${verdictHtml(s.leftVerdict)}`;

      // ----- RIGHT panel: stable id key -----
      // 门控：index 讲解阶段(rightShown:false)右栏还轮不到出场，先显示等待占位，
      // 避免抢在自己旁白前、且以「正确」表头展示串位后的错误内容。
      const rightShown = s.rightShown !== false;
      if(!rightShown){
        rightEl.innerHTML = `
          <div class="phead">列表组件 <span class="tag idle">key = item.id</span>
            <span class="keylabel">稍后登场</span>
          </div>
          <div class="waiting">⏳ 先看左栏 index key 的结果，右栏的稳定 id key 策略马上单独分析 →</div>`;
      } else {
        const rightRows = s.list.map((item, idx)=>{
          const isIdPhase = (s.mode==='id');
          const reuse = isIdPhase && s.idReuse ? !!s.idReuse[idx] : false;
          const isNew = isIdPhase && s.idNew ? !!s.idNew[idx] : false;
          return rowHtml(item, {keytext:item.id, remount:false, scramble:false, isNew, reuse});
        }).join('');
        rightEl.innerHTML = `
          <div class="phead">列表组件 <span class="tag good">key = item.id</span>
            <span class="keylabel">key=a,b,c…</span>
          </div>

        count:1, fired:false, wrapped:true, propStyle:'static', fn:false, useCb:false,

      { n:`再次 <span class="hl-sync">setCount</span>。这次两个子的 prop 是同一个原始值，浅比较通过 → <span class="hl-micro">跳过渲染</span>，不再闪红！`,
        count:2, fired:true, wrapped:true, propStyle:'static', fn:false, useCb:false,

      { n:`但现在父给 ChildB 传一个 <span class="hl-bad">内联箭头函数</span> 当回调：<code>onClick={()=>...}</code>。看起来人畜无害。`,
        count:2, fired:false, wrapped:true, propStyle:'inline', fn:true, useCb:false,

      { n:`再 <span class="hl-sync">setCount</span>。父重渲染时那个箭头函数是<span class="hl-bad">全新的引用</span>，浅比较 <code>oldFn === newFn</code> 失败 → memo 失效，ChildB 又闪红！`,

        return `<div class="child ${st}">
          <div class="cname">Child${which} ${wrapTag}</div>
          <div class="prop">${propLine(which)}</div>
          ${refRow(which)}

        </div>`;
      };

      const parentFlash = s.fired ? 'flash' : '';
      const btnFired = s.fired ? 'fired' : '';
      const countBump = s.fired ? 'bump' : '';

      let cbCode = '';
      if(s.propStyle==='inline'){
        cbCode = `<div class="codeline">&lt;ChildB <span class="cr">onClick={() =&gt; doSomething()}</span> /&gt;   <span style="color:var(--bad)">// 每次渲染新函数</span></div>`;
      } else if(s.propStyle==='callback'){
        cbCode = `<div class="codeline">const cb = <span class="cg">useCallback</span>(() =&gt; doSomething(), []);
&lt;ChildB onClick={cb} /&gt;   <span style="color:var(--micro)">// 引用稳定</span></div>`;
      }

      let eqCode = '';
      if(s.showEq){
        eqCode = `<div class="codeline"><span class="cg">useCallback</span>(fn, deps)  ≡  <span class="cb">useMemo</span>(() =&gt; fn, deps)</div>`;
      }

      let abuseLine = '';
      if(s.abuse){
        abuseLine = `<div class="codeline" style="border-color:var(--macro);color:var(--macro)">⚠ 缓存/比较/依赖数组都有开销 —— 不是越多越好</div>`;
      }

      const parent = root.querySelector('[data-region="parent"]');
      parent.innerHTML = `
        <div class="parent ${parentFlash}">
          <div class="ptitle">
            <div class="lbl">Parent <small>持有 count 状态</small></div>

          ${abuseLine}
        </div>`;

      const noteEl = root.querySelector('[data-region="note"]');
      noteEl.innerHTML = `<div class="note ${s.note.cls}">${s.note.html}</div>`;
    }
  });
})();

    steps:[
