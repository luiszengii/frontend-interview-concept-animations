        view:'timeline',
        rows:[ {kind:'render',lbl:'挂载 · 渲染', node:'M', desc:'<code>userId=1</code> 首次渲染完成', active:true} ] },

      { n:`渲染提交后，<span class="hl-micro">setup 运行</span>：建立订阅 / 启动定时器。注意 effect 总是在<b>渲染之后</b>异步执行，而不是渲染过程中。`,
        view:'timeline',
        rows:[
          {kind:'render',lbl:'挂载 · 渲染', node:'M', desc:'<code>userId=1</code>'},
          {kind:'setup',lbl:'setup ①', tag:'setup', node:'+', desc:'subscribe(userId=1) — <code>userId=1</code> 的订阅已建立', active:true}
        ] },

      { n:`依赖 <code>userId</code> 从 1 变成 2，触发<span class="hl-sync">重新渲染</span>。React 发现依赖数组里的值变了，决定重跑这个 effect。`,
        view:'timeline',
        rows:[
          {kind:'render',lbl:'挂载 · 渲染', node:'M', desc:'<code>userId=1</code>'},
          {kind:'setup',lbl:'setup ①', tag:'setup', node:'+', desc:'subscribe(1)'},
          {kind:'render',lbl:'重渲染 · 依赖变化', node:'R', tag:'dep', desc:'<code>userId: 1 → 2</code>，依赖数组变了', active:true}
        ] },

      { n:`关键顺序：<b>先</b>运行上一次的 <span class="hl-macro">cleanup</span>（退订旧的），<b>再</b>运行新的 setup。cleanup 总是先行——这就是为什么订阅不会泄漏、监听器不会叠加。`,
        view:'timeline',
        pairTop:1, pairBottom:3,
        rows:[
          {kind:'render',lbl:'挂载 · 渲染', node:'M', desc:'<code>userId=1</code>'},
          {kind:'setup',lbl:'setup ①', tag:'setup', node:'+', desc:'subscribe(1)', paired:true},
          {kind:'render',lbl:'重渲染 · 依赖变化', node:'R', tag:'dep', desc:'<code>userId: 1 → 2</code>'},
          {kind:'cleanup',lbl:'cleanup ①（先行）', tag:'cleanup', node:'-', desc:'unsubscribe(1) — 退掉旧订阅', active:true, paired:true}
        ] },

      { n:`旧的清理完成后，新的 <span class="hl-micro">setup 运行</span>：subscribe(2)。<b>setup/cleanup 成对出现</b>，虚线把它们一一连起来。`,
        view:'timeline',
        pairTop:1, pairBottom:3,
        rows:[
          {kind:'render',lbl:'挂载 · 渲染', node:'M', desc:'<code>userId=1</code>'},
          {kind:'setup',lbl:'setup ①', tag:'setup', node:'+', desc:'subscribe(1)', paired:true},
          {kind:'render',lbl:'重渲染 · 依赖变化', node:'R', tag:'dep', desc:'<code>userId: 1 → 2</code>'},
          {kind:'cleanup',lbl:'cleanup ①', tag:'cleanup', node:'-', desc:'unsubscribe(1)', paired:true},
          {kind:'setup',lbl:'setup ②', tag:'setup', node:'+', desc:'subscribe(2) — 新订阅已建立', active:true}
        ] },

      { n:`组件<span class="hl-host">卸载(unmount)</span>时，React 运行<b>最后一次</b> cleanup 收尾。空依赖 <code>[]</code> 的 effect 就只有这一对：挂载时 setup、卸载时 cleanup。`,
        view:'timeline',
        pairTop:4, pairBottom:5,
        rows:[
          {kind:'render',lbl:'挂载 · 渲染', node:'M', desc:'<code>userId=1</code>'},
          {kind:'setup',lbl:'setup ①', tag:'setup', node:'+', desc:'subscribe(1)'},
          {kind:'render',lbl:'重渲染 · 依赖变化', node:'R', tag:'dep', desc:'<code>userId: 1 → 2</code>'},
          {kind:'cleanup',lbl:'cleanup ①', tag:'cleanup', node:'-', desc:'unsubscribe(1)'},
          {kind:'setup',lbl:'setup ②', tag:'setup', node:'+', desc:'subscribe(2)', paired:true},
          {kind:'cleanup',lbl:'cleanup ②（卸载）', tag:'cleanup', node:'-', desc:'unsubscribe(2) — 卸载收尾，不再泄漏', active:true, paired:true}
        ] },

      { n:`现在看一个经典坑。effect 里 <code>setState</code>，依赖数组放了一个<span class="hl-bad">每次渲染都新建的对象</span> <code>{}</code>。看起来人畜无害……`,
        view:'loop', mode:'bad', count:0, cycle:-1, banner:null },

      { n:`第 1 轮：渲染创建了一个<b>全新</b>的 <code>opts = {}</code>。React 比较依赖：<code>{} !== 上次的 {}</code>（引用不同），判定<span class="hl-bad">依赖变了</span>，于是 effect 执行。`,
        view:'loop', mode:'bad', count:1, cycle:0, banner:null },

      { n:`effect 里 <code>setCount(c=>c+1)</code> 触发<span class="hl-sync">重新渲染</span> → 又生成一个新的 <code>{}</code> → 依赖又"变了" → effect 再跑 → 再 setState……<span class="hl-bad">闭环形成</span>。`,
        view:'loop', mode:'bad', count:2, cycle:2, banner:'无限循环：Maximum update depth exceeded' },

      { n:`计数器疯狂飙升 🔥。浏览器卡死、React 报 <code>Maximum update depth exceeded</code>。根因：<b>依赖不稳定</b>——每次渲染都是新引用，effect 永远认为依赖变了。`,
        view:'loop', mode:'bad', count:9999, cycle:2, banner:'无限循环：Maximum update depth exceeded' },

      { n:`修复：把对象<span class="hl-micro">移出渲染</span>或用 <code>useMemo</code> 稳定引用，依赖里只放<b>原始值</b>。<b>金句：清理函数总在下一次副作用前成对触发；依赖不稳定，就会把自己卷进无限循环。</b>`,
        view:'loop', mode:'ok', count:1, cycle:-1, banner:'稳定依赖 → effect 只跑该跑的那一次' },
    ],
    apply(root, i){
      const s = this.steps[i];
      const body = root.querySelector('[data-region="body"]');

      if(s.view === 'timeline'){
        const rowsHtml = s.rows.map((r, idx)=>{
          const isPaired = (idx===s.pairTop || idx===s.pairBottom);
          const conn = isPaired ? `<span class="conn-card">↔</span>` : '';
          const tagHtml = r.tag ? `<span class="tag ${r.tag}">${r.tag}</span>` : '';
          return `<div class="row">
            <div class="node ${r.active?'on':''}">${r.node}</div>
            <div class="card ${r.kind} ${r.active?'active':''}">
              <div class="lbl">${r.lbl} ${tagHtml} ${conn}</div>
              <div class="desc">${r.desc}</div>
            </div>
          </div>`;
        }).join('');

        // pairing connector: drawn alongside the axis spanning pairTop..pairBottom.
        // Rendered empty first, then positioned from the real .node centers below
        // (row stride is not a fixed constant — cards vary in height).
        const hasPair = (typeof s.pairTop === 'number' && typeof s.pairBottom === 'number');
        const pairHtml = hasPair ? `<div class="pair" style="opacity:0"></div>` : '';

        body.innerHTML = `<div class="stage">
          <div class="stage-title"><span class="dot"></span>组件生命周期时间线 · setup / cleanup 成对触发</div>
          <div class="timeline">
            <div class="axis"></div>
            ${pairHtml}
            ${rowsHtml}
          </div>
        </div>`;

        if(hasPair){
          const timeline = body.querySelector('.timeline');
          const pair = body.querySelector('.pair');
          const nodeEls = body.querySelectorAll('.node');
          const topNode = nodeEls[s.pairTop];
          const botNode = nodeEls[s.pairBottom];
          if(timeline && pair && topNode && botNode){
            const base = timeline.getBoundingClientRect();
            const tRect = topNode.getBoundingClientRect();
            const bRect = botNode.getBoundingClientRect();
            const tCenter = tRect.top - base.top + tRect.height/2;
            const bCenter = bRect.top - base.top + bRect.height/2;
            pair.style.top = tCenter + 'px';
            pair.style.height = Math.max(0, bCenter - tCenter) + 'px';
            // re-enable the fade-in animation now that geometry is known
            pair.style.opacity = '';
          }
        }
        return;
      }

      // loop demo
      const bad = s.mode === 'bad';
      const codeHtml = bad ? `
        <span class="line"><span class="k">function</span> Comp() {</span>
        <span class="line hot">  <span class="k">const</span> opts = {};  <span class="warn">// 每次渲染都是新引用!</span></span>
        <span class="line">  useEffect(() => {</span>
        <span class="line">    setCount(c => c + <span class="s">1</span>); <span class="warn">// 触发重渲染</span></span>
        <span class="line">  }, [opts]); <span class="warn">// {} !== {} → 永远"变了"</span></span>
        <span class="line">}</span>
      ` : `
        <span class="line"><span class="k">const</span> opts = {}; <span class="ok">// 移出渲染 / useMemo</span></span>
        <span class="line"><span class="k">function</span> Comp() {</span>
        <span class="line good">  useEffect(() => {</span>
        <span class="line good">    setCount(c => c + <span class="s">1</span>);</span>
        <span class="line good">  }, [opts]); <span class="ok">// 引用稳定 → 只跑一次</span></span>
        <span class="line">}</span>
      `;

      const nodes = bad
        ? ['新建 {}','依赖"变了"','执行 effect','setState','重渲染']
        : ['稳定引用','依赖未变','effect 跳过'];
      const cycHtml = nodes.map((label, idx)=>{
        const lit = (s.cycle >= 0 && idx <= s.cycle);
        const cls = bad ? (lit?'lit':'') : 'litok';
        const arrCls = bad ? 'arr bad' : 'arr';
        const arrow = idx < nodes.length-1 ? `<span class="${arrCls}">${bad?'↻':'→'}</span>` : (bad?`<span class="${arrCls}">↺</span>`:'');
        return `<span class="cyc-node ${cls}">${label}</span>${arrow}`;
      }).join('');

      const numCls = bad ? 'bad' : 'ok';
      const numTxt = (bad && s.count>=9999) ? '∞' : s.count;
      const cap = bad ? 'render 次数（每次 setState 都 +1）' : 'render 次数（达到目标后稳定）';

      const bannerHtml = s.banner
        ? `<div class="banner ${bad?'bad':'ok'}">${bad?'⚠ ':'✓ '}${s.banner}</div>`
        : '';

      body.innerHTML = `<div class="stage">
        <div class="stage-title"><span class="dot" style="background:${bad?'var(--bad)':'var(--micro)'}"></span>${bad?'坑 · 不稳定依赖导致无限循环':'修复 · 稳定依赖'}</div>
        <div class="loop">
          <div class="code-box">${codeHtml}</div>
          <div class="cycle">${cycHtml}</div>
          <div class="counter">
            <div class="num ${numCls}">${numTxt}</div>
            <div class="cap">${cap}</div>
          </div>
          ${bannerHtml}
        </div>
      </div>`;
    }
  });
})();
</script>
<!-- scene: controlled -->
<script>
(function(){
  window.SCENES = window.SCENES || [];
  window.SCENES.push({
    id:'controlled', title:'受控 vs 非受控组件', cat:'React',
    css:`
      .scene-controlled{display:flex;flex-direction:column;gap:14px}
      .scene-controlled .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
      @media(max-width:680px){.scene-controlled .grid{grid-template-columns:1fr}}
      .scene-controlled .col{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:14px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden}
      .scene-controlled .col.ctrl{border-color:rgba(79,140,255,.5)}
      .scene-controlled .col.unctrl{border-color:rgba(245,158,11,.45)}
      .scene-controlled .tag{font-size:12px;font-weight:700;letter-spacing:.4px;display:inline-flex;align-items:center;gap:6px}
      .scene-controlled .tag.ctrl{color:var(--sync)}
      .scene-controlled .tag.unctrl{color:var(--macro)}
      .scene-controlled .sub{font-size:11px;color:var(--sub);margin-top:-6px}

      .scene-controlled .field{border:1px solid var(--line);border-radius:9px;background:var(--panel2);padding:10px 12px;font-family:ui-monospace,monospace;font-size:14px;min-height:20px;color:var(--txt);position:relative;transition:border-color .3s,box-shadow .3s}
      .scene-controlled .field.lit{border-color:var(--sync);box-shadow:0 0 0 2px rgba(79,140,255,.25)}
      .scene-controlled .field.lit-amber{border-color:var(--macro);box-shadow:0 0 0 2px rgba(245,158,11,.22)}
      .scene-controlled .caret{display:inline-block;width:1px;height:15px;background:var(--txt);margin-left:1px;vertical-align:-2px;animation:controlled-blink 1s steps(1) infinite}
      @keyframes controlled-blink{50%{opacity:0}}
      .scene-controlled .ph{color:var(--sub)}

      .scene-controlled .typed{display:inline-block;animation:controlled-key .25s ease}
      @keyframes controlled-key{from{opacity:0;transform:scale(.5);color:var(--micro)}to{opacity:1;transform:none}}

      .scene-controlled .flow{display:flex;flex-direction:column;gap:7px}
      .scene-controlled .node{border:1px solid var(--line);border-radius:8px;background:var(--bg);padding:7px 10px;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px;transition:all .3s}
      .scene-controlled .node .lbl{font-family:ui-monospace,monospace}
      .scene-controlled .node.on{color:var(--txt);border-color:var(--sync);background:rgba(79,140,255,.12);animation:controlled-pulse .4s ease}
      .scene-controlled .node.on-amber{color:var(--txt);border-color:var(--macro);background:rgba(245,158,11,.1)}
      @keyframes controlled-pulse{from{transform:translateX(-4px);opacity:.4}to{transform:none;opacity:1}}
      .scene-controlled .node .dot{width:8px;height:8px;border-radius:50%;background:var(--line);flex:none}
      .scene-controlled .node.on .dot{background:var(--sync)}
      .scene-controlled .node.on-amber .dot{background:var(--macro)}

      .scene-controlled .arrow{align-self:center;color:var(--line);font-size:13px;line-height:1;transition:color .3s}
      .scene-controlled .arrow.on{color:var(--sync);animation:controlled-down .5s ease}
      .scene-controlled .arrow.loop{color:var(--micro)}
      @keyframes controlled-down{from{transform:translateY(-5px);opacity:.2}to{transform:none;opacity:1}}

      .scene-controlled .state{border:1px dashed var(--line);border-radius:8px;padding:8px 11px;font-family:ui-monospace,monospace;font-size:13px;display:flex;align-items:center;gap:8px;transition:all .3s}
      .scene-controlled .state .k{color:var(--sub)}
      .scene-controlled .state .v{color:var(--txt);font-weight:700}
      .scene-controlled .state.sync{border-color:var(--sync);background:rgba(79,140,255,.08)}
      .scene-controlled .state.sync .v{color:var(--sync);animation:controlled-key .3s ease}
      .scene-controlled .state.unknown .v{color:var(--macro)}
      .scene-controlled .state.captured{border-color:var(--micro);background:rgba(34,197,94,.1)}
      .scene-controlled .state.captured .v{color:var(--micro);animation:controlled-grab .45s cubic-bezier(.34,1.56,.64,1)}
      @keyframes controlled-grab{0%{transform:translateY(-14px) scale(.7);opacity:0}60%{transform:translateY(2px) scale(1.05)}100%{transform:none;opacity:1}}

      .scene-controlled .btn{align-self:flex-start;border:1px solid var(--macro);color:var(--macro);background:rgba(245,158,11,.08);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;transition:all .25s}
      .scene-controlled .btn.fire{background:var(--macro);color:#1a1205;animation:controlled-press .3s ease}
      @keyframes controlled-press{50%{transform:scale(.93)}}

      .scene-controlled .grab-ray{font-size:11px;color:var(--micro);display:flex;align-items:center;gap:6px;animation:controlled-key .3s ease}

      .scene-controlled .verdict{border-radius:10px;padding:11px 14px;font-size:13px;line-height:1.5;animation:controlled-key .4s ease}
      .scene-controlled .verdict.good{border:1px solid var(--micro);background:rgba(34,197,94,.1);color:var(--txt)}
      .scene-controlled .badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid var(--line);color:var(--sub);margin-left:6px}
    `,
    html:`<div class="scene-controlled">
      <div class="grid">
        <div class="col ctrl">
          <div class="tag ctrl">🔵 受控组件 <span class="badge">value + onChange</span></div>
          <div class="sub">值由 React state 驱动</div>
          <div data-region="ctrl"></div>
        </div>
        <div class="col unctrl">
          <div class="tag unctrl">🟠 非受控组件 <span class="badge">ref → DOM</span></div>
          <div class="sub">值留在 DOM，React 不参与</div>
          <div data-region="unctrl"></div>
        </div>
      </div>
      <div data-region="verdict"></div>
    </div>`,
    steps:[
      { n:`两个输入框，都还空着。左边<span class="hl-sync">受控</span>：value 绑定 state；右边<span class="hl-macro">非受控</span>：只挂了一个 ref。`,
        text:'', ctrlState:'empty', loop:0, unctrlState:'empty', submitted:false },
      { n:`用户在<span class="hl-sync">受控输入框</span>敲下 <b>H</b>。但此时框里其实还没立刻显示——按键先触发 <b>onChange</b> 事件。`,
        text:'H', ctrlState:'typing', loop:1, unctrlState:'empty', submitted:false },
      { n:`onChange 里调用 <b>setState('H')</b>，React 的 <span class="hl-sync">state 更新</span>为 "H"。值正在 React 内部流转。`,
        text:'H', ctrlState:'typing', loop:2, unctrlState:'empty', submitted:false },
      { n:`新 state 通过 <b>value={state}</b> <span class="hl-sync">回流</span>到输入框，字符 H 这才显示出来。值绕了 React <b>一整圈</b>！`,
        text:'H', ctrlState:'lit', loop:3, unctrlState:'empty', submitted:false },
      { n:`继续敲 <b>i</b>，每个字符都重复这条闭环：input → onChange → state → value → input。<span class="hl-sync">state 始终与界面同步</span>。`,
        text:'Hi', ctrlState:'lit', loop:3, unctrlState:'empty', submitted:false },
      { n:`现在看<span class="hl-macro">非受控输入框</span>。用户敲 <b>Bye</b>，字符<b>直接进入 DOM</b>就显示了——没有 onChange，没有 setState。`,
        text:'Hi', ctrlState:'lit', loop:3, unctrlState:'typed', submitted:false },
      { n:`关键差异：React 这边的 <b>state 一直是「未知」</b>。它压根不知道用户输入了什么——值只躺在真实 DOM 里。`,
        text:'Hi', ctrlState:'lit', loop:3, unctrlState:'unknown', submitted:false },
      { n:`点击<b>提交</b>。这一刻才用 <b>ref.current.value</b> 去 DOM 里把值「<span class="hl-micro">捞</span>」出来。`,
        text:'Hi', ctrlState:'lit', loop:3, unctrlState:'grab', submitted:true },
      { n:`<b>aha</b>：<span class="hl-sync">受控</span>每个字符都经过 React，随时可读可校验；<span class="hl-macro">非受控</span>是<b>用时才去问 DOM</b>，简单但 React 全程蒙在鼓里。`,
        text:'Hi', ctrlState:'lit', loop:3, unctrlState:'captured', submitted:true, verdict:true },
    ],
    apply(root, i){
      const s = this.steps[i];

      const renderField = (txt, cls, showCaret)=>{
        if(!txt) return `<div class="field ${cls}"><span class="ph">输入...</span>${showCaret?'<span class="caret"></span>':''}</div>`;
        const chars = txt.split('').map(c=>`<span class="typed">${c}</span>`).join('');
        return `<div class="field ${cls}">${chars}${showCaret?'<span class="caret"></span>':''}</div>`;
      };

      // ---- 受控列 ----
      const ctrlLit = s.ctrlState==='lit';
      const ctrlField = renderField(s.text, ctrlLit?'lit':'', s.ctrlState!=='empty');
      const L = s.loop;
      const ctrl = root.querySelector('[data-region="ctrl"]');
      ctrl.innerHTML = `
        ${ctrlField}
        <div class="flow">
          <div class="node ${L>=1?'on':''}"><span class="dot"></span><span class="lbl">① input 按键</span></div>
          <div class="arrow ${L>=1?'on':''}">↓</div>
          <div class="node ${L>=1?'on':''}"><span class="dot"></span><span class="lbl">② onChange(e)</span></div>
          <div class="arrow ${L>=2?'on':''}">↓</div>
          <div class="node ${L>=2?'on':''}"><span class="dot"></span><span class="lbl">③ setState(e.target.value)</span></div>
          <div class="arrow ${L>=3?'on loop':''}">↓ value={state} 回流 ↺</div>
          <div class="node ${L>=3?'on':''}"><span class="dot"></span><span class="lbl">④ value → input 显示</span></div>
        </div>
        <div class="state ${L>=2?'sync':''}"><span class="k">state =</span><span class="v">${s.text?`"${s.text}"`:'""'}</span></div>
      `;

      // ---- 非受控列 ----
      const us = s.unctrlState;
      const showText = us==='typed' || us==='unknown' || us==='grab' || us==='captured';
      const unctrlField = renderField(showText? 'Bye' : '', us==='typed'?'lit-amber':'', us!=='empty' && us!=='captured');
      let stateBlock, grabBlock='';
      if(us==='unknown' || us==='typed' || us==='grab'){
        stateBlock = `<div class="state unknown"><span class="k">state =</span><span class="v">未知 (React 不知道)</span></div>`;
      } else if(us==='captured'){
        stateBlock = `<div class="state captured"><span class="k">读到的值 =</span><span class="v">"Bye"</span></div>`;
      } else {
        stateBlock = `<div class="state"><span class="k">state =</span><span class="v">—</span></div>`;
      }
      if(us==='grab'){
        grabBlock = `<div class="grab-ray">⇡ ref.current.value 从 DOM 抓取中...</div>`;
      } else if(us==='captured'){
        grabBlock = `<div class="grab-ray">✓ ref.current.value → "Bye"</div>`;
      }
      const unctrl = root.querySelector('[data-region="unctrl"]');
      unctrl.innerHTML = `
        ${unctrlField}
        <div class="state"><span class="k">绑定:</span><span class="v" style="color:var(--macro)">ref={inputRef}</span></div>
        ${grabBlock}
        ${stateBlock}
        <button class="btn ${s.submitted?'fire':''}">提交 (读 ref)</button>
      `;

      // ---- 结论 ----
      const v = root.querySelector('[data-region="verdict"]');
      if(s.verdict){
        v.innerHTML = `<div class="verdict good"><b>受控</b>：值<b>绕 React 一圈</b>再显示，每个字符都可读可校验，适合表单校验/联动；<b>非受控</b>：值留在 DOM，<b>用时才用 ref 捞</b>，代码更少，适合简单表单与<b>文件上传</b>（file 输入只能非受控）。</div>`;
      } else {
        v.innerHTML = '';
      }
    }
  });
})();
</script>

<script>
(function(){

      .scene-http-cache .res .v{color:var(--micro)}

      .scene-http-cache .pkt{font-family:ui-monospace,Menlo,monospace;font-size:11px;border-radius:8px;padding:7px 10px;position:relative;animation:http-cache-slide .5s ease both}
      .scene-http-cache .pkt .dir{font-size:10px;letter-spacing:.5px;opacity:.7;display:block;margin-bottom:3px}
      .scene-http-cache .pkt.req{background:rgba(79,140,255,.13);border:1px solid var(--sync);color:var(--txt);animation-name:http-cache-toright}
      .scene-http-cache .pkt.resp{background:rgba(168,85,247,.13);border:1px solid var(--host);color:var(--txt);animation-name:http-cache-toleft}
      .scene-http-cache .pkt.resp.notmod{background:rgba(34,197,94,.13);border-color:var(--micro)}
      .scene-http-cache .pkt.resp.new{background:rgba(245,158,11,.13);border-color:var(--macro)}
      .scene-http-cache .blocked{position:relative;background:rgba(239,68,68,.10);border:1px dashed var(--bad);color:var(--bad);font-family:ui-monospace,Menlo,monospace;font-size:11px;border-radius:8px;padding:9px 10px;text-align:center;animation:http-cache-shake .5s ease}
      .scene-http-cache .blocked .x{font-size:16px;margin-right:4px}
      .scene-http-cache .hit{margin-top:6px;background:rgba(34,197,94,.13);border:1px solid var(--micro);color:var(--micro);border-radius:8px;padding:8px 10px;font-size:12px;text-align:center;animation:http-cache-pop .4s ease}
      .scene-http-cache .localpull{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--micro);text-align:center;animation:http-cache-pop .4s ease}
      .scene-http-cache .badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:6px;margin-left:auto;font-weight:600}
      .scene-http-cache .badge.strong{background:rgba(34,197,94,.15);color:var(--micro)}
      .scene-http-cache .badge.nego{background:rgba(245,158,11,.15);color:var(--macro)}
      .scene-http-cache .badge.first{background:rgba(79,140,255,.15);color:var(--sync)}
      .scene-http-cache .verdict{margin-top:10px;border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.6;border:1px solid var(--line);background:var(--panel2);animation:http-cache-pop .4s ease}
      .scene-http-cache .verdict.good{border-color:var(--micro)}
      .scene-http-cache .empty-tip{color:var(--sub);font-size:12px;font-style:italic}
      @keyframes http-cache-pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
      @keyframes http-cache-toright{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
      @keyframes http-cache-toleft{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
      @keyframes http-cache-slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
      @keyframes http-cache-shake{0%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}
    `,
    html:`<div class="scene-http-cache">
      <div class="stage">
        <div class="col browser">
          <h4><span class="icon">🖥️</span> 浏览器 <span data-region="bbadge"></span></h4>
          <div data-region="browser"></div>
          <div data-region="cache"></div>
        </div>
        <div class="col net">
          <h4 style="justify-content:center"><span class="icon">🌐</span> 网络</h4>
          <div data-region="net"></div>
        </div>
        <div class="col server">
          <h4><span class="icon">🗄️</span> 服务器</h4>
          <div class="body" data-region="server"></div>
        </div>
      </div>
      <div data-region="verdict"></div>
    </div>`,
    steps:[
      {
        n:`<b>首次请求</b>：本地缓存是空的，浏览器只能向服务器发起真实请求 <span class="hl-sync">GET /app.js</span>。`,
        badge:'first', cacheState:'empty', netKind:'req',
        serverEtag:'当前版本 ETag: <b>"abc"</b>',
        verdict:''
      },
      {
        n:`服务器返回 <span class="hl-host">200 OK</span> + 资源，关键在响应头：<b>Cache-Control: max-age=60</b> 与 <b>ETag: "abc"</b>。浏览器把它<span class="hl-micro">连同头一起存进缓存</span>。`,
        badge:'first', cacheState:'fresh', netKind:'resp200',
        serverEtag:'当前版本 ETag: <b>"abc"</b>',
        verdict:''
      },
      {
        n:`<b>有效期内</b>再次请求同一资源。此时 <span class="hl-micro">max-age=60 还没过期</span>，缓存是“新鲜”的。`,
        badge:'strong', cacheState:'fresh', netKind:'none',
        netNote:'浏览器准备请求 app.js…',
        serverEtag:'当前版本 ETag: <b>"abc"</b>',
        verdict:''
      },
      {
        n:`<b>强缓存命中</b>！请求<span class="hl-micro">根本没发出去</span>——被浏览器直接拦在本地，连网络都没碰，速度最快（disk/memory cache）。`,
        badge:'strong', cacheState:'fresh', netKind:'blocked',
        serverEtag:'当前版本 ETag: <b>"abc"</b>',
        verdict:{cls:'good', html:'<b>强缓存：0 次网络请求。</b>最快，但服务器悄悄改了文件你也不知道。'}
      },
      {
        n:`时间走过 <b>60 秒</b>，<span class="hl-macro">max-age 过期</span>，缓存变“陈旧(stale)”。但浏览器不会马上扔掉它，而是去<b>问服务器</b>。`,
        badge:'nego', cacheState:'stale', netKind:'none',
        serverEtag:'当前版本 ETag: <b>"abc"</b>',
        verdict:''
      },
      {
        n:`进入<b>协商缓存</b>：浏览器带上 <span class="hl-sync">If-None-Match: "abc"</span>（也可用 If-Modified-Since 对应 Last-Modified）发请求，问服务器：“我这版还能用吗？”`,
        badge:'nego', cacheState:'stale', netKind:'reqcond',
        serverEtag:'当前版本 ETag: <b>"abc"</b>',
        verdict:''
      },
      {
        n:`<b>资源没变</b>：服务器比对 ETag，<span class="hl-micro">"abc" === "abc"</span>，返回 <span class="hl-micro">304 Not Modified</span>——<b>没有 body</b>，包很小。`,
        badge:'nego', cacheState:'fresh', netKind:'resp304',
        serverEtag:'当前版本 ETag: <b>"abc"</b> ✓ 一致',
        verdict:{cls:'good', html:'<b>协商缓存命中：</b>请求发了，但回来的只是一个空 304，浏览器继续用本地缓存，省下整个文件体积。'}
      },
      {
        n:`<b>另一种情况：内容真的变了。</b>服务器上文件被更新，ETag 变成了 <span class="hl-host">"xyz"</span>。`,
        badge:'nego', cacheState:'stale', netKind:'reqcond',
        serverEtag:'当前版本 ETag: <b>"xyz"</b>（已更新）',
        verdict:''
      },
      {
        n:`<span class="hl-macro">"abc" ≠ "xyz"</span>，服务器返回 <span class="hl-macro">200 OK</span> + <b>全新资源</b> + 新的 ETag，浏览器替换本地缓存并刷新有效期。`,
        badge:'nego', cacheState:'freshNew', netKind:'resp200new',
        serverEtag:'当前版本 ETag: <b>"xyz"</b>（已更新）',
        verdict:''
      },
      {
        n:`<b>结论金句</b>：<span class="hl-micro">强缓存不发请求</span>（max-age/Expires，命中即本地秒回）；<span class="hl-macro">协商缓存发了请求但可能只换回一个 304</span>（ETag/Last-Modified，省 body 不省 RTT）。先走强缓存，过期再走协商。`,
        badge:'nego', cacheState:'freshNew', netKind:'none',
        serverEtag:'当前版本 ETag: <b>"xyz"</b>',
        verdict:{cls:'good', html:'强缓存 = 不问就用（最快）；协商缓存 = 先问再用（省流量）。两层兜底，把网络开销压到最小。'}
      }
    ],
    apply(root, i){
      const s = this.steps[i];

      // 顶部 badge
      const bbadge = root.querySelector('[data-region="bbadge"]');
      const bmap = {first:['first','首次'], strong:['strong','强缓存'], nego:['nego','协商缓存']};
      const bd = bmap[s.badge] || bmap.first;
      bbadge.innerHTML = `<span class="badge ${bd[0]}">${bd[1]}</span>`;

      // 浏览器主体
      const browser = root.querySelector('[data-region="browser"]');
      if(s.netKind==='blocked'){
        browser.innerHTML = `<div class="hit">⚡ 直接读本地缓存<br><span style="font-size:11px;opacity:.85">(from disk cache)</span></div>`;
      } else if(s.netKind==='resp304'){
        browser.innerHTML = `<div class="localpull">↩ 复用本地缓存的 app.js</div>`;
      } else {
        browser.innerHTML = `<div class="empty-tip">需要资源 <b style="color:var(--txt)">app.js</b></div>`;
      }

      // 浏览器缓存框
      const cache = root.querySelector('[data-region="cache"]');
      const cs = s.cacheState;
      if(cs==='empty'){
        cache.innerHTML = `<div class="cache empty"><div class="ctitle">📦 本地缓存</div><div class="empty-tip">（空，无可用副本）</div></div>`;
      } else {
        let cls = cs==='stale' ? 'stale' : 'fresh';
        let title = cs==='stale' ? '📦 本地缓存（已过期·stale）' : '📦 本地缓存（新鲜·fresh）';
        let etag = (cs==='freshNew') ? '"xyz"' : '"abc"';
        let stampCls = cs==='stale' ? 'warn' : '';
        let stampTxt = cs==='stale' ? 'max-age 已过期' : 'max-age=60 有效';
        cache.innerHTML = `<div class="cache ${cls}">
          <div class="ctitle">${title}</div>
          <div class="res">app.js<br><span class="k">ETag</span>: <span class="v">${etag}</span><br><span class="stamp ${stampCls}">${stampTxt}</span></div>
        </div>`;
      }

      // 网络中段
      const net = root.querySelector('[data-region="net"]');
      let netHtml = '';
      switch(s.netKind){
        case 'req':
          netHtml = `<div class="pkt req"><span class="dir">请求 →</span>GET /app.js</div>`; break;
        case 'reqcond':
          netHtml = `<div class="pkt req"><span class="dir">条件请求 →</span>GET /app.js<br>If-None-Match: "abc"</div>`; break;
        case 'resp200':
          netHtml = `<div class="pkt resp"><span class="dir">← 响应</span>200 OK + app.js<br>Cache-Control: max-age=60<br>ETag: "abc"</div>`; break;
        case 'resp304':
          netHtml = `<div class="pkt resp notmod"><span class="dir">← 响应</span>304 Not Modified<br>(无 body · 体积极小)</div>`; break;
        case 'resp200new':
          netHtml = `<div class="pkt resp new"><span class="dir">← 响应</span>200 OK + 新 app.js<br>ETag: "xyz"</div>`; break;
        case 'blocked':
          netHtml = `<div class="blocked"><span class="x">✕</span>请求被拦截<br><span style="opacity:.8">未触达网络</span></div>`; break;
        case 'none':
        default:
          netHtml = s.netNote
            ? `<div class="empty-tip" style="text-align:center">${s.netNote}</div>`
            : `<div class="empty-tip" style="text-align:center">（无网络流量）</div>`; break;
      }
      net.innerHTML = netHtml;

      // 服务器
      const server = root.querySelector('[data-region="server"]');
      server.innerHTML = `
        <div class="empty-tip">存有 <b style="color:var(--txt)">app.js</b></div>
        <div class="etag">${s.serverEtag}</div>`;

      // 结论条
      const verdict = root.querySelector('[data-region="verdict"]');
      if(s.verdict && s.verdict.html){
        verdict.innerHTML = `<div class="verdict ${s.verdict.cls||''}">${s.verdict.html}</div>`;
      } else {
        verdict.innerHTML = '';
      }
    }
  });
})();
</script>
