      .hl-macro{color:var(--macro);font-weight:600}
      .hl-host{color:var(--host);font-weight:600}
    `,
    html:`<div class="scene-url-to-page">
      <div data-region="addr"></div>
      <div class="pipe" data-region="pipe"></div>
      <div data-region="detail"></div>
    </div>`,
    stations:[
      {ico:'🔍',lbl:'DNS'},
      {ico:'🤝',lbl:'TCP'},
      {ico:'🔒',lbl:'TLS'},
      {ico:'📤',lbl:'请求'},
      {ico:'📥',lbl:'收HTML'},
      {ico:'🌳',lbl:'DOM/CSSOM'},
      {ico:'🌲',lbl:'渲染树'},
      {ico:'📐',lbl:'Layout'},
      {ico:'🎨',lbl:'Paint'},
      {ico:'🧩',lbl:'合成'},
      {ico:'🖥️',lbl:'显示'}
    ],
    steps:[
      { n:`地址栏敲下 <b>https://example.com</b> 回车——这看似一瞬间，其实是一条<span class="hl-sync">十来站的接力赛</span>。数据包小球即将出发。`, stage:-1 },
      { n:`<b>第1站 DNS 解析</b>：人记得住<span class="hl-host">域名</span>，机器只认<span class="hl-micro">IP</span>。先问 DNS 服务器：example.com 的 IP 是多少？拿到 <span class="hl-micro">93.184.216.34</span> 才能找到主机。`, stage:0 },
      { n:`<b>第2站 TCP 三次握手</b>：和服务器建立可靠连接。<span class="hl-sync">SYN</span> →（你在吗）、<span class="hl-host">SYN-ACK</span> ←（在，你在吗）、<span class="hl-sync">ACK</span> →（在）。三次确认，通道建成。`, stage:1 },
      { n:`<b>第3站 TLS 握手</b>（HTTPS 才有）：交换证书与密钥，协商出加密通道。此后所有数据都<span class="hl-micro">加密传输</span>，中间人看不懂。`, stage:2 },
      { n:`<b>第4站 发送 HTTP 请求</b>：通过加密通道把请求行 + 请求头发出去——<span class="hl-sync">GET / HTTP/1.1</span>，告诉服务器我要哪个资源。`, stage:3 },
      { n:`<b>第5站 服务器返回 HTML</b>：服务器处理后回传响应——状态码 <span class="hl-micro">200</span> + 一堆 HTML 文本字节流。浏览器开始接收。`, stage:4 },
      { n:`<b>第6站 解析</b>：浏览器边读边解析。HTML → <span class="hl-sync">DOM 树</span>🌳；CSS → <span class="hl-host">CSSOM 树</span>🌳。两棵树各自描述「结构」和「样式」。`, stage:5 },
      { n:`<b>第7站 合并成渲染树</b>：DOM + CSSOM 合并成 <span class="hl-micro">Render Tree</span>。只包含<b>可见</b>节点（display:none 的会被剔除），每个节点都带上了最终样式。`, stage:6 },
      { n:`<b>第8站 Layout（布局 / 回流 reflow）</b>：根据渲染树计算每个节点的<span class="hl-sync">几何位置与大小</span>——它在屏幕的哪里、多宽多高。`, stage:7 },
      { n:`<b>第9站 Paint（绘制）</b>：把每个节点画成一个个<span class="hl-macro">像素</span>——文字、颜色、边框、阴影，填进各自的图层。`, stage:8 },
      { n:`<b>第10站 Composite（合成）</b>：多个图层按层级在 GPU 上<span class="hl-host">合成</span>成最终一帧画面。`, stage:9 },
      { n:`<b>第11站 显示</b>：画面送到屏幕，<span class="hl-micro">页面出现了</span>！⚠️ 别忘了：解析中遇到 <b>&lt;script&gt;</b> 会<span class="hl-macro">阻塞 DOM 解析</span>（用 async/defer 缓解）。<b>结论：从回车到看见页面，是 DNS→握手→请求→渲染的一条接力赛，每一站都是一次可优化的耗时。</b>`, stage:10 }
    ],
    apply(root, i){
      const s = this.steps[i];
      const stations = this.stations;

      // address bar
      const addr = root.querySelector('[data-region="addr"]');
      const go = s.stage >= 0;
      addr.innerHTML = `<span class="dot${go?' go':''}"></span>`+
        `<span class="url">https://example.com</span>`+
        `<span class="ent">${go?'已发车 →':'Enter ↵'}</span>`;

      // pipeline stations
      const pipe = root.querySelector('[data-region="pipe"]');
      pipe.innerHTML = stations.map((st, idx)=>{
        let cls = 'station';
        if(s.stage > idx) cls += ' done';
        if(s.stage === idx) cls += ' active';
        const ball = s.stage === idx ? `<span class="ball"></span>` : '';
        return `<div class="${cls}">${ball}<span class="ico">${st.ico}</span><span class="lbl">${st.lbl}</span></div>`;
      }).join('');

      // detail panel
      const detail = root.querySelector('[data-region="detail"]');
      if(s.stage < 0){
        detail.innerHTML = `<div class="detail"><h4>🏁 起点</h4><div class="body">数据包小球停在起跑线，等待发车。点击下一步开始这场接力赛。</div></div>`;
        return;
      }
      const st = stations[s.stage];
      let body = '';
      switch(s.stage){
        case 0:
          body = `<div class="viz"><span class="pill">example.com</span><span class="arrow">→ DNS →</span><span class="pill ip">93.184.216.34</span></div><div class="body" style="margin-top:8px">域名是给人看的，路由只认 IP。先把名字翻译成地址。</div>`;
          break;
        case 1:
          body = `<div class="hs">`+
            `<div class="row"><span class="who">客户端</span><span class="seg"></span><span class="tag">SYN →</span></div>`+
            `<div class="row"><span class="who">服务器</span><span class="seg rev"></span><span class="tag rev">← SYN-ACK</span></div>`+
            `<div class="row"><span class="who">客户端</span><span class="seg"></span><span class="tag">ACK →</span></div>`+
          `</div><div class="body" style="margin-top:8px">三次确认，建立可靠的双向连接。</div>`;
          break;
        case 2:
          body = `<div class="viz"><span class="pill">证书</span><span class="arrow">↔</span><span class="pill">密钥协商</span><span class="arrow">=</span><span class="pill ip">🔒 加密通道</span></div><div class="body" style="margin-top:8px">此后数据全程加密，安全传输。</div>`;
          break;
        case 3:
          body = `<div class="viz"><span class="pill">GET / HTTP/1.1</span><span class="pill">Host: example.com</span><span class="pill">Accept: text/html</span></div><div class="body" style="margin-top:8px">通过加密通道把请求发往服务器。</div>`;
          break;
        case 4:
          body = `<div class="viz"><span class="pill ip">200 OK</span><span class="arrow">+</span><span class="pill">&lt;html&gt;…字节流…&lt;/html&gt;</span></div><div class="body" style="margin-top:8px">服务器响应到达，浏览器开始接收 HTML。</div>`;
          break;
        case 5:
          body = `<div class="trees">`+
            `<div class="tree t1"><div class="tt">🌳 DOM 树</div><div class="node">html</div><div class="node">body</div><div class="node">h1 / p</div></div>`+
            `<div class="tree t2"><div class="tt">🌳 CSSOM 树</div><div class="node">body{...}</div><div class="node">h1{color}</div><div class="node">p{font}</div></div>`+
          `</div><div class="body" style="margin-top:8px">结构与样式分别建成两棵树。</div>`;
          break;
        case 6:
          body = `<div class="trees"><div class="tree merged"><div class="tt">🌲 渲染树 Render Tree（DOM + CSSOM）</div><div class="node">body → 已应用样式</div><div class="node">h1 → 红色加粗 ✓ 可见</div><div class="node">p → 已应用样式 ✓ 可见</div></div></div><div class="body" style="margin-top:8px">合并两树，剔除不可见节点，每个节点带上最终样式。</div>`;
          break;
        case 7:
          body = `<div class="layout-box">`+
            `<div class="blk" style="top:8px;left:8px;width:120px;height:18px;background:rgba(79,140,255,.4);border:1px solid var(--sync)"></div>`+
            `<div class="blk" style="top:34px;left:8px;width:180px;height:12px;background:rgba(168,85,247,.35);border:1px solid var(--host)"></div>`+
            `<div class="blk" style="top:52px;left:8px;width:140px;height:12px;background:rgba(168,85,247,.35);border:1px solid var(--host)"></div>`+
          `</div><div class="body" style="margin-top:8px">计算每个盒子的位置与尺寸（reflow）。</div>`;
          break;
        case 8:
          body = `<div class="px">`+ Array.from({length:48}).map((_,k)=>`<i></i>`).join('') +`</div><div class="body" style="margin-top:8px">把每个节点逐一画成像素，填入图层。</div>`;
          break;
        case 9:
          body = `<div class="viz"><span class="pill" style="border-color:var(--sync)">图层1 背景</span><span class="arrow">+</span><span class="pill" style="border-color:var(--host)">图层2 文字</span><span class="arrow">+</span><span class="pill" style="border-color:var(--macro)">图层3 动画</span><span class="arrow">=</span><span class="pill ip">一帧画面</span></div><div class="body" style="margin-top:8px">多图层在 GPU 上合成为最终帧。</div>`;
          break;
        case 10:
          body = `<div class="screen"><div class="bar"></div><div class="bar b2"></div><div class="bar b3"></div><div class="ok">✓ 页面已呈现在屏幕上</div></div>`+
            `<div class="warn-note">⚠️ <span>解析过程中遇到 &lt;script&gt; 会暂停 DOM 构建去执行 JS（脚本可能改 DOM）。给脚本加 <b>defer</b> / <b>async</b> 可避免阻塞首屏渲染。</span></div>`;
          break;
      }
      const isLast = s.stage === stations.length-1;
      detail.innerHTML = `<div class="detail"${isLast?' style="border-left-color:var(--micro)"':''}><h4><span class="ico">${st.ico}</span> ${st.lbl} <span class="badge"${isLast?' style="color:var(--micro);border-color:var(--micro);background:rgba(34,197,94,.1)"':''}>第 ${s.stage+1} / ${stations.length} 站</span></h4>${body}</div>`;
    }
  });
})();
</script>
<!-- scene: xss-csrf -->
<script>
(function(){
  window.SCENES = window.SCENES || [];
  window.SCENES.push({
    id:'xss-csrf', title:'XSS 与 CSRF', cat:'性能·网络',
    css:`
      .scene-xss-csrf{color:var(--txt)}
      .scene-xss-csrf .act-tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.5px;padding:4px 10px;border-radius:999px;margin-bottom:10px}
      .scene-xss-csrf .act-xss{background:rgba(239,68,68,.14);border:1px solid var(--bad);color:#ff9b9b}
      .scene-xss-csrf .act-csrf{background:rgba(168,85,247,.14);border:1px solid var(--host);color:#d6b3ff}
      .scene-xss-csrf .stage{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:stretch}
      @media(max-width:640px){.scene-xss-csrf .stage{grid-template-columns:1fr}}
      .scene-xss-csrf .node{position:relative;border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:12px;min-height:120px;display:flex;flex-direction:column}
      .scene-xss-csrf .node.dim{opacity:.32}
      .scene-xss-csrf .node-h{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:8px}
      .scene-xss-csrf .node-ico{font-size:18px}
      .scene-xss-csrf .node-sub{font-size:11px;color:var(--sub);margin-top:auto;line-height:1.5}
      .scene-xss-csrf .node.attacker{border-color:var(--bad)}
      .scene-xss-csrf .node.victim{border-color:var(--sync)}
      .scene-xss-csrf .node.server{border-color:var(--macro)}
      .scene-xss-csrf .node.bank{border-color:var(--micro)}
      .scene-xss-csrf .node.evil{border-color:var(--bad)}
      .scene-xss-csrf .node.guard{border-color:var(--micro);box-shadow:0 0 0 1px rgba(34,197,94,.25) inset}
      .scene-xss-csrf .payload{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 8px;word-break:break-all;line-height:1.5;animation:xss-csrf-pop .35s ease}
      .scene-xss-csrf .payload.bad-code{color:#ff8a8a;border-color:var(--bad)}
      .scene-xss-csrf .payload.escaped{color:var(--micro);border-color:var(--micro)}
      .scene-xss-csrf .payload.exec{color:#ff8a8a;border-color:var(--bad);background:rgba(239,68,68,.1)}
      .scene-xss-csrf .cookie{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:ui-monospace,monospace;background:rgba(245,158,11,.14);border:1px solid var(--macro);color:#ffd58a;border-radius:7px;padding:4px 7px;margin-top:6px;animation:xss-csrf-pop .35s ease}
      .scene-xss-csrf .flow{position:relative;height:46px;margin:6px 0;display:flex;align-items:center;justify-content:center}
      .scene-xss-csrf .arrow{position:relative;flex:1;height:0;border-top:2px dashed var(--sub);animation:xss-csrf-draw .5s ease}
      .scene-xss-csrf .arrow::after{content:'';position:absolute;right:-2px;top:-5px;border:5px solid transparent;border-left-color:var(--sub)}
      .scene-xss-csrf .arrow.bad{border-top-color:var(--bad);border-top-style:solid}
      .scene-xss-csrf .arrow.bad::after{border-left-color:var(--bad)}
      .scene-xss-csrf .arrow.good{border-top-color:var(--micro);border-top-style:solid}
      .scene-xss-csrf .arrow.good::after{border-left-color:var(--micro)}
      .scene-xss-csrf .arrow.sync{border-top-color:var(--sync);border-top-style:solid}
      .scene-xss-csrf .arrow.sync::after{border-left-color:var(--sync)}
      .scene-xss-csrf .flow-lbl{position:absolute;top:-2px;left:50%;transform:translateX(-50%);font-size:11px;background:var(--bg);padding:0 8px;white-space:nowrap;animation:xss-csrf-pop .4s ease}
      .scene-xss-csrf .flow-lbl.bad{color:#ff8a8a}
      .scene-xss-csrf .flow-lbl.good{color:var(--micro)}
      .scene-xss-csrf .flow-lbl.sync{color:#9cc1ff}
      .scene-xss-csrf .pkt{position:absolute;top:50%;left:0;transform:translateY(-50%);font-size:15px;animation:xss-csrf-fly 1.1s ease infinite}
      @keyframes xss-csrf-fly{0%{left:2%;opacity:0}15%{opacity:1}85%{opacity:1}100%{left:96%;opacity:0}}
      .scene-xss-csrf .verdict{margin-top:12px;border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;animation:xss-csrf-pop .4s ease}
      .scene-xss-csrf .verdict.bad{background:rgba(239,68,68,.12);border:1px solid var(--bad);color:#ffb3b3}
      .scene-xss-csrf .verdict.good{background:rgba(34,197,94,.12);border:1px solid var(--micro);color:#9bebb6}
      .scene-xss-csrf .verdict.neutral{background:var(--panel2);border:1px solid var(--line);color:var(--sub)}
      .scene-xss-csrf .v-ico{font-size:20px}
      .scene-xss-csrf .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:auto}
      .scene-xss-csrf .badge.exec{background:var(--bad);color:#fff;animation:xss-csrf-shake .5s ease}
      .scene-xss-csrf .badge.inert{background:var(--micro);color:#06210f}
      .scene-xss-csrf .shield{position:absolute;top:8px;right:10px;font-size:18px;animation:xss-csrf-pop .4s ease}
      .scene-xss-csrf .db-row{font-family:ui-monospace,monospace;font-size:11px;border:1px solid var(--line);border-left:3px solid var(--macro);border-radius:6px;padding:6px 8px;margin-top:6px;color:var(--sub);animation:xss-csrf-pop .35s ease}
      .scene-xss-csrf .db-row b{color:#ff8a8a}
      @keyframes xss-csrf-pop{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:none}}
      @keyframes xss-csrf-draw{from{transform:scaleX(.2);opacity:0}to{transform:scaleX(1);opacity:1}}
      @keyframes xss-csrf-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
    `,
    html:`<div class="scene-xss-csrf"><div data-region="tag"></div><div data-region="body"></div></div>`,
    steps:[
      { n:`<b>第一幕 · XSS（跨站脚本）</b>。攻击者在评论框输入一段 <span class="hl-bad">&lt;script&gt;偷cookie&lt;/script&gt;</span>，目标是把代码注入到页面里。`,
        act:'xss', flow:'inject', verdict:null },
      { n:`服务器没有过滤，直接把这段脚本<b>原样存进数据库</b>。坏代码已经潜伏在内容里，等待下一个访客。`,
        act:'xss', flow:'store', verdict:'neutral' },
      { n:`受害者打开页面，浏览器把数据库里的内容当 HTML 渲染——<span class="hl-bad">恶意脚本就在「他的」浏览器里执行了</span>。`,
        act:'xss', flow:'render', verdict:null },
      { n:`脚本读到了受害者的 <span class="hl-macro">cookie</span>，偷偷发往攻击者服务器。身份凭证泄露，<b>账号被劫持</b>。`,
        act:'xss', flow:'steal', verdict:'bad' },
      { n:`<b>防御</b>：服务端<span class="hl-micro">输出转义</span>（&lt; 变 &amp;lt;）+ 富文本白名单(DOMPurify) + <span class="hl-micro">CSP</span>。脚本变成纯文本，只是<b>显示</b>出来，不会执行。`,
        act:'xss', flow:'defend', verdict:'good' },
      { n:`<b>第二幕 · CSRF（跨站请求伪造）</b>。用户已登录 <span class="hl-micro">bank.com</span>，浏览器为这个域保存着登录 <span class="hl-macro">cookie</span>。`,
        act:'csrf', flow:'login', verdict:'neutral' },
      { n:`用户被诱导点开 <span class="hl-bad">evil.com</span>。这个恶意页面里藏着一个自动提交的转账表单，目标指向 bank.com。`,
        act:'csrf', flow:'lure', verdict:null },
      { n:`关键陷阱：浏览器对 bank.com 的请求会<b>自动带上 bank 的 cookie</b>，哪怕请求是从 evil.com 发起的。`,
        act:'csrf', flow:'forge', verdict:null },
      { n:`银行只看 cookie，<span class="hl-bad">误以为是本人操作</span>，转账成功。攻击者没偷 cookie，只是「借用」了你已登录的身份。`,
        act:'csrf', flow:'forge', verdict:'bad' },
      { n:`<b>防御</b>：Cookie 设 <span class="hl-micro">SameSite</span>（跨站请求不带 cookie）+ <span class="hl-micro">CSRF Token</span> + 校验 Origin/Referer。token 对不上 → <b>请求被拒</b>。`,
        act:'csrf', flow:'defend', verdict:'good' },
      { n:`<b>一句话记牢</b>：<span class="hl-bad">XSS</span> 是往你页面里「<b>注入并执行</b>」坏代码（偷数据）；<span class="hl-host">CSRF</span> 是「<b>借用</b>」你已登录的身份(cookie)替你发请求（冒充你）。`,
        act:'summary', flow:'summary', verdict:'good' },
    ],
    apply(root, i){
      const s = this.steps[i];
      const tag = root.querySelector('[data-region="tag"]');
      const body = root.querySelector('[data-region="body"]');

      // tag
      if(s.act==='xss') tag.innerHTML = `<span class="act-tag act-xss">第一幕 · XSS 跨站脚本</span>`;
      else if(s.act==='csrf') tag.innerHTML = `<span class="act-tag act-csrf">第二幕 · CSRF 跨站请求伪造</span>`;
      else tag.innerHTML = `<span class="act-tag act-csrf" style="background:rgba(79,140,255,.14);border-color:var(--sync);color:#9cc1ff">总结 · 两种攻击的本质</span>`;

      const verdict = (s)=>{
        if(!s.verdict) return '';
        if(s.verdict==='bad') return `<div class="verdict bad"><span class="v-ico">💀</span><div>攻击得手 — 身份/数据被窃取</div></div>`;
        if(s.verdict==='good') return `<div class="verdict good"><span class="v-ico">🛡️</span><div>攻击被挡下 — 防御生效</div></div>`;
        return `<div class="verdict neutral"><span class="v-ico">⏳</span><div>尚未触发后果…</div></div>`;
      };

      const arrow = (cls,lbl,pkt)=>`<div class="flow"><div class="arrow ${cls}"></div><div class="flow-lbl ${cls}">${lbl}</div>${pkt?`<div class="pkt">${pkt}</div>`:''}</div>`;

      // ============ SUMMARY ============
      if(s.flow==='summary'){
        body.innerHTML = `
          <div class="stage" style="grid-template-columns:1fr 1fr">
            <div class="node attacker" style="border-color:var(--bad)">
              <div class="node-h"><span class="node-ico">🐛</span> XSS</div>
              <div class="payload bad-code">&lt;script&gt;…&lt;/script&gt; 在受害者浏览器<b style="color:#ff8a8a">执行</b></div>
              <div class="node-sub">本质：<b>注入并执行</b>恶意代码<br>武器：能跑的脚本<br>战果：偷 cookie / 篡改页面<br>防御：转义 · 白名单 · CSP · HttpOnly</div>
            </div>
            <div class="node" style="border-color:var(--host)">
              <div class="node-h"><span class="node-ico">🎭</span> CSRF</div>
              <div class="payload" style="color:#d6b3ff;border-color:var(--host)">借用已登录 cookie，冒名发请求</div>
              <div class="node-sub">本质：<b>借用</b>你已登录的身份<br>武器：浏览器自动带 cookie<br>战果：替你转账 / 改密码<br>防御：SameSite · CSRF Token · 校验 Origin</div>
            </div>
          </div>
          ${verdict(s)}`;
        return;
      }

      // ============ ACT 1: XSS ============
      if(s.act==='xss'){
        const f = s.flow;
        const attackerActive = (f==='inject'||f==='steal');
        const serverActive = (f==='inject'||f==='store'||f==='defend');
        const victimActive = (f==='render'||f==='steal'||f==='defend');

        // attacker node
        let attackerInner = `<div class="payload bad-code">&lt;script&gt;偷cookie&lt;/script&gt;</div>`;
        if(f==='steal') attackerInner += `<div class="cookie">📥 收到 cookie: session=abc…</div>`;
        const attacker = `<div class="node attacker ${attackerActive?'':'dim'}">
          <div class="node-h"><span class="node-ico">🦹</span> 攻击者</div>
          ${attackerInner}
          <div class="node-sub">在评论框注入脚本</div></div>`;

        // server / db node
        let serverInner = '';
        if(f==='inject'||f==='store'){
          serverInner = `<div class="db-row">comment #42: <b>&lt;script&gt;偷cookie&lt;/script&gt;</b></div>`;
        } else if(f==='defend'){
          serverInner = `<div class="shield">🛡️</div><div class="payload escaped">转义 → &amp;lt;script&amp;gt;偷cookie&amp;lt;/script&amp;gt;</div><div class="db-row" style="border-left-color:var(--micro)">CSP: script-src 'self'</div>`;
        } else {
          serverInner = `<div class="db-row">comment #42: <b>&lt;script&gt;偷cookie&lt;/script&gt;</b></div>`;
        }
        const server = `<div class="node server ${serverActive?'':'dim'} ${f==='defend'?'guard':''}">
          <div class="node-h"><span class="node-ico">🗄️</span> 服务器 / 数据库</div>
          ${serverInner}
          <div class="node-sub">${f==='defend'?'输出转义 + CSP':'未过滤直接存储'}</div></div>`;

        // victim node
        let victimInner = '';
        if(f==='render'){
          victimInner = `<div class="payload exec">&lt;script&gt; 执行中…<span class="badge exec">EXECUTED</span></div>`;
        } else if(f==='steal'){
          victimInner = `<div class="payload exec">脚本运行<span class="badge exec">EXECUTED</span></div><div class="cookie">🍪 document.cookie 被读取</div>`;
        } else if(f==='defend'){
          victimInner = `<div class="payload escaped">&lt;script&gt;偷cookie&lt;/script&gt;<span class="badge inert">纯文本</span></div>`;
        } else {
          victimInner = `<div class="node-sub" style="margin:auto 0;color:var(--sub)">等待访问页面…</div>`;
        }
        const victim = `<div class="node victim ${victimActive?'':'dim'}">
          <div class="node-h"><span class="node-ico">🧑‍💻</span> 受害者浏览器</div>
          ${victimInner}
          <div class="node-sub">${f==='defend'?'脚本被当文本，不执行':'渲染服务器返回内容'}</div></div>`;

        // flows between
        let flowTop='', flowBot='';
        if(f==='inject'||f==='store') flowTop = arrow('bad', f==='inject'?'① 提交注入':'② 原样存入', '🐛');
        if(f==='render') flowTop = arrow('bad','③ 加载含毒页面','🐛');
        if(f==='steal'){ flowTop = arrow('bad','③ 含毒页面','🐛'); flowBot = arrow('bad','④ cookie 外泄 →攻击者','🍪'); }
        if(f==='defend') flowTop = arrow('good','安全内容（已转义）','✅');

        body.innerHTML = `
          <div class="stage">${attacker}${server}${victim}</div>
          ${flowTop}${flowBot}
          ${verdict(s)}`;
        return;
      }

      // ============ ACT 2: CSRF ============
      if(s.act==='csrf'){
        const f = s.flow;

        // user / browser node (always central)
        let cookieLine = `<div class="cookie">🍪 bank.com cookie: session=zhang</div>`;
        const user = `<div class="node victim">
          <div class="node-h"><span class="node-ico">🧑</span> 用户浏览器</div>
          ${cookieLine}
          <div class="node-sub">${f==='login'?'刚登录 bank.com':'持有 bank 的登录态'}</div></div>`;

        // bank node
        let bankInner = '';
        if(f==='forge' && s.verdict==='bad'){
          bankInner = `<div class="payload exec">收到转账请求 + 合法cookie<span class="badge exec">转账成功</span></div>`;
        } else if(f==='defend'){
          bankInner = `<div class="shield">🛡️</div><div class="payload escaped">校验：SameSite ✓ Token ✗</div><div class="db-row" style="border-left-color:var(--bad)"><b>拒绝</b>：跨站无 token</div>`;
        } else if(f==='forge'){
          bankInner = `<div class="payload" style="color:#ffd58a;border-color:var(--macro)">/transfer?to=hacker&amp;amt=9999</div>`;
        } else {
          bankInner = `<div class="node-sub" style="margin:auto 0">已登录会话有效</div>`;
        }
        const bank = `<div class="node bank ${f==='defend'?'guard':''}">
          <div class="node-h"><span class="node-ico">🏦</span> bank.com</div>
          ${bankInner}
          <div class="node-sub">${f==='defend'?'SameSite + 校验 Token':'只认 cookie 判断身份'}</div></div>`;

        // evil node
        let evilInner = '';
        if(f==='login'){
          evilInner = `<div class="node-sub" style="margin:auto 0;color:var(--sub)">尚未出场…</div>`;
        } else {
          evilInner = `<div class="payload bad-code">&lt;form action="bank.com/transfer"&gt;<br>auto-submit 🚀&lt;/form&gt;</div>`;
        }
        const evil = `<div class="node evil ${f==='login'?'dim':''}">
          <div class="node-h"><span class="node-ico">😈</span> evil.com</div>
          ${evilInner}
          <div class="node-sub">伪造请求发往 bank</div></div>`;

        // arrows
        let flowTop='';
        if(f==='login') flowTop = arrow('sync','登录态已建立','🔑');
        if(f==='lure') flowTop = arrow('bad','② 诱导用户访问','🪝');
        if(f==='forge') flowTop = arrow('bad','③ 偷发请求 + 自动带 cookie 🍪','💸');
        if(f==='defend') flowTop = arrow('good','跨站请求被拦截','🚫');

        // order: bank | user | evil  (user in middle, cookie auto-attached to bank request)
        body.innerHTML = `
          <div class="stage">${bank}${user}${evil}</div>
          ${flowTop}
          ${verdict(s)}`;
        return;
      }
    }
  });
})();
</script>
<!-- scene: http2 -->
<script>
(function(){
  window.SCENES = window.SCENES || [];
  window.SCENES.push({
    id:'http2', title:'HTTP/1.1 队头阻塞 vs HTTP/2 多路复用', cat:'性能·网络',
    css:`
      .scene-http2{display:flex;flex-direction:column;gap:14px}
      .scene-http2 .track{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:12px 14px;animation:http2-fade .4s ease}
      .scene-http2 .track h4{margin:0 0 8px;font-size:13px;color:var(--txt);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
      .scene-http2 .tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
      .scene-http2 .tag.v1{background:rgba(245,158,11,.15);border:1px solid var(--macro);color:var(--macro)}
      .scene-http2 .tag.v2{background:rgba(79,140,255,.15);border:1px solid var(--sync);color:var(--sync)}
      .scene-http2 .note{font-size:11px;color:var(--sub);font-weight:400}
      .scene-http2 .pipe{position:relative;height:40px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);overflow:hidden;display:flex;align-items:center}
      .scene-http2 .pipe.multi{height:auto;min-height:40px;overflow:visible;flex-direction:column;align-items:stretch;justify-content:center;gap:0;padding:8px 0;background:var(--panel2)}
      .scene-http2 .pipe .lane{height:40px;position:relative;display:flex;align-items:center;border-bottom:1px solid var(--line)}
      .scene-http2 .pipe .lane:last-child{border-bottom:none}
      .scene-http2 .laneLabel{position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--sub);z-index:3;background:var(--panel2);padding:1px 5px;border-radius:4px}
      .scene-http2 .frame{height:24px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0f1115;margin:0 2px;animation:http2-slide .5s cubic-bezier(.2,.7,.3,1) both;box-shadow:0 1px 4px rgba(0,0,0,.3)}
      .scene-http2 .frame.r{background:var(--bad)}
      .scene-http2 .frame.g{background:var(--micro)}
      .scene-http2 .frame.b{background:var(--sync)}
      .scene-http2 .frame.pending{opacity:.18;filter:grayscale(.6);box-shadow:none;animation:none}
      .scene-http2 .blockedBanner{display:inline-flex;align-items:center;width:fit-content;margin:0 0 6px;font-size:11px;font-weight:700;color:var(--bad);background:rgba(239,68,68,.12);border:1px solid var(--bad);border-radius:6px;padding:2px 8px;animation:http2-pulse 1.1s ease-in-out infinite}
      .scene-http2 .conns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
      .scene-http2 .conn{flex:1;min-width:60px}
      .scene-http2 .res{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
      .scene-http2 .resItem{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub)}
      .scene-http2 .dot{width:12px;height:12px;border-radius:3px}
      .scene-http2 .dot.r{background:var(--bad)}
      .scene-http2 .dot.g{background:var(--micro)}
      .scene-http2 .dot.b{background:var(--sync)}
      .scene-http2 .prog{margin-top:8px}
      .scene-http2 .progRow{display:flex;align-items:center;gap:8px;margin:4px 0}
      .scene-http2 .progRow .lbl{font-size:11px;width:62px;color:var(--sub);flex-shrink:0}
      .scene-http2 .bar{flex:1;height:14px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);overflow:hidden}
      .scene-http2 .fill{height:100%;border-radius:7px;transition:width .6s cubic-bezier(.3,.8,.4,1)}
      .scene-http2 .fill.v1{background:linear-gradient(90deg,var(--macro),#fbbf24)}
      .scene-http2 .fill.v2{background:linear-gradient(90deg,var(--sync),#7eaaff)}
      .scene-http2 .pct{font-size:11px;width:38px;text-align:right;color:var(--txt);flex-shrink:0;font-variant-numeric:tabular-nums}
      .scene-http2 .done{color:var(--micro);font-weight:700}
      .scene-http2 .callout{font-size:12px;color:var(--txt);background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--sync);border-radius:8px;padding:8px 12px;animation:http2-fade .4s ease}
      .scene-http2 .callout.warn{border-left-color:var(--macro)}
      .scene-http2 .callout.good{border-left-color:var(--micro)}
      @keyframes http2-slide{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
      @keyframes http2-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
      @keyframes http2-pulse{0%,100%{opacity:1}50%{opacity:.45}}
    `,
    html:`<div class="scene-http2">
      <div data-region="callout"></div>
      <div class="track" data-region="v1"></div>
      <div class="track" data-region="v2"></div>
      <div data-region="prog"></div>
    </div>`,
    steps:[
      { n:`两条赛道都要加载同样的 3 个资源：<span class="hl-host" style="color:var(--bad)">红</span>、<span class="hl-micro">绿</span>、<span class="hl-sync">蓝</span>。上面走 <b>HTTP/1.1</b>，下面走 <b>HTTP/2</b>，看谁先全部到达。`,
        callout:{t:'同样的任务：在一条连接上取回 红 / 绿 / 蓝 三个资源。', k:''},
        v1:{mode:'idle'}, v2:{mode:'idle'}, p1:0, p2:0 },

      { n:`<b>HTTP/1.1</b> 的一条 TCP 连接像<b>单车道</b>：同一时刻只能跑一个请求。<span class="hl-host" style="color:var(--bad)">红</span> 先上路开始传输，绿和蓝只能<b>排队干等</b>。`,
        callout:{t:'HTTP/1.1：一条连接同一时刻只服务一个请求，其余排队。', k:'warn'},
        v1:{mode:'serial', active:0, sent:[], queued:[1,2], blocked:false}, v2:{mode:'idle'}, p1:8, p2:0 },

      { n:`偏偏 <span class="hl-host" style="color:var(--bad)">红</span> 是个<b>大文件</b>，传得很慢。绿和蓝明明很小、早就准备好了，却被前面这个慢请求<b>死死堵住</b>——这就是<span style="color:var(--bad)">队头阻塞 (Head-of-Line Blocking)</span>。`,
        callout:{t:'红是大文件传得慢 → 后面的绿、蓝被堵住：队头阻塞。', k:'warn'},
        v1:{mode:'serial', active:0, sent:[], queued:[1,2], blocked:true}, v2:{mode:'idle'}, p1:22, p2:0 },

      { n:`等到 <span class="hl-host" style="color:var(--bad)">红</span> 终于传完，<span class="hl-micro">绿</span> 才轮到上路。请求只能<b>一个接一个串行</b>跑完，总时间是三者之<b>和</b>。`,
        callout:{t:'红传完 → 绿才开始 → 之后才轮到蓝。串行，总耗时是三者之和。', k:'warn'},
        v1:{mode:'serial', active:1, sent:[0], queued:[2], blocked:false}, v2:{mode:'idle'}, p1:55, p2:0 },

      { n:`现在看下面的 <b>HTTP/2</b>。它在<b>同一条连接</b>里开出 3 个 <b>stream</b>，把每个资源拆成带 stream id 的<b>二进制帧</b>。`,
        callout:{t:'HTTP/2：同一条连接切成多个 stream，每个请求拆成带 id 的二进制帧。', k:''},
        v1:{mode:'serial', active:1, sent:[0], queued:[2], blocked:false}, v2:{mode:'multi', frames:'init'}, p1:62, p2:10 },

      { n:`关键来了：三个 stream 的帧在这一条连接上<b>交错</b>传输——<span class="hl-host" style="color:var(--bad)">红</span><span class="hl-micro">绿</span><span class="hl-sync">蓝</span> 帧交替穿插，<b>互不阻塞</b>。这就是<span class="hl-sync">多路复用 (Multiplexing)</span>。`,
        callout:{t:'多路复用：红绿蓝的帧交错穿插在一条连接上，谁都不必等谁。', k:''},
        v1:{mode:'serial', active:2, sent:[0,1], queued:[], blocked:false}, v2:{mode:'multi', frames:'flow'}, p1:80, p2:55 },

      { n:`因为并行流动，HTTP/2 三个资源<b>几乎同时到达</b>。看进度条——下面的 <span class="hl-sync">HTTP/2</span> 已经<b>领先冲线</b>，而上面的 1.1 还在跑最后一个。`,
        callout:{t:'帧并行流动 → 三个资源几乎同时完成。HTTP/2 进度明显领先。', k:'good'},
        v1:{mode:'serial', active:2, sent:[0,1], queued:[], blocked:false}, v2:{mode:'multi', frames:'flow'}, p1:88, p2:100 },

      { n:`HTTP/1.1 全部传完时，HTTP/2 早已完成。此外 HTTP/2 还有 <b>HPACK 头部压缩</b>：重复的请求头不必每次重发，进一步省流量。`,
        callout:{t:'额外加成：HPACK 头部压缩，重复的请求头不再每次重发。', k:'good'},
        v1:{mode:'serial', active:-1, sent:[0,1,2], queued:[], blocked:false}, v2:{mode:'multi', frames:'flow', done:true}, p1:100, p2:100 },

      { n:`<b>aha</b>：HTTP/1.1 是<b>排队过独木桥</b>，前面的人慢了全队卡死，只能多开几条桥（浏览器≤6 连接）硬撑；HTTP/2 是把货物<b>拆成小块，在同一条路上穿插并行</b>——一条连接吃下所有请求，互不阻塞。`,
        callout:{t:'独木桥排队 vs 同一条路上拆块穿插并行 —— 这就是多路复用的威力。', k:'good'},
        v1:{mode:'serial', active:-1, sent:[0,1,2], queued:[], blocked:false}, v2:{mode:'multi', frames:'flow', done:true}, p1:100, p2:100 },
    ],
    apply(root, i){
      const s = this.steps[i];
      const names = ['红','绿','蓝'];
      const cls = ['r','g','b'];

      // callout
      const co = root.querySelector('[data-region="callout"]');
      if(s.callout && s.callout.t){
        co.innerHTML = `<div class="callout ${s.callout.k||''}">${s.callout.t}</div>`;
      } else { co.innerHTML = ''; }

      // ---- HTTP/1.1 track ----
      const v1 = root.querySelector('[data-region="v1"]');
      let v1pipe = '';
      const st1 = s.v1 || {mode:'idle'};
      if(st1.mode === 'idle'){
        v1pipe = `<div class="pipe"><span class="frame r pending">红</span><span class="frame g pending">绿</span><span class="frame b pending">蓝</span></div>`;
      } else {
        const sent = st1.sent || [];
        const active = st1.active;
        const queued = st1.queued || [];
        let parts = '';
        // already-sent (completed) resources shown faintly at left
        sent.forEach(idx=>{ parts += `<span class="frame ${cls[idx]}" style="opacity:.45">${names[idx]}✓</span>`; });
        // active resource = a long bar (the one currently transmitting)
        if(active >= 0){
          const big = active === 0; // red is the big file
          parts += `<span class="frame ${cls[active]}" style="width:${big?140:70}px">${names[active]}…</span>`;
        }
        // queued resources waiting
        queued.forEach(idx=>{ parts += `<span class="frame ${cls[idx]} pending">${names[idx]}</span>`; });
        const blockedTag = st1.blocked ? `<div class="blockedBanner">⛔ 队头阻塞：绿/蓝在等</div>` : '';
        v1pipe = `${blockedTag}<div class="pipe">${parts}</div>`;
      }
      v1.innerHTML = `
        <h4><span class="tag v1">HTTP/1.1</span> 单连接·串行 <span class="note">同一时刻仅一个请求</span></h4>
        ${v1pipe}
        <div class="res">
          <span class="resItem"><span class="dot r"></span>红=大文件(慢)</span>
          <span class="resItem"><span class="dot g"></span>绿=小</span>
          <span class="resItem"><span class="dot b"></span>蓝=小</span>
        </div>`;

      // ---- HTTP/2 track ----
      const v2 = root.querySelector('[data-region="v2"]');
      const st2 = s.v2 || {mode:'idle'};
      let v2pipe = '';
      if(st2.mode === 'idle'){
        v2pipe = `<div class="pipe"><span class="frame r pending">红</span><span class="frame g pending">绿</span><span class="frame b pending">蓝</span></div>`;
      } else {
        // single connection, frames interleaved by stream id
        let seq;
        if(st2.frames === 'init'){
          seq = [0,1,2]; // streams just opened, one frame each
        } else {
          // interleaved frames red/green/blue穿插
          seq = [0,1,2,0,1,2,0,2,1,0,1,2];
        }
        const dim = st2.frames === 'init';
        const frames = seq.map((idx,k)=>{
          const style = `style="animation-delay:${(k*0.04).toFixed(2)}s;width:26px${dim?';opacity:.6':''}"`;
          const label = `<span style="font-size:9px;opacity:.85">#${idx+1}</span>`;
          return `<span class="frame ${cls[idx]}" ${style}>${label}</span>`;
        }).join('');
        const doneTag = st2.done ? `<div class="blockedBanner" style="color:var(--micro);background:rgba(34,197,94,.12);border-color:var(--micro);animation:none">✓ 三者几乎同时到达</div>` : '';
        v2pipe = `${doneTag}<div class="pipe multi"><span class="laneLabel">单连接</span><div style="margin-left:62px;display:flex;flex-wrap:wrap;align-items:center;gap:4px 2px">${frames}</div></div>`;
      }
      v2.innerHTML = `
        <h4><span class="tag v2">HTTP/2</span> 单连接·多路复用 <span class="note">帧带 stream id 交错并行</span></h4>
        ${v2pipe}
        <div class="res">
          <span class="resItem"><span class="dot r"></span>stream#1 红</span>
          <span class="resItem"><span class="dot g"></span>stream#2 绿</span>
          <span class="resItem"><span class="dot b"></span>stream#3 蓝</span>
        </div>`;

      // ---- progress ----
      const prog = root.querySelector('[data-region="prog"]');
      const p1 = s.p1||0, p2 = s.p2||0;
      const tag1 = p1>=100 ? `<span class="pct done">完成</span>` : `<span class="pct">${p1}%</span>`;
      const tag2 = p2>=100 ? `<span class="pct done">完成</span>` : `<span class="pct">${p2}%</span>`;
      prog.innerHTML = `
        <div class="prog">
          <div class="progRow"><span class="lbl">HTTP/1.1</span><div class="bar"><div class="fill v1" style="width:${p1}%"></div></div>${tag1}</div>
          <div class="progRow"><span class="lbl">HTTP/2</span><div class="bar"><div class="fill v2" style="width:${p2}%"></div></div>${tag2}</div>
        </div>`;
    }
  });
})();
</script>
<!-- scene: rag -->
<script>
(function(){
  window.SCENES = window.SCENES || [];
  window.SCENES.push({
    id:'rag', title:'RAG 检索增强生成链路', cat:'AI',
    css:`
      .scene-rag{display:flex;flex-direction:column;gap:14px}
      .scene-rag .phase-tabs{display:flex;gap:8px}
      .scene-rag .ptab{flex:1;text-align:center;padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--sub);font-size:13px;font-weight:600;transition:.3s}
      .scene-rag .ptab.on-off{border-color:var(--macro);color:var(--macro);background:rgba(245,158,11,.10)}
      .scene-rag .ptab.on-on{border-color:var(--sync);color:var(--sync);background:rgba(79,140,255,.10)}
      .scene-rag .stage{display:grid;grid-template-columns:1.1fr 1.3fr;gap:14px}
      @media(max-width:680px){.scene-rag .stage{grid-template-columns:1fr}}
      .scene-rag .panel{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:12px;position:relative;min-height:120px}
      .scene-rag .panel h4{margin:0 0 10px;font-size:12px;letter-spacing:.5px;color:var(--sub);text-transform:uppercase;display:flex;align-items:center;gap:6px}
      .scene-rag .dot-tag{width:8px;height:8px;border-radius:50%;display:inline-block}

      .scene-rag .doc{border:1px dashed var(--line);border-radius:8px;padding:8px;background:var(--panel2);color:var(--sub);font-size:11px;line-height:1.5;animation:rag-pop .4s ease}
      .scene-rag .doc.faded{opacity:.35}

      .scene-rag .chunks{display:flex;flex-direction:column;gap:6px;margin-top:8px}
      .scene-rag .chunk{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:var(--panel2);font-size:12px;color:var(--txt);animation:rag-slide .4s ease both}
      .scene-rag .chunk .cid{flex:none;width:20px;height:20px;border-radius:6px;background:rgba(245,158,11,.16);border:1px solid var(--macro);color:var(--macro);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
      .scene-rag .chunk .ctxt{flex:1;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .scene-rag .chunk.embed{border-color:var(--sync);box-shadow:0 0 0 1px rgba(79,140,255,.3)}
      .scene-rag .chunk .vecbadge{flex:none;font-family:ui-monospace,monospace;font-size:10px;color:var(--sync);opacity:0;animation:rag-pop .35s ease both .1s;animation-fill-mode:forwards}
      .scene-rag .chunk.embed .vecbadge{opacity:1}

      .scene-rag .embedbar{display:flex;align-items:center;justify-content:center;gap:8px;margin:6px 0;font-size:11px;color:var(--sync)}
      .scene-rag .embedbar .pill{border:1px solid var(--sync);border-radius:999px;padding:3px 10px;background:rgba(79,140,255,.10);animation:rag-pulse 1.6s ease-in-out infinite}
      .scene-rag .arrowdn{color:var(--sub);font-size:14px}

      .scene-rag .space{position:relative;width:100%;height:230px;border:1px solid var(--line);border-radius:10px;background:radial-gradient(circle at 50% 50%, rgba(79,140,255,.05), transparent 70%),var(--panel2);overflow:hidden}
      .scene-rag .space .axis{position:absolute;background:var(--line)}
      .scene-rag .space .axis.x{left:8%;right:8%;top:50%;height:1px}
      .scene-rag .space .axis.y{top:8%;bottom:8%;left:50%;width:1px}
      .scene-rag .space .axlabel{position:absolute;font-size:9px;color:var(--sub);opacity:.7}
      .scene-rag .pt{position:absolute;width:13px;height:13px;border-radius:50%;transform:translate(-50%,-50%);background:var(--macro);border:1px solid #fff2;animation:rag-pop .4s ease both;cursor:default}
      .scene-rag .pt .lbl{position:absolute;left:50%;top:-15px;transform:translateX(-50%);font-size:9px;color:var(--sub);white-space:nowrap}
      .scene-rag .pt.q{width:16px;height:16px;background:var(--micro);border:2px solid #fff;box-shadow:0 0 12px rgba(34,197,94,.7);z-index:5}
      .scene-rag .pt.hit{background:var(--sync);box-shadow:0 0 10px rgba(79,140,255,.8);z-index:4}
      .scene-rag .pt.hit .lbl{color:var(--sync);font-weight:700}
      .scene-rag .ring{position:absolute;border:2px dashed var(--micro);border-radius:50%;transform:translate(-50%,-50%);opacity:.8;animation:rag-ring .6s ease both}
      .scene-rag .connln{position:absolute;height:1px;background:linear-gradient(90deg,var(--micro),var(--sync));transform-origin:left center;opacity:.6;animation:rag-pop .5s ease both}

      .scene-rag .qbox{border:1px solid var(--micro);border-radius:8px;padding:9px 11px;background:rgba(34,197,94,.10);color:var(--txt);font-size:13px;animation:rag-pop .4s ease both}
      .scene-rag .qbox b{color:var(--micro)}

      .scene-rag .prompt{border:1px solid var(--sync);border-radius:10px;padding:10px;background:rgba(79,140,255,.08);animation:rag-pop .45s ease both}
      .scene-rag .prompt .ptitle{font-size:11px;color:var(--sync);font-weight:700;margin-bottom:7px;letter-spacing:.5px}
      .scene-rag .prompt .ctx{border:1px solid var(--line);border-left:3px solid var(--macro);border-radius:6px;padding:5px 8px;margin:5px 0;font-size:11px;color:var(--sub);background:var(--panel2);animation:rag-slide .4s ease both}
      .scene-rag .prompt .ctx .src{color:var(--macro);font-weight:700;font-size:10px}
      .scene-rag .prompt .qline{margin-top:7px;font-size:12px;color:var(--txt);border-top:1px dashed var(--line);padding-top:7px}
      .scene-rag .prompt .qline b{color:var(--micro)}

      .scene-rag .llm{display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--host);border-radius:10px;padding:12px;background:rgba(168,85,247,.10);color:var(--host);font-weight:700;font-size:14px;animation:rag-pop .4s ease both}
      .scene-rag .llm .spark{animation:rag-pulse 1.4s ease-in-out infinite}

      .scene-rag .answer{border:1px solid var(--micro);border-radius:10px;padding:11px 13px;background:rgba(34,197,94,.08);color:var(--txt);font-size:13px;line-height:1.6;animation:rag-pop .5s ease both}
      .scene-rag .answer .fn{display:inline-block;background:rgba(79,140,255,.2);border:1px solid var(--sync);color:var(--sync);border-radius:4px;font-size:10px;padding:0 4px;margin:0 1px;font-weight:700;vertical-align:super}
      .scene-rag .foot{margin-top:8px;border-top:1px dashed var(--line);padding-top:7px;font-size:10px;color:var(--sub)}
      .scene-rag .foot .fline{margin:3px 0;animation:rag-slide .35s ease both}
      .scene-rag .foot .fline .fn{vertical-align:baseline}

      .scene-rag .vs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      @media(max-width:680px){.scene-rag .vs{grid-template-columns:1fr}}
      .scene-rag .vscard{border:1px solid var(--line);border-radius:10px;padding:11px;font-size:12px;line-height:1.55}
      .scene-rag .vscard.bad{border-color:var(--bad);background:rgba(239,68,68,.07)}
      .scene-rag .vscard.good{border-color:var(--micro);background:rgba(34,197,94,.07)}
      .scene-rag .vscard .vt{font-weight:700;margin-bottom:6px;font-size:12px}
      .scene-rag .vscard.bad .vt{color:var(--bad)}
      .scene-rag .vscard.good .vt{color:var(--micro)}
      .scene-rag .vscard .vbody{color:var(--sub)}

      .scene-rag .muted{color:var(--sub);font-size:12px}

      @keyframes rag-pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
      @keyframes rag-pop-pt{from{opacity:0;transform:translate(-50%,-50%) scale(.4)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
      @keyframes rag-slide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
      @keyframes rag-ring{from{opacity:0;width:0;height:0}to{opacity:.8}}
      @keyframes rag-pulse{0%,100%{opacity:1}50%{opacity:.45}}
    `,
    html:`<div class="scene-rag">
      <div class="phase-tabs">
        <div class="ptab" data-tab="off">离线 · 建索引</div>
        <div class="ptab" data-tab="on">在线 · 问答</div>
      </div>
      <div data-region="body"></div>
    </div>`,
    // 文档块数据（落点坐标按语义聚类示意）
    DOCS:[
      {id:1, txt:'退款政策：7 天内可无理由退款', x:30, y:32},
      {id:2, txt:'退款到账时间一般 3-5 个工作日', x:38, y:44},
      {id:3, txt:'会员等级与积分兑换规则', x:72, y:28},
      {id:4, txt:'发票开具流程与抬头修改', x:66, y:70},
      {id:5, txt:'账号注销后的数据保留期', x:24, y:74},
      {id:6, txt:'退款需通过原支付渠道返回', x:34, y:38}
    ],
    // 问题落点 + 召回命中（语义最近的退款相关块）
    QUERY:{x:33, y:39, hits:[1,6,2]},
    steps:[
      { n:`大模型有<b>知识截止</b>、还会<span class="hl-bad">一本正经地胡说(幻觉)</span>。<b>RAG</b> 给它外挂一个可检索的知识库——先看离线建索引，再看在线问答。`, tab:'off', view:'intro' },
      { n:`离线第一步：把一篇<b>长文档</b>按段落<b>切块(chunking)</b>，切成若干语义独立的小片段。太大检索不准，太小丢上下文。`, tab:'off', view:'doc' },
      { n:`切好的 <span class="hl-macro">6 个 chunk</span> 排好队。每一块都将被送进 <span class="hl-sync">embedding 模型</span>。`, tab:'off', view:'chunks', embedded:0 },
      { n:`embedding 模型把每段文字编码成一个<b>高维向量</b>（这里用一串数字示意）——语义相近的文字，向量也相近。`, tab:'off', view:'chunks', embedded:6 },
      { n:`把这些向量<b>存进向量数据库</b>，落在一张「<span class="hl-sync">向量空间</span>」里。注意<b>退款</b>相关的 #1#6#2 自然聚在了一起——<span class="hl-micro">语义相似 = 空间距离近</span>。`, tab:'off', view:'space', mode:'index' },
      { n:`离线建好了。<b>在线阶段</b>来了用户提问：<span class="hl-micro">"我退款多久能到账？"</span>`, tab:'on', view:'query' },
      { n:`问题走<b>同一个 embedding 模型</b>，变成空间里的<span class="hl-micro">一个绿点</span>，和文档片段在同一坐标系里。`, tab:'on', view:'space', mode:'query' },
      { n:`以问题为圆心做<b>相似度检索(近似最近邻 ANN)</b>，召回距离最近的 <span class="hl-sync">Top-K=3</span> 个片段：<b>#1 #6 #2</b>。这就是「检索」。`, tab:'on', view:'space', mode:'recall' },
      { n:`把召回的<span class="hl-macro">原文片段</span> + <span class="hl-micro">用户问题</span>拼成一个 <span class="hl-sync">prompt</span>，喂给 LLM。模型只需「照着材料回答」，不靠记忆瞎编。`, tab:'on', view:'prompt' },
      { n:`LLM 基于给定上下文<span class="hl-host">生成答案</span>，并在句末附上 <span class="hl-sync">[1][2]</span> 脚注，<b>指回原始片段</b>——可溯源、可核对。`, tab:'on', view:'answer' },
      { n:`对比一下：左边<span class="hl-bad">裸 LLM</span> 凭记忆胡诌；右边 <span class="hl-micro">RAG</span> 拿真实片段作答还带出处。<b>金句：RAG 把「语义相似」变成了「向量空间里的距离近」，用检索喂事实，治知识截止与幻觉。</b>`, tab:'on', view:'vs' }
    ],
    apply(root, i){
      const s = this.steps[i];
      const DOCS = this.DOCS, Q = this.QUERY;

      // tabs
      root.querySelectorAll('.ptab').forEach(t=>{
        t.classList.remove('on-off','on-on');
        if(t.dataset.tab===s.tab) t.classList.add(s.tab==='off'?'on-off':'on-on');
      });

      const body = root.querySelector('[data-region="body"]');

      const renderSpace = (mode)=>{
        const showRing = mode==='recall';
        const showQ = mode==='query'||mode==='recall';
        const hits = Q.hits;
        const pts = DOCS.map(d=>{
          const isHit = (mode==='recall') && hits.includes(d.id);
          return `<div class="pt ${isHit?'hit':''}" style="left:${d.x}%;top:${d.y}%">
            <span class="lbl">#${d.id}</span>
          </div>`;
        }).join('');
        // connection lines from Q to hits (recall)
        let lines='';
        if(mode==='recall'){
          lines = hits.map(h=>{
            const d = DOCS.find(x=>x.id===h);
            const dx=(d.x-Q.x), dy=(d.y-Q.y);
            const len=Math.sqrt(dx*dx+dy*dy);
            const ang=Math.atan2(dy,dx)*180/Math.PI;
            return `<div class="connln" style="left:${Q.x}%;top:${Q.y}%;width:${len}%;transform:rotate(${ang}deg)"></div>`;
          }).join('');
        }
        const qpt = showQ ? `<div class="pt q" style="left:${Q.x}%;top:${Q.y}%"><span class="lbl">问题</span></div>`:'';
        const ring = showRing ? `<div class="ring" style="left:${Q.x}%;top:${Q.y}%;width:46%;height:46%"></div>`:'';
        return `<div class="space">
          <div class="axis x"></div><div class="axis y"></div>
          <span class="axlabel" style="right:9%;top:46%">语义维度 A →</span>
          <span class="axlabel" style="left:51%;top:8%">↑ 语义维度 B</span>
          ${lines}${ring}${pts}${qpt}
        </div>`;
      };

      if(s.view==='intro'){
        body.innerHTML = `
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--macro)"></span>RAG = Retrieval-Augmented Generation</h4>
            <div class="vs">
              <div class="vscard bad"><div class="vt">问题</div><div class="vbody">大模型权重是「冻结」的，训练截止后的新知识不知道；被问到不会的还会编造（幻觉）。</div></div>
              <div class="vscard good"><div class="vt">RAG 的解法</div><div class="vbody">先把资料存成可检索的向量库；提问时<b style="color:var(--sync)">先检索相关片段</b>，再让模型<b style="color:var(--micro)">照着材料回答</b>并给出处。</div></div>
            </div>
            <div class="muted" style="margin-top:10px">分两段：<b style="color:var(--macro)">离线</b>把文档变成向量索引 &nbsp;·&nbsp; <b style="color:var(--sync)">在线</b>检索召回再生成。</div>
          </div>`;
        return;
      }

      if(s.view==='doc'){
        body.innerHTML = `<div class="stage">
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--sub)"></span>原始长文档</h4>
            <div class="doc">《帮助手册》<br>… 退款政策：7 天内可无理由退款。退款到账时间一般 3-5 个工作日。退款需通过原支付渠道返回 … 会员等级与积分兑换规则 … 发票开具流程与抬头修改 … 账号注销后的数据保留期 …</div>
            <div class="embedbar"><span class="arrowdn">⬇ 按语义切块 (chunking)</span></div>
          </div>
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--macro)"></span>切块结果</h4>
            <div class="chunks">${DOCS.map(d=>`<div class="chunk"><span class="cid">${d.id}</span><span class="ctxt">${d.txt}</span></div>`).join('')}</div>
          </div>
        </div>`;
        return;
      }

      if(s.view==='chunks'){
        const allEmbedded = s.embedded>=DOCS.length;
        body.innerHTML = `<div class="stage">
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--macro)"></span>文本片段</h4>
            <div class="chunks">${DOCS.map(d=>`<div class="chunk ${allEmbedded?'embed':''}"><span class="cid">${d.id}</span><span class="ctxt">${d.txt}</span>${allEmbedded?'<span class="vecbadge">[.21,-.8,…]</span>':''}</div>`).join('')}</div>
          </div>
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--sync)"></span>Embedding 模型</h4>
            <div class="embedbar"><span class="pill">⚙ embedding model</span></div>
            <div style="text-align:center" class="arrowdn">${allEmbedded?'每段文字 → 一个高维向量':'文本逐块送入编码'}</div>
            <div class="muted" style="margin-top:10px;text-align:center">${allEmbedded?'语义相近 → 向量数值相近<br>这些向量将存入<b style="color:var(--sync)">向量数据库</b>':'把「意思」压缩成一串数字'}</div>
          </div>
        </div>`;
        return;
      }

      if(s.view==='space'){
        const titles = {index:'向量数据库 · 已建索引', query:'向量数据库 · 问题入场', recall:'向量数据库 · Top-K 召回'};
        const notes = {
          index:'退款相关的 #1 #6 #2 聚成一簇 —— 语义相似 = 距离近。',
          query:'问题用同一模型编码，落进同一坐标系（绿点）。',
          recall:'画圈取最近的 3 个邻居：#1 #6 #2 被召回。'
        };
        body.innerHTML = `<div class="panel">
          <h4><span class="dot-tag" style="background:${s.mode==='index'?'var(--macro)':'var(--micro)'}"></span>${titles[s.mode]}</h4>
          ${renderSpace(s.mode)}
          <div class="muted" style="margin-top:9px">${notes[s.mode]}</div>
        </div>`;
        return;
      }

      if(s.view==='query'){
        body.innerHTML = `<div class="panel">
          <h4><span class="dot-tag" style="background:var(--micro)"></span>在线 · 用户提问</h4>
          <div class="qbox">🧑 用户：<b>我退款多久能到账？</b></div>
          <div class="embedbar" style="margin-top:12px"><span class="arrowdn">⬇ 走同一个 embedding 模型，准备进向量空间检索</span></div>
        </div>`;
        return;
      }

      if(s.view==='prompt'){
        const hits = Q.hits;
        body.innerHTML = `<div class="stage">
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--sync)"></span>拼装 Prompt</h4>
            <div class="prompt">
              <div class="ptitle">SYSTEM / CONTEXT（召回的片段）</div>
              ${hits.map(h=>{const d=DOCS.find(x=>x.id===h);return `<div class="ctx"><span class="src">[${h}]</span> ${d.txt}</div>`}).join('')}
              <div class="qline">USER 问题：<b>我退款多久能到账？</b></div>
            </div>
          </div>
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--host)"></span>送入 LLM</h4>
            <div class="muted" style="margin:6px 0 12px">指令大意：<i>"只根据上面提供的资料回答，并标注出处编号。"</i></div>
            <div class="llm"><span class="spark">✨</span> 大语言模型 (LLM)</div>
            <div class="muted" style="margin-top:12px;text-align:center">模型不再靠记忆 → <b style="color:var(--micro)">照着事实材料生成</b></div>
          </div>
        </div>`;
        return;
      }

      if(s.view==='answer'){
        const hits = Q.hits;
        body.innerHTML = `<div class="stage">
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--host)"></span>LLM</h4>
            <div class="llm"><span class="spark">✨</span> 生成中…</div>
            <div class="muted" style="margin-top:10px;text-align:center">基于上下文组织语言，并挂上脚注</div>
          </div>
          <div class="panel">
            <h4><span class="dot-tag" style="background:var(--micro)"></span>带出处的答案</h4>
            <div class="answer">
              退款一般会在 <b>3-5 个工作日</b><span class="fn">[2]</span> 内到账，并通过<b>原支付渠道</b><span class="fn">[1]</span> 原路返回。
              <div class="foot">
                ${hits.map(h=>{const d=DOCS.find(x=>x.id===h);return `<div class="fline"><span class="fn">[${h}]</span> ${d.txt}</div>`}).join('')}
              </div>
            </div>
          </div>
        </div>`;
        return;
      }

      if(s.view==='vs'){
        body.innerHTML = `<div class="panel">
          <h4><span class="dot-tag" style="background:var(--micro)"></span>裸 LLM vs RAG</h4>
          <div class="vs">
            <div class="vscard bad">
              <div class="vt">❌ 裸 LLM（凭记忆）</div>
              <div class="vbody">"退款大概…<b style="color:var(--bad)">即时到账</b>吧。"<br><br>无依据、可能过时、<b style="color:var(--bad)">无法溯源</b>，幻觉风险高。</div>
            </div>
            <div class="vscard good">
              <div class="vt">✅ RAG（检索增强）</div>
              <div class="vbody">"3-5 个工作日<span class="fn" style="background:rgba(79,140,255,.2);border:1px solid var(--sync);color:var(--sync);border-radius:4px;font-size:10px;padding:0 4px;font-weight:700">2</span>，原渠道返回<span class="fn" style="background:rgba(79,140,255,.2);border:1px solid var(--sync);color:var(--sync);border-radius:4px;font-size:10px;padding:0 4px;font-weight:700">1</span>。"<br><br>有真实片段支撑、<b style="color:var(--micro)">可核对出处</b>。</div>

`,
    html:`<div class="scene-realtime-comm"><div data-region="stage"></div></div>`,
    steps:[
      { n:`想象一个常见需求：<b>服务器会在某些时刻产生新消息</b>（新订单、新通知、AI 的下一个字）。客户端怎么尽快拿到？下面四条通道应对的是<b>同一个需求</b>。` },
      { n:`<span class="hl-macro">短轮询 Polling</span>：客户端每隔固定时间就发一个请求问「有新数据吗？」。大多数时候答案是<span style="color:var(--bad);font-weight:700">「没有」</span>——<b>大量空请求被白白浪费</b>，而且新消息要等到下一次轮询才被发现，<b>有延迟</b>。` },
      { n:`<span class="hl-sync">长轮询 Long-Polling</span>：请求发出后，服务器<b>不立刻回</b>，而是把连接<b>挂起</b>，直到有数据或超时才返回；客户端拿到后<b>再发起下一个</b>。空请求大幅减少，但本质仍是<b>一来一回</b>。` },
      { n:`<span class="hl-micro">SSE（Server-Sent Events）</span>：只<b>建立一次连接</b>，之后服务器有数据就<b>主动单向推下来</b>。基于普通 HTTP、断了能<b>自动重连</b>，适合通知、<span class="hl-micro">大模型逐字回答</span>这种流式输出。` },
      { n:`<span class="hl-host">WebSocket</span>：一条<b>全双工</b>长连接，<b>客户端和服务器都能随时主动发消息</b>（既有上行也有下行）。适合<span class="hl-host">聊天、协作、游戏</span>这类双向频繁通信。` },
      { n:`四条通道并排看：从<span class="hl-macro">轮询</span>到<span class="hl-sync">长轮询</span>到<span class="hl-micro">SSE</span>再到<span class="hl-host">WebSocket</span>，<b>请求次数越来越少、实时性越来越强</b>。注意方向：SSE 只有<span class="hl-micro">下行</span>，WebSocket 是<span class="hl-host">双向</span>。` },
      { n:`一句话选型：<b>服务器单向推送</b>（通知 / 流式输出）用 <span class="hl-micro">SSE</span>；<b>双向频繁通信</b>（聊天 / 协作）用 <span class="hl-host">WebSocket</span>。aha：别再<span style="color:var(--bad);font-weight:700">反复敲门问</span>，直接<span class="hl-host">开一条专线</span>。` }
    ],
    apply(root, i){
      const lane = (cfg)=>{
        const rows = cfg.msgs.map(m=>{
          if(m.t==='hold'){
            return `<div class="rc-msg"><div class="rc-hold"><span class="rc-hold-txt">${m.label}</span></div></div>`;
          }
          const dir = m.t; // up | down | empty
          const label = m.label?`<span class="rc-label">${m.label}</span>`:'';
          const tag = m.tag?`<span class="rc-tag">${m.tag}</span>`:'';
          return `<div class="rc-msg rc-${dir}">${tag}<div class="rc-arrow">${label}</div></div>`;
        }).join('');
        const pipe = cfg.pipe?`<div class="rc-pipe"><span class="rc-pipe-txt">${cfg.pipe}</span></div>`:'';
        return `
          <div class="rc-lane${cfg.dim?' rc-dim':''}" data-k="${cfg.k}">
            <div class="rc-lane-head">
              <span class="rc-badge">${cfg.name}</span>
              <span class="rc-lane-sub">${cfg.sub}</span>
            </div>
            <div class="rc-track">
              <div class="rc-node"><span class="rc-emoji">💻</span>客户端</div>
              <div class="rc-channel">${pipe}${rows}</div>
              <div class="rc-node"><span class="rc-emoji">🖥️</span>服务器</div>
            </div>
          </div>`;
      };

      const poll = {
        k:'poll', name:'短轮询', sub:'定时问：有新数据吗？',
        msgs:[
          {t:'empty', label:'空', tag:'❓'},
          {t:'empty', label:'空', tag:'❓'},
          {t:'empty', label:'空', tag:'❓'},
          {t:'down',  label:'终于有数据', tag:'📩'}
        ]
      };
      const long = {
        k:'long', name:'长轮询', sub:'请求挂起，有数据才回',
        msgs:[
          {t:'up',   tag:'📨', label:'发起请求'},
          {t:'hold', label:'连接挂起，等待…'},
          {t:'down', tag:'📩', label:'有数据立即返回'},
          {t:'up',   tag:'📨', label:'随即再发起下一个'}
        ]
      };
      const sse = {
        k:'sse', name:'SSE', sub:'一次连接·服务器单向推送', pipe:'一条连接（只建一次）',
        msgs:[
          {t:'up',   tag:'🔗', label:'建立连接'},
          {t:'down', tag:'📩', label:'推送'},
          {t:'down', tag:'📩', label:'推送'},
          {t:'down', tag:'📩', label:'推送（逐字流式）'}
        ]
      };
      const ws = {
        k:'ws', name:'WebSocket', sub:'全双工·双向随时发', pipe:'一条双向管道',
        msgs:[
          {t:'up',   tag:'🔗', label:'握手升级'},
          {t:'up',   tag:'📨', label:'客户端发'},
          {t:'down', tag:'📩', label:'服务器发'},
          {t:'up',   tag:'📨', label:'客户端再发'}
        ]
      };

      const stage = root.querySelector('[data-region="stage"]');

      // 对比表（第6步）
      if(i>=5 && i<=5){
        stage.innerHTML = `
          <table class="rc-compare">
            <thead>
              <tr>
                <th>维度</th>
                <th class="rc-c-poll">短轮询</th>
                <th class="rc-c-long">长轮询</th>
                <th class="rc-c-sse">SSE</th>
                <th class="rc-c-ws">WebSocket</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th>请求次数</th>
                <td class="rc-bad">很多·多为空</td>
                <td>较多·无空请求</td>
                <td class="rc-good">1 次连接</td>
                <td class="rc-good">1 次连接</td>
              </tr>
              <tr>
                <th>实时性</th>
                <td class="rc-bad">差（有间隔）</td>
                <td>较好</td>
                <td class="rc-good">好</td>
                <td class="rc-good">最好</td>
              </tr>
              <tr>
                <th>方向</th>
                <td>客户端拉</td>
                <td>客户端拉</td>
                <td class="rc-c-sse">服务器→客户端<br>（单向）</td>
                <td class="rc-c-ws">双向</td>
              </tr>
              <tr>
                <th>典型场景</th>
                <td>简单·低频</td>
                <td>兼容老环境</td>
                <td class="rc-c-sse">通知·流式输出</td>
                <td class="rc-c-ws">聊天·协作·游戏</td>
              </tr>
            </tbody>
          </table>`;
        return;
      }

      // 结论（第7步）：保留对比表 + 金句
      if(i>=6){
        this.apply(root,5); // 复用对比表渲染
        const conc = document.createElement('div');
        conc.className='rc-conc';
        conc.innerHTML = `选型：服务器<b>单向推送</b>用 <b>SSE</b>；<span class="rc-line">双向频繁</span>通信用 <span class="rc-line">WebSocket</span>。<br>核心进化——从「<span class="rc-knock">反复敲门问有没有</span>」升级到「<span class="rc-line">开一条专线随时聊</span>」。`;
        stage.appendChild(conc);
        return;
      }

      // 逐个介绍：根据步数决定哪些 lane 高亮、哪些变暗
      // i=0 概览(全亮淡)，i=1 poll，i=2 long，i=3 sse，i=4 ws
      const order = ['poll','long','sse','ws'];
      const cfgMap = {poll, long, sse, ws};
      const focus = i===0 ? null : order[i-1];

      const lanesHtml = order.map(k=>{
        const cfg = Object.assign({}, cfgMap[k]);
        cfg.dim = focus!==null && focus!==k;
        return lane(cfg);
      }).join('');

      stage.innerHTML = `<div class="rc-lanes">${lanesHtml}</div>`;
    }
  });
})();
</script>

`,
    html:`<div class="scene-virtual-list"><div data-region="stage"></div></div>`,
    steps:[
      { n:`同样一份数据：<b>1 万条</b>列表。先看最朴素的做法——<span class="hl-bad">全量渲染</span>：把每一条都变成真实 DOM 节点。` },
      { n:`全量渲染下，浏览器要创建并维护 <span class="hl-bad">10000 个 DOM 节点</span>：首屏直接<b>卡死</b>、内存暴涨、滚动掉帧。` },
      { n:`关键洞察：屏幕一次<b>只能看见十几条</b>。可视区域外的 9000 多个节点，其实<span class="hl-macro">完全是浪费</span>。` },
      { n:`于是引入<span class="hl-sync">虚拟列表（windowing）</span>：固定高度的视口里，<b>只渲染可见的约 10 个</b> item。` },
      { n:`为了让滚动条仍是「1 万条那么长」，上下各放一个<span class="hl-macro">占位 spacer</span>：高度 = 未渲染项的总高，把整体高度撑起来。` },
      { n:`滚动时根据 <span class="hl-sync">scrollTop</span> 算出当前该渲染哪一段，<b>渲染窗口</b>随之下移——上 spacer 变高、下 spacer 变矮。` },
      { n:`旧的那十几个节点不销毁，而是<span class="hl-micro">回收复用</span>：改掉内容、挪到新位置。DOM 节点数<b>始终 ≈ 10</b>。` },
      { n:`无限滚动是另一思路：滚到底再加载<b>下一页</b>数据，常和虚拟列表<span class="hl-sync">配合使用</span>。` },
      { n:`对比一目了然：全量 <span class="hl-bad">10000 节点 / 卡顿</span> vs 虚拟 <span class="hl-micro">≈10 节点（恒定）/ 流畅</span>。` },
      { n:`aha：<b>DOM 只渲染你看得见的那一屏，其余统统用占位撑高度。</b>` }
    ],
    apply(root, i){
      const stage = root.querySelector('[data-region="stage"]');
      stage.innerHTML = '';

      // helpers
      const fullList = (highlight)=>{
        let items = '';
        for(let k=0;k<60;k++){
          const hot = highlight ? ' hot' : '';
          items += `<div class="vl-item${hot}">行 ${k+1} · item</div>`;
        }
        return `<div class="vl-scroll"><div class="vl-fulllist${highlight?' flood':''}">${items}</div></div>`;
      };

      const leftCol = (highlight, nodes)=>`
        <div class="vl-col">
          <div class="vl-head">
            <div class="vl-title">📜 全量渲染</div>
            <div class="vl-tag bad">卡顿 / 内存爆</div>
          </div>
          <div class="vl-sub">数据 10000 条 · 每条都进 DOM</div>
          <div class="vl-viewport dom">${fullList(highlight)}
            <div class="vl-track"></div>
          </div>
          <div class="vl-metric"><span>DOM 节点</span><span class="num bad">${nodes}</span></div>
        </div>`;

      // virtual list column. winStart = index of first visible item (0..9990)
      const rightCol = (opts)=>{
        const {winStart=0, recycled=false, total=10000, visible=10, label='渲染窗口'} = opts;
        const itemH = 18, gap = 3;
        // We only DRAW a few rows so the spacers have room to breathe and
        // visibly express "占位撑高度". The conceptual window is still ≈10.
        const drawn = Math.min(5, visible);
        const topCount = winStart;
        const botCount = total - winStart - visible;
        // Viewport split: window is small, spacers share the rest.
        const vpH = 230;
        const winH = drawn*itemH + (drawn-1)*gap + 12;
        const remain = vpH - winH; // ~116px for the two spacers together
        // Non-linear (NOT real-proportion) mapping so a small winStart change
        // still moves the spacers a visible amount. winStart=0 -> top at 0,
        // winStart->total -> top fills remain. Min visible band so a non-zero
        // count never collapses to an unreadable 0px sliver.
        const MIN = 16;
        const f = topCount<=0 ? 0 : Math.pow(topCount/total, 0.35);
        let topH = Math.round(remain * f);
        if(topCount>0) topH = Math.max(topH, MIN);
        let botH = remain - topH;
        if(botCount>0 && botH<MIN){ botH = MIN; topH = remain - botH; }
        if(topCount<=0) topH = 0;
        if(botCount<=0) botH = 0;
        const topTxt = topH>=14 ? `<span>上占位 · ${topCount.toLocaleString()} 项</span>` : '';
        const botTxt = botH>=14 ? `<span>下占位 · ${botCount.toLocaleString()} 项</span>` : '';
        let win = '';
        for(let k=0;k<drawn;k++){
          const cls = recycled ? 'vl-item live recycled' : 'vl-item live';
          win += `<div class="${cls}">行 ${winStart+k+1} · item</div>`;
        }
        // scrollbar thumb tracks the same non-linear progress as the window
        const thumbTop = 4 + Math.round((vpH-8-44) * f);
        return `
        <div class="vl-col">
          <div class="vl-head">
            <div class="vl-title">🪟 虚拟列表</div>
            <div class="vl-tag good">流畅</div>
          </div>
          <div class="vl-sub">数据 10000 条 · 只渲染一屏</div>
          <div class="vl-viewport">
            <div class="vl-spacer top" style="height:${topH}px">${topTxt}</div>
            <div class="vl-window">
              <div class="vl-winlabel">${label}</div>
              ${win}
            </div>
            <div class="vl-spacer bot" style="height:${botH}px">${botTxt}</div>
            <div class="vl-track"><div class="vl-thumb" style="top:${thumbTop}px;height:40px"></div></div>
          </div>
          <div class="vl-metric"><span>DOM 节点</span><span class="num good">≈ ${visible}（恒定）</span></div>
        </div>`;
      };

      if(i===0){
        stage.innerHTML = `<div class="vl-stage">${leftCol(false,'10000')}</div>`;
      } else if(i===1){
        stage.innerHTML = `<div class="vl-stage">${leftCol(true,'10000 ⚠️')}</div>
          <div class="vl-note">每个节点都要布局、绘制、占内存 → 首屏卡死</div>`;
      } else if(i===2){
        stage.innerHTML = `<div class="vl-stage">${leftCol(false,'10000')}</div>
          <div class="vl-concept">
            <div class="vl-cbox">
              <div class="vl-cstack">
                <div style="background:rgba(34,197,94,.2);color:var(--micro)">可见 ≈ 10 条</div>
                <div style="background:rgba(245,158,11,.14);color:var(--macro)">屏幕外 ≈ 9990 条</div>
              </div>
              <span>屏幕一次只看得见十几条</span>
            </div>
            <div class="vl-arrow">→</div>
            <div class="vl-cbox"><div style="font-size:22px">🗑️</div><span style="color:var(--macro)">其余渲染全是浪费</span></div>
          </div>`;
      } else if(i===3){
        stage.innerHTML = `<div class="vl-stage">${rightCol({winStart:0,label:'只渲染可见 10 个'})}</div>
          <div class="vl-note">固定高度视口 + 只渲染窗口内节点</div>`;
      } else if(i===4){
        stage.innerHTML = `<div class="vl-stage">${rightCol({winStart:0,label:'窗口 + 上下占位'})}</div>
          <div class="vl-concept">
            <div class="vl-cbox"><div style="font-size:20px;color:var(--macro)">⬆️ 上 spacer</div><span>高度 = 上方未渲染项总高</span></div>
            <div class="vl-arrow">＋</div>
            <div class="vl-cbox"><div style="font-size:20px;color:var(--sync)">🪟 渲染窗口</div><span>≈ 10 个真实节点</span></div>
            <div class="vl-arrow">＋</div>
            <div class="vl-cbox"><div style="font-size:20px;color:var(--macro)">⬇️ 下 spacer</div><span>撑出剩余滚动高度</span></div>
          </div>`;
      } else if(i===5){
        stage.innerHTML = `<div class="vl-stage">${rightCol({winStart:120,label:'scrollTop ↓ 窗口下移'})}</div>
          <div class="vl-metric" style="margin-top:2px"><span>当前 scrollTop 推算区间</span><span class="num sync">[行 121 ~ 行 130]</span></div>`;
      } else if(i===6){
        stage.innerHTML = `<div class="vl-stage">${rightCol({winStart:240,recycled:true,label:'节点回收复用 ♻️'})}</div>
          <div class="vl-note">同一批 DOM 节点改内容、挪位置 → 节点数始终 ≈ 10</div>`;
      } else if(i===7){
        stage.innerHTML = `<div class="vl-stage">
          ${rightCol({winStart:9990,visible:10,label:'滚到底部'})}
        </div>
        <div class="vl-concept">
          <div class="vl-cbox"><div style="font-size:20px">📄📄📄</div><span>已加载第 1~N 页</span></div>
          <div class="vl-arrow">→</div>
          <div class="vl-cbox"><div style="font-size:20px;color:var(--sync)">⏬ 触底</div><span style="color:var(--sync)">加载下一页（无限滚动）</span></div>
        </div>`;
      } else if(i===8){
        stage.innerHTML = `<div class="vl-stage">
          ${leftCol(true,'10000 ⚠️')}
          ${rightCol({winStart:300,recycled:false,label:'≈10 恒定'})}
        </div>
        <div class="vl-stage">
          <div class="vl-metric"><span>全量渲染</span><span class="num bad">10000 节点 · 卡顿</span></div>
          <div class="vl-metric"><span>虚拟列表</span><span class="num good">≈10 节点 · 流畅</span></div>
        </div>`;
      } else if(i===9){
        stage.innerHTML = `<div class="vl-stage">
          ${rightCol({winStart:300,label:'你看得见的那一屏'})}
        </div>
        <div class="vl-punch">💡 DOM 只渲染你<span class="hl-sync">看得见的那一屏</span>，<br>其余统统用<span class="hl-macro">占位撑高度</span> —— 这就是虚拟列表。</div>`;
      }
    }
  });
})();
</script>

    html:`<div class="scene-jwt-auth"><div data-region="root"></div></div>`,

    // ---- 渲染辅助 ----
    _vault(state){
      // state: { access:'none'|'valid'|'stale'|'fresh', refresh:'none'|'valid'|'dead' }
      let rows='';
      if(state.access==='none' && state.refresh==='none'){
        return `<div class="vault"><div class="vault-label">本地 token 仓库</div><div class="token" style="border-style:dashed;color:var(--sub);opacity:.6">空 · 未登录</div></div>`;
      }
      if(state.access==='valid')
        rows+=`<div class="token access"><span class="dot"></span>access token<span class="ttl">5 分钟</span></div>`;
      else if(state.access==='stale')
        rows+=`<div class="token access dead"><span class="dot"></span>access token<span class="ttl">已过期 ⏱</span></div>`;
      else if(state.access==='fresh')
        rows+=`<div class="token access fresh"><span class="dot"></span>access token<span class="ttl">新 · 5 分钟</span></div>`;
      if(state.refresh==='valid')
        rows+=`<div class="token refresh"><span class="dot"></span>refresh token<span class="ttl">7 天</span></div>`;
      else if(state.refresh==='dead')
        rows+=`<div class="token refresh dead"><span class="dot"></span>refresh token<span class="ttl">已过期</span></div>`;
      return `<div class="vault"><div class="vault-label">本地 token 仓库</div>${rows}</div>`;
    },
    _server(mode){
      // mode: 'idle'|'sign'|'ok'|'bad'|'reissue'
      if(mode==='sign') return `<div class="shield ok"><span class="big">🔏</span>用密钥签名，签发双 token</div>`;
      if(mode==='ok') return `<div class="shield ok"><span class="big">✅</span>验签通过 · 放行</div>`;
      if(mode==='bad') return `<div class="shield bad"><span class="big">🚫</span>access 已过期 · 拒绝</div>`;
      if(mode==='reissue') return `<div class="shield ok"><span class="big">🔁</span>refresh 有效 · 下发新 access</div>`;
      return `<div class="shield"><span class="big">🔐</span>持密钥 · 自验证(无状态)</div>`;
    },
    _net(inner){
      return `<div class="net-flow">${inner}</div>`;
    },
    _wire(dir,cls,text){
      const arrow = dir==='to-server' ? '→' : '←';
      return `<div class="wire ${dir}"><div class="track"></div><div class="packet ${cls}"><span class="arrow">${arrow}</span>${text}</div></div>`;
    },

    steps:[
      // 0
      { n:`<b>JWT(JSON Web Token)</b> 由三段组成：<span class="hl-sync">header</span>.<span class="hl-macro">payload</span>.<span class="hl-host">signature</span>。服务器用<b>密钥签名</b>，之后能自己验签——<b>无状态鉴权</b>，服务端不必存会话。` },
      // 1
      { n:`<b>① 登录成功</b>：服务器签发两个 token——<span class="hl-macro">access</span>(短时效，如 5 分钟) + <span class="hl-host">refresh</span>(长时效，如 7 天)，客户端把它们保存下来。` },
      // 2
      { n:`<b>② 正常请求</b>：每次请求把 access 放进 <b>Authorization: Bearer</b> 头里 → 服务器<span class="hl-host">验签通过</span> → <span class="hl-micro">200</span> 正常返回。` },
      // 3
      { n:`<b>③ access 过期</b>：5 分钟后再带<b>这个过期的</b> access 请求 → 服务器返回 <span class="hl-bad">401 未授权</span>。` },
      // 4
      { n:`<b>④ 拦截器出手</b>：前端响应拦截器捕获到 <span class="hl-bad">401</span>，<b>不直接报错</b>，而是自动拿 <span class="hl-host">refresh token</span> 去换新 access。` },
      // 5
      { n:`<b>⑤ 续签</b>：服务器验证 <span class="hl-host">refresh</span> 仍有效 → 下发一个<span class="hl-micro">全新的 access</span>。` },
      // 6
      { n:`<b>⑥ 重放(retry)</b>：前端用新 access <b>重发刚才失败的那个请求</b> → <span class="hl-micro">200 成功</span>。整个过程用户<b>毫无感知</b>，这就是「无感刷新」。` },
      // 7
      { n:`<b>⑦ 兜底</b>：若连 <span class="hl-host">refresh</span> 也过期了 → 无法续期 → <span class="hl-bad">跳转登录页</span>，请用户重新登录。` },
      // 8
      { n:`<b>为什么要两个 token？</b> <span class="hl-macro">短 access</span> 保安全：即使被截获，也很快失效；<span class="hl-host">长 refresh</span> 保体验：默默续期，用户不用反复登录。` },
    ],

    apply(root, i){
      const host = root.querySelector('[data-region="root"]');
      const tag = (t)=>`<div class="step-tag">${t}</div>`;
      const col = (kind,title,emoji,body)=>
        `<div class="col col-${kind}"><div class="col-title"><span class="emoji">${emoji}</span>${title}</div>${body}</div>`;
      const netCol = (inner)=>
        `<div class="col col-net"><div class="col-title">网络</div>${this._net(inner)}</div>`;
      const stage = (client,net,server)=>`<div class="stage">${client}${net}${server}</div>`;

      let out='';

      if(i===0){
        out = tag('JWT 长什么样');
        out += `<div class="jwt-bar">
            <div class="jwt-seg h">header<small>算法 / 类型</small></div>
            <div class="jwt-dot">.</div>
            <div class="jwt-seg p">payload<small>用户ID / 过期时间</small></div>
            <div class="jwt-dot">.</div>
            <div class="jwt-seg s">signature<small>密钥签名</small></div>
          </div>
          <div class="jwt-cap">前两段是 Base64 明文，第三段是用<b>服务器密钥</b>对前两段的签名 → 改一个字符签名就对不上</div>`;
        out += stage(
          col('client','客户端 · 浏览器','🌐',`<div style="margin-top:auto;color:var(--sub);font-size:11.5px">持有 token，每次请求带上</div>`),
          netCol(`<div style="text-align:center;color:var(--sub);font-size:11px;padding:14px 4px">token 在网络上来回传递</div>`),
          col('server','服务器','🖥️',this._server('idle'))
        );
        host.innerHTML = out;
        return;
      }

      if(i===1){ // 登录签发
        out = tag('① 登录 → 签发双 token');
        out += stage(
          col('client','客户端 · 浏览器','🌐',this._vault({access:'valid',refresh:'valid'})),
          netCol(
            this._wire('to-server','req','POST /login (账号密码)') +
            this._wire('to-client','ok','access + refresh ↩')
          ),
          col('server','服务器','🖥️',this._server('sign'))
        );
        host.innerHTML = out;
        return;
      }

      if(i===2){ // 正常请求 200
        out = tag('② 带 access 请求 → 200');
        out += stage(
          col('client','客户端 · 浏览器','🌐',this._vault({access:'valid',refresh:'valid'})),
          netCol(
            this._wire('to-server','req','GET /data · Bearer access') +
            this._wire('to-client','ok','200 OK ✅')
          ),
          col('server','服务器','🖥️',this._server('ok'))
        );
        host.innerHTML = out;
        return;
      }

      if(i===3){ // 过期 401
        out = tag('③ access 过期 → 401');
        out += stage(
          col('client','客户端 · 浏览器','🌐',this._vault({access:'stale',refresh:'valid'})),
          netCol(
            this._wire('to-server','req-stale','GET /data · Bearer 过期access') +
            this._wire('to-client','err','401 未授权 🚫')
          ),
          col('server','服务器','🖥️',this._server('bad'))
        );
        host.innerHTML = out;
        return;
      }

      if(i===4){ // 拦截器换新
        out = tag('④ 拦截器捕获 401');
        out += stage(
          col('client','客户端 · 浏览器','🌐',
            this._vault({access:'stale',refresh:'valid'}) +
            `<div class="interceptor"><span>🛡️</span><span>响应拦截器：401 → 暂存原请求，自动用 refresh 去换 access</span></div>`),
          netCol(
            this._wire('to-server','refresh','POST /refresh · refresh token')
          ),
          col('server','服务器','🖥️',this._server('idle'))
        );
        host.innerHTML = out;
        return;
      }

      if(i===5){ // 下发新 access
        out = tag('⑤ refresh 有效 → 新 access');
        out += stage(
          col('client','客户端 · 浏览器','🌐',this._vault({access:'fresh',refresh:'valid'})),
          netCol(
            this._wire('to-server','refresh','POST /refresh') +
            this._wire('to-client','ok','新 access ↩')
          ),
          col('server','服务器','🖥️',this._server('reissue'))
        );
        host.innerHTML = out;
        return;
      }

      if(i===6){ // 重放成功
        out = tag('⑥ 用新 access 重放 → 200');
        out += stage(
          col('client','客户端 · 浏览器','🌐',
            this._vault({access:'fresh',refresh:'valid'}) +
            `<div class="interceptor" style="border-color:var(--c-macro);color:var(--c-macro);background:rgba(245,158,11,.08)"><span>🔁</span><span>重放刚才失败的那个请求(用户无感知)</span></div>`),
          netCol(
            this._wire('to-server','replay','重放 GET /data · 新access') +
            this._wire('to-client','ok','200 OK ✅')
          ),
          col('server','服务器','🖥️',this._server('ok'))
        );
        host.innerHTML = out;
        return;
      }

      if(i===7){ // 兜底跳登录
        out = tag('⑦ 兜底：refresh 也过期');
        out += stage(
          col('client','客户端 · 浏览器','🌐',this._vault({access:'stale',refresh:'dead'})),
          netCol(
            this._wire('to-server','refresh','POST /refresh · 过期refresh') +
            this._wire('to-client','err','401 无法续期 🚫')
          ),
          col('server','服务器','🖥️',this._server('bad'))
        );
        out += `<div class="relogin"><span>🔑</span>清空 token → 跳转登录页，请重新登录</div>`;
        host.innerHTML = out;
        return;
      }

      // i===8 收尾金句
      out = tag('为什么要双 token');
      out += stage(
        col('client','短 access · 保安全','⏱️',
          `<div style="margin-top:auto;font-size:11.5px;color:var(--c-macro);line-height:1.55">时效短(5 分钟)<br>就算被截获，<b>很快失效</b><br>每次请求都带它</div>`),
        netCol(`<div style="text-align:center;font-size:22px;padding:10px 0">⚖️</div><div style="text-align:center;font-size:11px;color:var(--sub)">安全 ⟷ 体验<br>两者兼得</div>`),
        col('server','长 refresh · 保体验','🔁',
          `<div style="margin-top:auto;font-size:11.5px;color:var(--c-host);line-height:1.55">时效长(7 天)<br>只用来<b>换 access</b><br>默默续期 · 无感刷新</div>`)
      );
      out += `<div class="punch">💡 <b>短 token 保安全，长 token 保体验</b>：access 过期 → 拦截器拿 refresh 换新 → 重放原请求，用户全程无感；refresh 也过期才请用户重新登录。这就是「无感刷新」。</div>`;
      host.innerHTML = out;
    }
  });
})();
</script>

@keyframes cors-pop{from{opacity:0;transform:translateY(8px) scale(.97);}to{opacity:1;transform:none;}}
