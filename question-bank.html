<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="前端面试题库、复盘记录与来源查询">
  <link rel="icon" href="data:,">
  <title>前端面试题库 · 复盘与来源</title>
  <link rel="stylesheet" href="assets/question-bank.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">🎯 前端面试知识库</a>
    <nav aria-label="主导航">
      <a href="index.html">概念动画</a>
      <a class="active" href="question-bank.html">题库 / 复盘</a>
    </nav>
  </header>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">QUESTION BANK · INTERVIEW RECAP</p>
      <h1>把每一次面试，变成下一次的优势。</h1>
      <p>题目、场景、公司出现次数、复盘记录和技术出处都放在同一处。公司信息只来自你的复盘记录，不会凭空生成。</p>
    </section>
    <section class="stats" aria-label="题库统计">
      <div><strong id="questionCount">—</strong><span>道题</span></div>
      <div><strong id="occurrenceCount">—</strong><span>次公司出现</span></div>
      <div><strong id="sourceCount">—</strong><span>条可查询来源</span></div>
    </section>
    <section class="filters" aria-label="筛选题库">
      <label>搜索
        <input id="search" type="search" placeholder="题目、标签、关键词">
      </label>
      <label>方向
        <select id="track"><option value="">全部方向</option></select>
      </label>
      <label>题型
        <select id="type"><option value="">全部题型</option><option value="concept">八股 / 原理</option><option value="scenario">场景 / 项目</option></select>
      </label>
      <label>来源
        <select id="sourceStatus"><option value="">全部来源状态</option><option value="verified">已核验</option><option value="needs-source-review">待补充核验</option></select>
      </label>
    </section>
    <p class="result-info" id="resultInfo" aria-live="polite"></p>
    <section id="questionList" class="question-list" aria-label="题目列表"></section>
    <section id="loadError" class="load-error" hidden>
      <h2>无法读取题库数据</h2>
      <p>请通过本地预览或 GitHub Pages 打开此页面，而不是直接双击 HTML 文件。</p>
    </section>
  </main>
  <footer>数据源位于 <code>data/</code>；使用 <code>$interview-recap-curator</code> 持续补充复盘。</footer>
  <script src="assets/question-bank.js" defer></script>
</body>
</html>
